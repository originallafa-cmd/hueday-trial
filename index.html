// day index → { year, month, week }
function dateFromDay(day) {
  const dayIdx = day - 1;
  const week  = (dayIdx % WEEKS_PER_MONTH) + 1;
  const month = (Math.floor(dayIdx / WEEKS_PER_MONTH) % MONTHS_PER_YEAR) + 1;
  const year  = Math.floor(dayIdx / (WEEKS_PER_MONTH * MONTHS_PER_YEAR)) + 1;
  return { year, month, week };
}
function dateLabel(day) {
  const { year, month, week } = dateFromDay(day);
  return `Y${year} M${String(month).padStart(2,'0')} W${week}`;
}
function fmtMoney(m) {
  // m stored in whole dollars; show as $K (Kairosoft-style)
  const k = Math.round(m / 1000);
  if (m < 1000) return '$' + m;
  return '$' + k.toLocaleString() + 'K';
}

// ═══ WEB AUDIO ══════════════════════════════════════════════════════
let _audioCtx = null;
function getAudio() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { _audioCtx = null; }
  }
  if (_audioCtx && _audioCtx.state === 'suspended') { try { _audioCtx.resume(); } catch (_) {} }
  return _audioCtx;
}
function beep(freq = 440, dur = 0.08, type = 'square', gain = 0.06, delay = 0) {
  const ctx = getAudio();
  if (!ctx) return;
  const t0 = ctx.currentTime + delay;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(gain, t0 + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g).connect(ctx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}

function makeAgentFromTemplate(t) {
  return {
    id: nextId('agt'),
    name: t.name,
    tier: t.tier,
    rarity: t.rarity,
    trait: t.trait,
    flavor: t.flavor,
    stats: { ...t.base },
    xp: Object.fromEntries(STAT_ORDER.map(s => [s, 0])),
    level: 1,
    avatar: avatarSeed(t.name),
    sprite: spriteSeed(t.name, t.rarity),
    mood: 'idle',
    stamina: 100,
  };
}
function hireCost(template) { return RARITY[template.rarity].tierCost; }

function avatarSeed(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  const palettes = [
    ['#22d3ee','#0e7490'], ['#a855f7','#6b21a8'], ['#f472b6','#9d174d'],
    ['#4ade80','#166534'], ['#fbbf24','#92400e'], ['#ef4444','#7f1d1d'],
    ['#60a5fa','#1e40af'], ['#f59e0b','#78350f'], ['#34d399','#065f46'],
  ];
  const pal = palettes[h % palettes.length];
  const shapeIdx = (h >> 4) % 3;
  return { bg: pal[0], fg: pal[1], shape: shapeIdx, initials: initialsOf(name) };
}
function initialsOf(name) {
  const parts = name.split(' ');
  const last = parts[parts.length - 1];
  return last.slice(0, 2).toUpperCase();
}
// pixel sprite seed
function spriteSeed(name, rarity) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 37 + name.charCodeAt(i)) >>> 0;
  const skin  = ['#f5cfa0','#e8b887','#c8935a','#9d6a3e','#6e4628','#f0d4b3'][h % 6];
  const hairPool = ['#2b1d10','#5c3a1e','#c8913d','#e6c47a','#6b2b2b','#3b2a4a','#1c1c1c','#a23f7f'];
  const hair  = hairPool[(h>>3) % hairPool.length];
  const shirt = rarity === 'legendary' ? '#fbbf24'
              : rarity === 'epic'      ? '#a855f7'
              : rarity === 'rare'      ? '#3b82f6'
              : ['#22d3ee','#4ade80','#f472b6','#ef4444','#60a5fa','#f59e0b','#34d399','#e879f9'][(h>>6) % 8];
  const pants = ['#1e2a4a','#2a1e3a','#1f3a2a','#3a2a1e','#3a1f3a'][(h>>9) % 5];
  const hairStyle = (h>>12) % 4; // 0 flat, 1 spiky, 2 bun, 3 long
  const glasses = ((h>>15) & 1) === 1;
  return { skin, hair, shirt, pants, hairStyle, glasses, seed: h };
}

// SVG PIXEL SPRITE — 24×24 grid of rect cells
// ═══════════════════════════════════════════════════════════════════
// Each sprite drawn as an SVG at a virtual 24×24 grid, then scaled.
// Procedurally built from sprite seed for variety without sprite sheets.

function PixelSprite({ sprite, mood = 'idle', size = 48 }) {
  const s = sprite;
  const cell = 1; // virtual units; SVG viewBox is 24x24
  // use svg for crisp pixel edges
  const animName = {
    idle:     'spriteIdle 2.4s ease-in-out infinite',
    work:     'spriteWork 0.9s ease-in-out infinite',
    cheer:    'spriteCheer 0.6s ease-in-out 2',
    tired:    'spriteTired 2.4s ease-in-out infinite',
    surprise: 'spriteSurprise 0.5s ease-out 1',
    walk:     'spriteIdle 0.4s ease-in-out infinite',
  }[mood] || 'spriteIdle 2.4s ease-in-out infinite';

  // hair silhouette depending on hairStyle
  const hs = s.hairStyle;
  // mouth shape per mood (ONLY thing that changes for mood face-wise)
  const mouthRects = (() => {
    if (mood === 'cheer') return [
      { x: 10, y: 11, w: 4, h: 1, f: '#5a2a2a' },
      { x: 9,  y: 12, w: 6, h: 1, f: '#5a2a2a' },
    ];
    if (mood === 'tired') return [
      { x: 10, y: 12, w: 4, h: 1, f: '#5a2a2a' },
    ];
    if (mood === 'surprise') return [
      { x: 11, y: 11, w: 2, h: 2, f: '#1a0e0e' },
    ];
    if (mood === 'work') return [
      { x: 10, y: 12, w: 4, h: 1, f: '#5a2a2a' },
    ];
    // idle / default: small smile
    return [
      { x: 10, y: 12, w: 4, h: 1, f: '#5a2a2a' },
      { x: 10, y: 13, w: 1, h: 0.5, f: '#5a2a2a' },
      { x: 13, y: 13, w: 1, h: 0.5, f: '#5a2a2a' },
    ];
  })();

  // eye shift for surprise/cheer
  const eyeY = mood === 'cheer' ? 9 : mood === 'tired' ? 10 : 9;
  const eyeW = mood === 'surprise' ? 2 : 1.5;
  const eyeH = mood === 'surprise' ? 2 : (mood === 'tired' ? 0.8 : 1.5);

  // hair back mask (fills top of head)
  const hairTopY = 2;
  const hairTopH = hs === 2 ? 5 : hs === 3 ? 4 : 3;

  // shirt color gradient id
  const gradId = `sh${s.seed & 0xffff}`;
  const shirtDark = shade(s.shirt, -0.25);
  const pantsDark = shade(s.pants, -0.25);
  const skinDark  = shade(s.skin,  -0.18);

  return (
    <svg
      width={size}
      height={size * 1.15}
      viewBox="0 0 24 28"
      style={{
        imageRendering: 'pixelated',
        shapeRendering: 'crispEdges',
        animation: animName,
        transformOrigin: 'center bottom',
        overflow: 'visible',
        display:'block',
      }}
    >
      {/* shadow */}
      <ellipse cx="12" cy="27" rx="6" ry="1" fill="rgba(0,0,0,0.45)"/>

      {/* hair back layer */}
      <rect x="5" y={hairTopY} width="14" height={hairTopH} fill={s.hair}/>
      {hs === 2 && <rect x="6" y={hairTopY - 1} width="12" height="1" fill={s.hair}/>}
      {hs === 3 && <rect x="4" y={hairTopY + 2} width="2" height="5" fill={s.hair}/>}
      {hs === 3 && <rect x="18" y={hairTopY + 2} width="2" height="5" fill={s.hair}/>}
      {hs === 1 && (
        <React.Fragment>
          <rect x="7"  y={hairTopY - 1} width="2" height="2" fill={s.hair}/>
          <rect x="11" y={hairTopY - 2} width="2" height="3" fill={s.hair}/>
          <rect x="15" y={hairTopY - 1} width="2" height="2" fill={s.hair}/>
        </React.Fragment>
      )}

      {/* head */}
      <rect x="6" y={hairTopY + hairTopH - 1} width="12" height="8" fill={s.skin}/>
      {/* head shading (right side darker for iso light) */}
      <rect x="16" y={hairTopY + hairTopH - 1} width="2" height="8" fill={skinDark} opacity="0.5"/>

      {/* hair front fringe */}
      <rect x="6" y={hairTopY + hairTopH - 1} width="12" height="1" fill={s.hair}/>
      {hs === 0 && <rect x="6" y={hairTopY + hairTopH} width="4" height="1" fill={s.hair}/>}

      {/* eyes */}
      <rect x="9"  y={eyeY} width={eyeW} height={eyeH} fill="#111"/>
      <rect x="13.5" y={eyeY} width={eyeW} height={eyeH} fill="#111"/>

      {/* glasses */}
      {s.glasses && (
        <React.Fragment>
          <rect x="8.5"  y={eyeY - 0.3} width="3" height="2.1" fill="none" stroke="#111" strokeWidth="0.3"/>
          <rect x="13"   y={eyeY - 0.3} width="3" height="2.1" fill="none" stroke="#111" strokeWidth="0.3"/>
          <rect x="11.5" y={eyeY + 0.4} width="1.5" height="0.3" fill="#111"/>
        </React.Fragment>
      )}

      {/* cheek blush on cheer */}
      {mood === 'cheer' && (
        <React.Fragment>
          <rect x="7"  y="11" width="1.5" height="1" fill="#ff9ab0" opacity="0.6"/>
          <rect x="15.5" y="11" width="1.5" height="1" fill="#ff9ab0" opacity="0.6"/>
        </React.Fragment>
      )}
      {/* tired bags */}
      {mood === 'tired' && (
        <React.Fragment>
          <rect x="8.5" y={eyeY + 1.3} width="2.5" height="0.5" fill="#4a1a1a" opacity="0.4"/>
          <rect x="13"  y={eyeY + 1.3} width="2.5" height="0.5" fill="#4a1a1a" opacity="0.4"/>
        </React.Fragment>
      )}

      {/* mouth */}
      {mouthRects.map((m, i) => (
        <rect key={i} x={m.x} y={m.y} width={m.w} height={m.h} fill={m.f}/>
      ))}

      {/* neck */}
      <rect x="10" y="15" width="4" height="1" fill={skinDark}/>

      {/* shirt / torso */}
      <rect x="5"  y="16" width="14" height="6" fill={s.shirt}/>
      <rect x="5"  y="16" width="14" height="1" fill={shade(s.shirt, 0.25)}/>
      <rect x="16" y="16" width="3"  height="6" fill={shirtDark} opacity="0.5"/>

      {/* arms */}
      <rect x="3" y="16" width="2" height="6" fill={s.shirt}/>
      <rect x="19" y="16" width="2" height="6" fill={s.shirt}/>
      {/* hands */}
      <rect x="3" y="21" width="2" height="2" fill={s.skin}/>
      <rect x="19" y="21" width="2" height="2" fill={s.skin}/>

      {/* pants */}
      <rect x="6" y="22" width="12" height="4" fill={s.pants}/>
      <rect x="11" y="22" width="2" height="4" fill={pantsDark}/>

      {/* shoes */}
      <rect x="6"  y="26" width="4" height="1" fill="#111"/>
      <rect x="14" y="26" width="4" height="1" fill="#111"/>

      {/* cheer arms up (overlay) */}
      {mood === 'cheer' && (
        <React.Fragment>
          <rect x="2" y="11" width="2" height="5" fill={s.shirt} transform="rotate(-30 3 16)"/>
          <rect x="20" y="11" width="2" height="5" fill={s.shirt} transform="rotate(30 21 16)"/>
        </React.Fragment>
      )}
    </svg>
  );
}

// color shade helper
function shade(hex, amt) {
  const h = hex.replace('#','');
  const r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
  const f = (c) => Math.max(0, Math.min(255, Math.round(c + 255 * amt)));
  return '#' + [f(r),f(g),f(b)].map(x => x.toString(16).padStart(2,'0')).join('');
}

    <svg width={width} height={height} viewBox="0 0 300 100" style={{ position:'absolute', left:'50%', top:0, transform:'translateX(-50%)', pointerEvents:'none' }}>
      {colors.map((c, i) => (
        <path
          key={i}
          d={`M 20 ${95 - i*4} Q 150 ${5 - i*3} 280 ${95 - i*4}`}
          fill="none"
          stroke={c}
          strokeWidth="4"
          strokeDasharray="600"
          style={{
            animation: `rainbowArc 1.6s ${i * 0.08}s ease-out forwards`,
          }}
        />
      ))}
    </svg>
  );
}

// ═══════════════════════════════════════════════════════════════════
// ISOMETRIC OFFICE SCENE
// ═══════════════════════════════════════════════════════════════════

function OfficeScene({
  agents, project, day, activeEvents,
  hiringArrival, dayTransition, eventReacting, shippingCheer,
  deskCount, onDeskTap,
  mascotWaving, shipFanfare,
}) {
  // 8×6 floor grid (isometric diamond tiles)
  const GRID_W = 8;
  const GRID_H = 6;
  const TILE_W = 32; // pixels
  const TILE_H = 16;

  // total iso canvas width/height
  const canvasW = (GRID_W + GRID_H) * (TILE_W / 2);
  const canvasH = (GRID_W + GRID_H) * (TILE_H / 2) + 40;

  // convert grid to iso pixel
  const iso = (gx, gy) => ({
    x: (gx - gy) * (TILE_W / 2) + (GRID_H * TILE_W / 2),
    y: (gx + gy) * (TILE_H / 2),
  });

  // Desk positions in grid coords
  const deskPositions = [
    { gx: 1, gy: 1 },
    { gx: 4, gy: 1 },
    { gx: 1, gy: 3 },
    { gx: 4, gy: 3 },
    { gx: 6, gy: 2 },
  ];
  // arcade cabinet positions (back wall)
  const arcadePositions = [
    { gx: 0, gy: 0, hue: 'a' },
    { gx: 7, gy: 0, hue: 'b' },
  ];

  // agent -> desk mapping
  const agentByDesk = {};
  for (let i = 0; i < agents.length && i < deskCount; i++) {
    agentByDesk[i] = agents[i];
  }
  // task by agent
  const taskByAgentId = {};
  if (project) {
    for (const k of Object.keys(project.assignments)) {
      const aid = project.assignments[k];
      if (aid) taskByAgentId[aid] = k;
    }
  }

  // stars for night sky (stable)
  const stars = React.useMemo(() => {
    const out = [];
    for (let i = 0; i < 18; i++) {
      out.push({ x: rand(2, 96), y: rand(4, 62), size: irand(1, 2), delay: rand(0, 2) });
    }
    return out;
  }, []);

  return (
    <div style={{
      position:'relative',
      width:'100%',
      height: 280,
      background: 'linear-gradient(180deg, #020612 0%, #050a1c 40%, #0a1428 100%)',
      border: `2px solid ${BORDER_2}`,
      borderRadius: 6,
      overflow:'hidden',
      marginBottom: 10,
      animation: eventReacting ? 'screenShakeMild 0.4s ease-out' : 'none',
      boxShadow: '0 0 20px rgba(79,216,255,0.15), inset 0 0 40px rgba(0,0,0,0.4)',
    }}>

      {/* BACK WALL + NIGHT SKY WINDOW */}
      <div style={{
        position:'absolute', top:0, left:0, right:0, height: 90,
        background: 'linear-gradient(180deg, #1a2a44 0%, #0e1a30 100%)',
        borderBottom: `2px solid ${BORDER_2}`,
        perspective: '400px',
      }}>
        {/* neon cyan strip light */}
        <div style={{
          position:'absolute', bottom: -1, left:0, right:0, height: 2,
          background: NEON, boxShadow: `0 0 12px ${NEON}, 0 0 20px ${NEON}`,
        }}/>

        {/* window (night sky) */}
        <div style={{
          position:'absolute', top: 8, left:'50%', transform:'translateX(-50%)',
          width: '55%', height: 68,
          background:'linear-gradient(180deg, #0a0f2a 0%, #1a1450 55%, #2a1e6a 100%)',
          border: `3px solid #2a4878`,
          borderRadius: 2,
          overflow:'hidden',
          boxShadow: `inset 0 0 20px rgba(79,216,255,0.25)`,
        }}>
          {/* stars */}
          {stars.map((st, i) => (
            <div key={i} style={{
              position:'absolute',
              left: `${st.x}%`, top: st.y,
              width: st.size, height: st.size,
              background:'#fff',
              boxShadow: `0 0 4px #fff`,
              animation: `starTwinkle ${1.5 + st.delay}s ease-in-out ${st.delay}s infinite`,
            }}/>
          ))}
          {/* moon */}
          <div style={{
            position:'absolute', right: '15%', top: 8,
            width: 12, height: 12,
            background:'radial-gradient(circle at 65% 35%, #e5e7eb 55%, #9ca3af 100%)',
            borderRadius:'50%',
            boxShadow: '0 0 10px rgba(229,231,235,0.6)',
          }}/>
          {/* distant city silhouette */}
          <div style={{
            position:'absolute', bottom:0, left:0, right:0, height: 14,
            background: '#0a0520',
            clipPath: 'polygon(0 100%, 0 60%, 10% 60%, 10% 30%, 20% 30%, 20% 70%, 30% 70%, 30% 45%, 40% 45%, 40% 65%, 55% 65%, 55% 25%, 65% 25%, 65% 55%, 75% 55%, 75% 40%, 90% 40%, 90% 70%, 100% 70%, 100% 100%)',
          }}/>
          {/* window cross */}
          <div style={{ position:'absolute', top:0, bottom:0, left:'50%', width:2, background:'#2a4878', transform:'translateX(-50%)' }}/>
          <div style={{ position:'absolute', left:0, right:0, top:'50%', height:2, background:'#2a4878', transform:'translateY(-50%)' }}/>
        </div>

        {/* arcade cabinets against back wall */}
        <div style={{ position:'absolute', top: 18, left: 8, animation:'arcadeFlicker 3s infinite' }}>
          <ArcadeCabinet size={56} colorHue="a"/>
        </div>
        <div style={{ position:'absolute', top: 18, right: 8, animation:'arcadeFlicker 3.3s 0.4s infinite' }}>
          <ArcadeCabinet size={56} colorHue="b"/>
        </div>
      </div>

      {/* RIGHT WALL (slight shading strip) */}
      <div style={{
        position:'absolute', top: 90, right: 0, bottom: 0, width: 8,
        background: 'linear-gradient(90deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%)',
        pointerEvents:'none',
      }}/>

      {/* LEFT WALL shading */}
      <div style={{
        position:'absolute', top: 90, left: 0, bottom: 0, width: 8,
        background: 'linear-gradient(270deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 100%)',
        pointerEvents:'none',
      }}/>

      {/* ISOMETRIC FLOOR STAGE */}
      <div style={{
        position:'absolute', top: 92, left:'50%',
        transform:`translateX(-50%)`,
        width: canvasW,
        height: canvasH,
      }}>
        {/* floor tiles */}
        <svg
          width={canvasW}
          height={canvasH}
          style={{ position:'absolute', top: 0, left: 0, shapeRendering:'crispEdges' }}
        >
          <defs>
            <pattern id="floorNoise" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
              <rect width="4" height="4" fill="#142a4a"/>
              <rect x="1" y="1" width="1" height="1" fill="#1a3a5a" opacity="0.5"/>
            </pattern>
          </defs>
          {Array.from({ length: GRID_H }).map((_, gy) =>
            Array.from({ length: GRID_W }).map((_, gx) => {
              const { x, y } = iso(gx, gy);
              const cx = x + TILE_W / 2;
              const cy = y + TILE_H / 2;
              const fill = (gx + gy) % 2 === 0 ? '#1a3558' : '#14284a';
              return (
                <polygon
                  key={`${gx}-${gy}`}
                  points={`${cx},${y} ${x + TILE_W},${cy} ${cx},${y + TILE_H} ${x},${cy}`}
                  fill={fill}
                  stroke="#2a4878"
                  strokeWidth="0.5"
                />
              );
            })
          )}
          {/* desk platforms */}
          {deskPositions.slice(0, deskCount).map((p, i) => {
            const { x, y } = iso(p.gx, p.gy);
            const cx = x + TILE_W / 2;
            const cy = y + TILE_H / 2;
            return (
              <polygon
                key={`desk-plate-${i}`}
                points={`${cx},${y-1} ${x + TILE_W + 2},${cy} ${cx},${y + TILE_H + 1} ${x - 2},${cy}`}
                fill="#0a1428"
                stroke={NEON}
                strokeWidth="0.5"
                opacity="0.6"
              />
            );
          })}
        </svg>

        {/* rainbow arc on ship */}
        {shipFanfare && (
          <div style={{ position:'absolute', top: -20, left:'50%', transform:'translateX(-50%)', pointerEvents:'none', zIndex: 8 }}>
            <RainbowArc width={canvasW} height={80}/>
          </div>
        )}

        {/* DESKS + CHARACTERS */}
        {deskPositions.slice(0, deskCount).map((p, i) => {
          const { x, y } = iso(p.gx, p.gy);
          const agent = agentByDesk[i];
          const assignedTask = agent ? taskByAgentId[agent.id] : null;
          const working = !!assignedTask;
          let mood = 'idle';
          if (agent) {
            if (shippingCheer)  mood = 'cheer';
            else if (eventReacting) mood = 'surprise';
            else if (working)   mood = 'work';
            else if (agent.stamina < 30) mood = 'tired';
            else mood = 'idle';
          }
          const crunchHere = project && project.crunch && working;
          return (
            <div
              key={`desk-${i}`}
              onClick={() => onDeskTap && onDeskTap(i)}
              style={{
                position:'absolute',
                left: x - 4, top: y - 38,
                width: TILE_W + 8,
                cursor: 'pointer',
              }}
            >
              {/* character stands behind desk */}
              {agent && (
                <div style={{
                  position:'absolute', left:'50%', bottom: 14,
                  transform:'translateX(-50%)',
                  zIndex: 2,
                }}>
                  <PixelSprite sprite={agent.sprite} mood={mood} size={36}/>
                </div>
              )}
              {/* fire behind agent on crunch */}
              {crunchHere && (
                <div style={{
                  position:'absolute', left: 0, bottom: 2,
                  zIndex: 1, opacity: 0.85,
                }}>
                  <FireSprite size={22}/>
                </div>
              )}
              {/* speech bubble */}
              {agent && working && !eventReacting && !shippingCheer && (
                <WorkBubble taskKey={assignedTask} agentId={agent.id}/>
              )}
              {/* desk + monitor */}
              <div style={{
                position:'absolute', bottom: 0, left:'50%', transform:'translateX(-50%)',
                zIndex: 3,
              }}>
                <DeskMonitor working={working} taskKey={assignedTask} size={38}/>
              </div>
              {/* empty tag */}
              {!agent && (
                <div style={{
                  position:'absolute', bottom: 14, left:'50%', transform:'translateX(-50%)',
                  fontSize: 7, color: MUTED, letterSpacing: 1,
                  fontFamily:'"Press Start 2P", monospace',
                  zIndex: 4,
                }}>EMPTY</div>
              )}
            </div>
          );
        })}

        {/* PLANT bottom-left */}
        <div style={{
          position:'absolute',
          left: iso(0, GRID_H - 1).x + 2,
          top:  iso(0, GRID_H - 1).y - 18,
          zIndex: 4,
        }}>
          <Plant size={28}/>
        </div>

        {/* COFFEE MACHINE bottom-right */}
        <div style={{
          position:'absolute',
          left: iso(GRID_W - 1, GRID_H - 1).x - 4,
          top:  iso(GRID_W - 1, GRID_H - 1).y - 24,
          zIndex: 4,
        }}>
          <CoffeeMachine size={26}/>
        </div>

        {/* MASCOT in center */}
        <div style={{
          position:'absolute',
          left: iso(3, 4).x,
          top:  iso(3, 4).y - 26,
          zIndex: 6,
        }}>
          <Mascot size={36} waving={mascotWaving}/>
          {mascotWaving && (
            <div style={{
              position:'absolute', top: -14, left: '80%',
              background:'#fff', color:'#111',
              border:'2px solid #111',
              padding:'2px 6px',
              fontFamily:'"Press Start 2P", monospace',
              fontSize: 8,
              borderRadius: 3,
              animation:'speechFade 1.6s ease-out',
              whiteSpace:'nowrap',
              zIndex: 7,
            }}>!</div>
          )}
        </div>
      </div>

      {/* DATE label top-left */}
      <div style={{
        position:'absolute', top: 4, left: 6,
        fontFamily:'"Press Start 2P", monospace', fontSize: 7, color:'#d5e7ff',
        letterSpacing: 1, padding:'3px 6px', background:'rgba(5,9,26,0.7)',
        border: `1px solid ${NEON}`,
        boxShadow: `0 0 6px rgba(79,216,255,0.3)`,
        borderRadius: 2,
        zIndex: 10,
      }}>{dateLabel(day)}</div>

      {/* walk-in arrival */}
      {hiringArrival && (
        <HireWalkIn arrival={hiringArrival} iso={iso} deskPositions={deskPositions}/>
      )}

      {/* event burst */}
      {eventReacting && (
        <div style={{
          position:'absolute', top: 84, left:'50%', transform:'translateX(-50%)',
          fontSize: 20, color: GOLD,
          fontFamily:'"Press Start 2P", monospace',
          textShadow:'0 0 8px #000',
          animation:'speechFade 0.8s ease-out',
          pointerEvents:'none',
          zIndex: 12,
        }}>!</div>
      )}
    </div>
  );
}

function WorkBubble({ taskKey, agentId }) {
  const [glyph, setGlyph] = React.useState(() => pick(TASK_GLYPHS[taskKey] || ['💡']));
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => {
      setGlyph(pick(TASK_GLYPHS[taskKey] || ['💡']));
      setTick(t => t + 1);
    }, 2200 + Math.random() * 800);
    return () => clearInterval(id);
  }, [taskKey]);
  return (
    <div key={tick} style={{
      position:'absolute', left:'50%', bottom: 52,
      transform:'translateX(-50%)',
      zIndex: 5,
      background:'#fff',
      color:'#111',
      padding:'2px 5px',
      border:'2px solid #111',
      borderRadius: 3,
      fontFamily:'"Press Start 2P", monospace',
      fontSize: 8,
      letterSpacing: 1,
      animation:'bubbleFloat 2s ease-out',
      pointerEvents:'none',
      whiteSpace:'nowrap',
    }}>
      {glyph}
      <div style={{
        position:'absolute', bottom:-4, left:'50%', transform:'translateX(-50%)',
        width: 0, height: 0,
        borderLeft:'3px solid transparent',
        borderRight:'3px solid transparent',
        borderTop:'4px solid #111',
      }}/>
    </div>
  );
}

function HireWalkIn({ arrival, iso, deskPositions }) {
  const slot = Math.min(arrival.slotIdx, deskPositions.length - 1);
  const dp = deskPositions[slot];
  const target = iso(dp.gx, dp.gy);
  return (
    <div style={{
      position:'absolute',
      left: `calc(50% + ${target.x - 80}px)`,
      top: target.y + 60,
      zIndex: 10,
      animation: `charStep 0.34s ease-in-out infinite`,
      transform:'translate(-50%, 0)',
    }}>
      <PixelSprite sprite={arrival.agent.sprite} mood="idle" size={36}/>
      <div style={{
        position:'absolute', top:-18, left:'50%', transform:'translateX(-50%)',
        fontFamily:'"Press Start 2P", monospace', fontSize: 8,
        color: GOLD, textShadow:'0 0 6px #000',
        whiteSpace:'nowrap',
      }}>NEW HIRE!</div>
    </div>
  );
}

// ═══ KAIROSOFT-STYLE BOTTOM HUD ════════════════════════════════════

function KairoHud({ saveCount, day, money, project, reputation, hype, fame }) {
  const expectedScore = project ? projectedScore(project) : 0;
  const expectedPayout = project ? projectedPayout(project) : 0;
  const totalProgress = project ? Math.round(
    project.tasks.reduce((acc, t) => acc + Math.min(t.progress, t.need) / t.need, 0) / project.tasks.length * 100
  ) : 0;

  return (
    <div style={{
      background: 'linear-gradient(180deg, #0e1a35 0%, #0a1428 100%)',
      border: `2px solid ${BORDER_2}`,
      borderRadius: 6,
      padding: 6,
      marginBottom: 10,
      boxShadow: `0 0 10px rgba(79,216,255,0.15), inset 0 0 8px rgba(79,216,255,0.08)`,
    }}>
      {/* top row */}
      <div style={{
        display:'flex', alignItems:'center', gap: 6,
        fontFamily:'"Press Start 2P", monospace', fontSize: 8,
        color: TEXT,
        padding:'4px 2px',
        borderBottom: project ? `1px dashed ${BORDER}` : 'none',
      }}>
        <div style={{ display:'flex', alignItems:'center', gap: 4 }}>
          <IconSave size={11}/>
          <span style={{ color: MUTED }}>{saveCount}</span>
        </div>
        <div style={{ flex: 1, textAlign:'center', letterSpacing: 1, color: NEON }}>
          {dateLabel(day)}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap: 4 }}>
          <IconMoney size={11}/>
          <span style={{ color: GOLD }}>{fmtMoney(money)}</span>
        </div>
      </div>

      {/* status row (active project) */}
      {project && (
        <div style={{
          display:'grid',
          gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr',
          gap: 4,
          padding:'6px 2px 2px',
          fontFamily:'"Press Start 2P", monospace', fontSize: 7,
          letterSpacing: 0.5,
          color: TEXT,
        }}>
          <div style={{ overflow:'hidden' }}>
            <div style={{ color: MUTED, fontSize: 6, marginBottom: 2 }}>PROJECT</div>
            <div style={{ color: NEON, fontSize: 8, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
              {project.title}
            </div>
            <div style={{ marginTop: 3 }}>
              <div style={{ height: 3, background: '#0a0f20', border:`1px solid ${BORDER}`, borderRadius: 1, overflow:'hidden' }}>
                <div style={{
                  height:'100%', width: `${totalProgress}%`,
                  background:`linear-gradient(90deg, ${ACCENT}, ${NEON})`,
                  transition:'width 260ms ease',
                  boxShadow: `0 0 6px ${NEON}`,
                }}/>
              </div>
              <div style={{ fontSize: 6, color: MUTED, marginTop: 2 }}>{totalProgress}%</div>
            </div>
          </div>
          <HudStatCell icon={<IconGame size={9}/>} label="SCORE" value={expectedScore + '/40'} color={GOLD}/>
          <HudStatCell icon={<IconMoney size={9}/>} label="PAYOUT" value={fmtMoney(expectedPayout)} color={GOLD}/>
          <HudStatCell icon={<IconHype size={9}/>} label="HYPE" value={project.hype || 0} color={SUCCESS}/>
          <HudStatCell icon={<IconFame size={9}/>} label="FAME" value={reputation} color={PURPLE}/>
        </div>
      )}
    </div>
  );
}

function HudStatCell({ icon, label, value, color }) {
  return (
    <div style={{ minWidth: 0 }}>
      <div style={{ color: MUTED, fontSize: 6, marginBottom: 2, display:'flex', alignItems:'center', gap: 2 }}>
        {icon}
        <span style={{ letterSpacing: 1 }}>{label}</span>
      </div>
      <div style={{ color, fontSize: 8, whiteSpace:'nowrap' }}>{value}</div>
    </div>
  );
}

function projectedScore(project) {
  // rough estimate based on completion
  const totalFrac = project.tasks.reduce((acc, t) => acc + Math.min(t.progress, t.need) / t.need, 0) / project.tasks.length;
  return Math.round(Math.max(5, totalFrac * 30 + 8));
}
function projectedPayout(project) {
  return Math.round(project.pay * 0.8);
}

        <div key={p.id} style={{
          position:'fixed',
          left: p.x,
          top: p.y,
          transform:'translate(-50%, 0)',
          fontFamily:'"Press Start 2P", monospace',
          fontSize: p.size || 11,
          color: p.color,
          textShadow:'0 0 4px rgba(0,0,0,0.9), 0 2px 0 #000',
          letterSpacing: 1,
          pointerEvents:'none',
          zIndex: 50,
          animation: `${p.bad ? 'numPopBad' : 'numPopGood'} ${p.dur || 1200}ms ease-out forwards`,
          whiteSpace:'nowrap',
        }}>{p.text}</div>
      ))}
    </React.Fragment>

}

// ═══ REVIEW REVEAL ═════════════════════════════════════════════════
function ReviewReveal({ review, onContinue, agents, project, day, deskCount, officeProps }) {
  const [phase, setPhase] = React.useState('releasing');
  const [digitsShown, setDigitsShown] = React.useState(0);
  const scoreStr = String(review.score).padStart(2,'0');

  React.useEffect(() => {
    const timers = [];
    timers.push(setTimeout(() => setPhase('digits'), 1200));
    timers.push(setTimeout(() => sfx.tick(), 300));
    timers.push(setTimeout(() => sfx.tick(), 600));
    timers.push(setTimeout(() => sfx.tick(), 900));
    return () => timers.forEach(clearTimeout);
  }, []);

  React.useEffect(() => {
    if (phase !== 'digits') return;
    const timers = [];
    for (let i = 0; i < scoreStr.length; i++) {
      timers.push(setTimeout(() => {
        setDigitsShown(i + 1);
        sfx.tick();
      }, 120 + i * 200));
    }
    timers.push(setTimeout(() => {
      setPhase('fanfare');
      const sc = review.score;
      if (sc >= 31) sfx.fanfareHi();
      else if (sc >= 21) sfx.fanfareMid();
      else if (sc >= 11) sfx.fanfareMid();
      else sfx.fanfareLow();
    }, 120 + scoreStr.length * 200 + 200));
    timers.push(setTimeout(() => {
      setPhase('awards');
      sfx.coin();
    }, 120 + scoreStr.length * 200 + 900));
    return () => timers.forEach(clearTimeout);
  }, [phase]);

  const tier =
    review.score >= 31 ? 'god' :
    review.score >= 21 ? 'good' :
    review.score >= 11 ? 'mid' : 'flop';

  const awardColor =
    tier === 'god'  ? GOLD :
    tier === 'good' ? '#fb923c' :
    tier === 'mid'  ? '#facc15' : '#9ca3af';

  const stars = Math.max(1, Math.min(5, Math.round(review.score / 8)));
  const shakeAnim = phase === 'fanfare' && tier === 'god'
    ? 'screenShake 0.8s ease-out'
    : phase === 'fanfare' && tier === 'good'
    ? 'screenShakeMild 0.4s ease-out'
    : 'none';

  return (
    <div style={{
      position:'fixed', inset:0, zIndex: 70,
      display:'flex', alignItems:'center', justifyContent:'center',
      animation: shakeAnim,
      background: tier === 'god' ? 'rgba(0,0,0,0.55)' : 'rgba(0,0,0,0.85)',
    }}>
      {/* continue the office scene behind the modal for god tier */}
      {tier === 'god' && phase !== 'releasing' && (
        <div style={{
          position:'absolute', inset: 0,
          opacity: 0.55,
          filter: 'blur(1px) brightness(0.8)',
          pointerEvents:'none',
        }}>
          <div style={{ width:'min(420px, 100vw)', margin:'0 auto', padding: 10, paddingTop: 80 }}>
            <OfficeScene
              agents={agents}
              project={project}
              day={day}
              activeEvents={[]}
              hiringArrival={null}
              dayTransition={null}
              eventReacting={false}
              shippingCheer={true}
              deskCount={deskCount}
              onDeskTap={null}
              mascotWaving={true}
              shipFanfare={true}
            />
          </div>
        </div>
      )}

      {/* god-tier flash */}
      {phase === 'fanfare' && tier === 'god' && (
        <div style={{
          position:'absolute', inset:0,
          background:'#fff',
          animation:'flashWhite 400ms ease-out',
          pointerEvents:'none',
        }}/>
      )}
      {/* confetti for god tier */}
      {phase === 'fanfare' && tier === 'god' && <ConfettiBurst />}

      <div style={{
        width:'min(360px, 92%)',
        background: SURFACE,
        border: `3px solid ${tier === 'god' ? GOLD : tier === 'good' ? '#fb923c' : BORDER_2}`,
        borderRadius: 10,
        padding: 18,
        textAlign:'center',
        boxShadow: tier === 'god'
          ? '0 0 60px rgba(251,191,36,0.8), 0 0 120px rgba(251,191,36,0.4)'
          : tier === 'good'
          ? '0 0 40px rgba(251,146,60,0.6)'
          : '0 10px 30px rgba(0,0,0,0.7)',
        position:'relative',
        zIndex: 2,
      }}>
        {phase === 'releasing' && (
          <div style={{ padding:'20px 0' }}>
            <div className="ps2p" style={{
              fontSize: 14, color: ACCENT, letterSpacing: 6,
              animation:'releasingPulse 0.8s ease-in-out infinite',
            }}>RELEASING...</div>
            <div style={{ marginTop: 14, fontSize: 14, color: TEXT }}>{review.title}</div>
            <div style={{ marginTop: 4, fontSize: 12, color: MUTED }}>shipped in {review.days} weeks</div>
          </div>
        )}

        {phase !== 'releasing' && (
          <React.Fragment>
            <div className="ps2p" style={{
              fontSize: 10, color: GOLD, letterSpacing: 3, marginBottom: 6,
              ...(tier === 'god' ? {
                background:'linear-gradient(90deg, #ef4444, #f59e0b, #eab308, #22c55e, #3b82f6, #a855f7, #ef4444)',
                backgroundSize:'400% 100%',
                WebkitBackgroundClip:'text', backgroundClip:'text',
                WebkitTextFillColor:'transparent', color:'transparent',
                animation:'rainbowShift 2s linear infinite',
              } : {})
            }}>PROJECT SHIPPED!</div>
            <div style={{ fontSize: 15, color: TEXT, marginBottom: 12 }}>{review.title}</div>

            <div style={{
              background: SURFACE_2, border:`2px solid ${awardColor}`, borderRadius: 8,
              padding: 16, marginBottom: 10,
              position:'relative',
            }}>
              <div className="ps2p" style={{ fontSize: 8, color: MUTED, letterSpacing: 2, marginBottom: 10 }}>REVIEW SCORE</div>
              <div style={{
                fontFamily:'"Press Start 2P", monospace',
                fontSize: 46, color: awardColor,
                display:'flex', justifyContent:'center', alignItems:'center',
                gap: 6, minHeight: 52,
              }}>
                {scoreStr.split('').map((d, i) => (
                  <span key={i} style={{
                    display:'inline-block',
                    opacity: i < digitsShown ? 1 : 0,
                    animation: i < digitsShown
                      ? 'digitSlam 280ms cubic-bezier(.2,1.6,.4,1) backwards'
                      : 'none',
                  }}>{d}</span>
                ))}
                <span style={{ fontSize: 18, color: MUTED, marginLeft: 6 }}>/ 40</span>
              </div>
              {phase !== 'digits' && (
                <React.Fragment>
                  <div style={{ fontSize: 26, marginTop: 6, color: awardColor, letterSpacing: 2 }}>
                    {'★'.repeat(stars)}{'☆'.repeat(5 - stars)}
                  </div>
                  <div style={{ fontSize: 13, color: TEXT, marginTop: 8, fontStyle:'italic', padding:'0 4px' }}>"{review.blurb}"</div>
                </React.Fragment>
              )}
            </div>

            {phase === 'awards' && (
              <React.Fragment>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap: 8, marginBottom: 10 }}>
                  <div style={{ background: SURFACE_2, border:`1px solid ${GOLD}`, borderRadius: 4, padding: 8 }}>
                    <div style={{ fontSize: 10, color: MUTED, letterSpacing: 1 }}>MONEY</div>
                    <div style={{ fontSize: 18, color: GOLD }}>+{fmtMoney(review.money)}</div>
                  </div>
                  <div style={{ background: SURFACE_2, border:`1px solid ${ACCENT}`, borderRadius: 4, padding: 8 }}>
                    <div style={{ fontSize: 10, color: MUTED, letterSpacing: 1 }}>FAME</div>
                    <div style={{ fontSize: 20, color: ACCENT }}>+{review.rep}</div>
                  </div>
                </div>

                {review.agentAwards && review.agentAwards.length > 0 && (
                  <div style={{ marginBottom: 10, fontSize: 11, color: MUTED, textAlign:'left' }}>
                    {review.agentAwards.map((a, i) => (
                      <div key={i}>• {a}</div>
                    ))}
                  </div>
                )}

                <button onClick={() => { sfx.click(); onContinue(); }} style={{
                  width:'100%',
                  background:'linear-gradient(180deg, #22d3ee 0%, #0891b2 100%)',
                  border:'2px solid #0e7490', color:'#042',
                  padding:'10px', borderRadius: 4,
                  fontFamily:'"Press Start 2P", monospace', fontSize: 10, letterSpacing: 2,
                  cursor:'pointer',
                }}>PICK NEXT PROJECT ▶</button>
              </React.Fragment>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function ConfettiBurst() {
  const pieces = React.useMemo(() => {
    const out = [];
    const colors = ['#ef4444','#f59e0b','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899'];
    for (let i = 0; i < 40; i++) {
      out.push({
        id: i,
        x: rand(0, 100),
        cfx: rand(-30, 30),
        dur: rand(1600, 2800),
        delay: rand(0, 300),
        rot: rand(180, 900),
        color: pick(colors),
        size: irand(6, 12),
      });
    }
    return out;
  }, []);
  return (
    <div style={{ position:'absolute', inset:0, pointerEvents:'none', overflow:'hidden' }}>
      {pieces.map(p => (
        <div key={p.id} style={{
          position:'absolute',
          left: `${p.x}%`, top: -10,
          width: p.size, height: p.size * 0.4,
          background: p.color,
          '--cx': '0px',
          '--cfx': `${p.cfx}px`,
          '--cr': `${p.rot}deg`,
          animation: `confettiFall ${p.dur}ms ${p.delay}ms linear forwards`,
        }}/>
      ))}
    </div>
  );
}

// ═══ LEGENDARY PULL FANFARE ════════════════════════════════════════
function LegendaryPull({ agent, onDismiss }) {
  React.useEffect(() => {
    sfx.legendaryFlash();
    setTimeout(() => sfx.fanfareLegend(), 400);
    const id = setTimeout(onDismiss, 3200);
    return () => clearTimeout(id);
  }, []);
  const particles = React.useMemo(() => {
    const out = [];
    for (let i = 0; i < 24; i++) {
      const angle = (i / 24) * Math.PI * 2;
      out.push({
        id: i,
        px: Math.cos(angle) * rand(120, 240),
        py: Math.sin(angle) * rand(120, 240) + 80,
        color: i % 2 === 0 ? GOLD : '#fff',
        delay: rand(0, 250),
      });
    }
    return out;
  }, []);
  return (
    <div onClick={onDismiss} style={{
      position:'fixed', inset: 0, zIndex: 80,
      background:'rgba(0,0,0,0.9)',
      animation:'flashGold 1s ease-out',
      display:'flex', alignItems:'center', justifyContent:'center',
      cursor:'pointer',
    }}>
      {particles.map(p => (
        <div key={p.id} style={{
          position:'absolute', top:'50%', left:'50%',
          width: 8, height: 8, background: p.color, borderRadius:'50%',
          boxShadow: `0 0 12px ${p.color}`,
          '--px': `${p.px}px`, '--py': `${p.py}px`,
          animation: `particleBurst 1.6s ${p.delay}ms ease-out forwards`,
        }}/>
      ))}

      <div style={{
        position:'absolute', top:'50%', left:'50%',
        transform:'translate(-50%,-50%)',
        animation:'cardFlipBig 3s ease-out forwards',
        transformStyle:'preserve-3d',
      }}>
        <div style={{
          width: 180, height: 260,
          background:'linear-gradient(180deg, #2a1f0a 0%, #1a1505 100%)',
          border:'4px solid '+GOLD,
          borderRadius: 10,
          boxShadow:`0 0 40px ${GOLD}, inset 0 0 30px rgba(251,191,36,0.3)`,
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          padding: 14,
        }}>
          <div style={{
            fontFamily:'"Press Start 2P", monospace',
            fontSize: 11, color: GOLD, letterSpacing: 2, marginBottom: 14,
            animation:'legendText 1.2s ease-in-out infinite',
          }}>LEGENDARY!</div>
          <PixelSprite sprite={agent.sprite} mood="cheer" size={60}/>
          <div style={{ marginTop: 14, fontSize: 14, color:'#fff', textAlign:'center' }}>{agent.name}</div>
          <div style={{ marginTop: 6, fontSize: 12, color: GOLD, textTransform:'uppercase', letterSpacing: 1 }}>{agent.trait}</div>
        </div>
      </div>

      <div style={{
        position:'absolute', bottom: 60, left:'50%', transform:'translateX(-50%)',
        fontSize: 11, color:'#fff', opacity: 0.8, fontFamily:'"Press Start 2P", monospace',
        letterSpacing: 2,
      }}>tap to continue</div>
    </div>
  );
}

// ═══ AVATAR ══════════════════════════════════════════════════════════
function Avatar({ seed, size = 44 }) {
  const { bg, fg, shape, initials } = seed;
  const common = { width: size, height: size, flexShrink: 0, display:'flex', alignItems:'center', justifyContent:'center', color: '#fff', fontFamily: '"Press Start 2P", monospace', fontSize: size * 0.28, letterSpacing: 1, background: `linear-gradient(145deg, ${bg} 0%, ${fg} 100%)`, border: `2px solid ${BG}` };
  const style = shape === 0 ? { ...common, borderRadius: '50%' }
              : shape === 1 ? { ...common, borderRadius: 4 }
              : { ...common, borderRadius: 4, transform:'rotate(45deg)' };
  const textStyle = shape === 2 ? { transform:'rotate(-45deg)' } : {};
  return (
    <div style={style}>
      <span style={textStyle}>{initials}</span>
    </div>
  );
}

// ── primitives ─────────────────────────────────────────────────────
function ProgressBar({ value, max, color = ACCENT, height = 6, glow = false }) {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  return (
    <div style={{ width:'100%', height, background:'#0a0c12', border:`1px solid ${BORDER}`, borderRadius: 3, overflow:'hidden', position:'relative' }}>
      <div style={{
        width:`${pct}%`, height:'100%',
        background: `linear-gradient(90deg, ${color} 0%, ${color}cc 100%)`,
        transition:'width 260ms cubic-bezier(.2,.8,.2,1)',
        boxShadow: glow && pct > 0 ? `0 0 8px ${color}` : 'none',
      }}/>
    </div>
  );
}

function StatRow({ k, v, compact }) {
  const color = v >= 70 ? GOLD : v >= 50 ? ACCENT : v >= 30 ? '#94a3b8' : MUTED;
  return (
    <div style={{ display:'flex', alignItems:'center', gap: 6, fontSize: compact ? 13 : 15 }}>
      <span style={{ width: 16, textAlign:'center' }}>{STAT_ICONS[k]}</span>
      <span style={{ width: 60, color: MUTED, textTransform:'uppercase', fontSize: 11, letterSpacing: 1 }}>{k}</span>
      <div style={{ flex:1 }}>
        <ProgressBar value={v} max={100} color={color} height={5} />
      </div>
      <span style={{ width: 26, textAlign:'right', color: TEXT, fontVariantNumeric:'tabular-nums' }}>{v}</span>
    </div>
  );
}

function RarityBadge({ rarity }) {

  return <span style={{

}

function AgentCard({ agent, selected, assignedTo, onClick, small = false }) {

  const w = small ? 128 : 150;
  return (
    <div
      onClick={onClick}
      style={{
        width: w, minWidth: w,
        background: `linear-gradient(180deg, ${SURFACE_2} 0%, ${SURFACE} 100%)`,
        border: `2px solid ${selected ? '#fff' : r.color}`,
        borderRadius: 6,
        padding: 8,
        cursor: onClick ? 'pointer' : 'default',
        position:'relative',
        animation: anim,
        boxShadow: selected ? '0 0 0 3px rgba(255,255,255,0.25)' : 'none',
        transition:'box-shadow 120ms ease, border-color 120ms ease, transform 120ms ease',
      }}
    >
      <div style={{ display:'flex', alignItems:'center', gap: 6, marginBottom: 6 }}>
        <Avatar seed={agent.avatar} size={32} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{
            fontSize: 13, color: TEXT, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
            lineHeight: 1,
          }}>{agent.name}</div>
          <div style={{ marginTop: 3, display:'flex', alignItems:'center', gap: 4 }}>
            <RarityBadge rarity={agent.rarity} />
            <span style={{ fontSize: 10, color: MUTED, textTransform:'uppercase', letterSpacing: 0.5 }}>L{agent.level}</span>
          </div>
        </div>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap: 2 }}>
        {STAT_ORDER.map(s => (
          <StatRow key={s} k={s} v={agent.stats[s]} compact />
        ))}
      </div>

      <div style={{
        marginTop: 6, textAlign:'center',
        fontSize: 10, color: r.color, textTransform:'uppercase', letterSpacing: 1,
        border:`1px dashed ${r.color}`, borderRadius: 3, padding:'2px 4px',
      }}>{agent.trait}</div>

      {assignedTo && (
        <div style={{
          position:'absolute', top:-6, right:-6,
          background: SUCCESS, color:'#062', fontSize: 9,
          fontFamily:'"Press Start 2P", monospace',
          padding:'3px 6px', borderRadius: 3, letterSpacing: 1,
        }}>ON {assignedTo}</div>
      )}

// ── project panel ──────────────────────────────────────────────────
function ProjectPanel({ project, agents, selectedAgentId, onAssign, onShip, panelRef }) {
  const allDone = project.tasks.every(t => t.progress >= t.need);
  return (
    <Section sectionRef={panelRef} title="ACTIVE PROJECT" right={
      <div style={{ fontSize: 11, color: MUTED }}>W{project.daysSpent} · {project.scope.toUpperCase()}</div>
    }>
      <div style={{ marginBottom: 8 }}>
        <div style={{ fontSize: 17, color: TEXT }}>{project.title}</div>
        <div style={{ fontSize: 12, color: MUTED }}>Client: {project.client} · Pays {fmtMoney(project.pay)}</div>
        <div style={{ fontSize: 13, color: '#b8c1d1', marginTop: 4, fontStyle:'italic' }}>"{project.desc}"</div>
      </div>

      {(project.twists.length > 0 || project.crunch) && (
        <div style={{ display:'flex', gap: 4, flexWrap:'wrap', marginBottom: 8 }}>
          {project.crunch && (
            <div style={{
              background:'#3a0f0f', border:`1px solid ${DANGER}`, borderRadius: 3,
              padding:'3px 6px', fontSize: 11, color: DANGER,
            }}>
              <span style={{ fontFamily:'"Press Start 2P", monospace', fontSize: 7, letterSpacing: 1, marginRight: 4 }}>🔥 CRUNCH</span>
            </div>
          )}
          {project.twists.map(t => (
            <div key={t.key} style={{
              background:'#2a1a3a', border:`1px solid #a855f7`, borderRadius: 3,
              padding:'3px 6px', fontSize: 11,
            }} title={t.desc}>
              <span style={{ fontFamily:'"Press Start 2P", monospace', fontSize: 7, color:'#a855f7', letterSpacing: 1, marginRight: 4 }}>TWIST</span>
              {t.title}
            </div>
          ))}
        </div>
      )}

      <div style={{ display:'flex', flexDirection:'column', gap: 6 }}>
        {project.tasks.map(t => {
          const ag = project.assignments[t.key] ? agents.find(a => a.id === project.assignments[t.key]) : null;
          const done = t.progress >= t.need;
          return (
            <div key={t.key}
              onClick={() => { if (!done) { sfx.click(); onAssign(t.key); } }}
              style={{
                background: SURFACE_2, border:`1px solid ${done ? SUCCESS : (selectedAgentId ? ACCENT : BORDER)}`,
                borderRadius: 4, padding: 8, cursor: done ? 'default' : 'pointer',
                opacity: done ? 0.8 : 1,
                transition:'border-color 160ms ease',
              }}>
              <div style={{ display:'flex', alignItems:'center', gap: 6 }}>
                <span style={{ fontSize: 16 }}>{STAT_ICONS[TASK_STAT[t.key]]}</span>
                <span className="ps2p" style={{ fontSize: 9, color: done ? SUCCESS : TEXT, letterSpacing: 1 }}>
                  {t.label.toUpperCase()}{done ? ' ✓' : ''}
                </span>
                <span style={{ flex:1 }}/>
                {ag ? (
                  <span style={{ fontSize: 12, color: ACCENT }}>→ {ag.name.split(' ').slice(-1)[0]}</span>
                ) : (
                  !done && <span style={{ fontSize: 11, color: MUTED }}>tap to assign</span>
                )}
              </div>
              <div style={{ marginTop: 6 }}>
                <ProgressBar value={t.progress} max={t.need} color={done ? SUCCESS : ACCENT} height={7} glow/>
              </div>
              <div style={{ marginTop: 3, fontSize: 11, color: MUTED, textAlign:'right', fontVariantNumeric:'tabular-nums' }}>
                {Math.floor(t.progress)} / {t.need}
              </div>
            </div>
          );
        })}
      </div>

      {allDone && !project.shipped && (
        <button onClick={() => { sfx.coin(); onShip(); }} style={{
          width:'100%', marginTop: 10,
          background:'linear-gradient(180deg, #fbbf24 0%, #b45309 100%)',
          border:'2px solid #92400e', color:'#211',
          padding:'10px 12px', fontFamily:'"Press Start 2P", monospace',
          fontSize: 10, letterSpacing: 2,
          borderRadius: 4, cursor:'pointer',
          animation:'pulseRing 1.6s ease-out infinite',
        }}>★ SHIP IT ★</button>
      )}
    </Section>

function rollHireOffers(reputation) {
  const out = [];
  for (let i = 0; i < 3; i++) {
    const roll = Math.random();
    let pool;
    if (roll < 0.04 && reputation >= 20) pool = AGENT_TEMPLATES.filter(t => t.rarity === 'legendary');
    else if (roll < 0.14) pool = AGENT_TEMPLATES.filter(t => t.rarity === 'epic');
    else if (roll < 0.45) pool = AGENT_TEMPLATES.filter(t => t.rarity === 'rare');
    else pool = AGENT_TEMPLATES.filter(t => t.rarity === 'common');
    if (pool.length === 0) pool = AGENT_TEMPLATES.filter(t => t.rarity === 'common');
    out.push(pick(pool));
  }
  return out;
}

function rollProjectOffers(reputation) {
  const offers = [];
  const allowed = PROJECT_POOL.filter(p => {
    if (p.scope === 'flagship') return reputation >= 15;
    if (p.scope === 'medium')   return reputation >= 4;
    return true;
  });
  const shuffled = allowed.slice().sort(() => Math.random() - 0.5);
  for (const tpl of shuffled.slice(0, 3)) {
    const attachTwists = tpl.scope === 'flagship' ? 2 : (Math.random() < 0.35 ? 1 : 0);
    offers.push(makeProject(tpl, attachTwists));
  }
  return offers;
}

function App() {
  // refs
  const projectPanelRef = React.useRef(null);
  const shopRef = React.useRef(null);

  // popups
  const [popups, setPopups] = React.useState([]);
  const popupIdRef = React.useRef(1);
  const spawnPopup = React.useCallback((text, color, x, y, opts = {}) => {
    const id = popupIdRef.current++;
    setPopups(prev => [...prev, { id, text, color, x, y, ...opts }]);
    setTimeout(() => {
      setPopups(prev => prev.filter(p => p.id !== id));
    }, opts.dur || 1200);
  }, []);

  // global state
  const [dayTransition, setDayTransition] = React.useState(null);
  const [eventReacting, setEventReacting] = React.useState(false);
  const [shippingCheer, setShippingCheer] = React.useState(false);
  const [shipFanfare,   setShipFanfare]   = React.useState(false);
  const [hireArrival, setHireArrival] = React.useState(null);
  const [legendaryPull, setLegendaryPull] = React.useState(null);
  const [mascotWaving, setMascotWaving] = React.useState(false);

  // mascot periodic wave
  React.useEffect(() => {
    const id = setInterval(() => {
      setMascotWaving(true);
      setTimeout(() => setMascotWaving(false), 1600);
    }, 12000 + Math.random() * 8000);
    return () => clearInterval(id);
  }, []);

  const makeInitial = () => {
    const starter = makeAgentFromTemplate(AGENT_TEMPLATES[0]);
    const firstProject = makeProject(PROJECT_POOL[0], 0);
    return {
      money: 10000,   // $10K starter
      reputation: 0,
      day: 1,
      agents: [starter],
      project: firstProject,
      infra: STARTER_INFRA.map(i => ({ ...i })),
      hireOffers: rollHireOffers(0),
      hireOffersDay: 1,
      activeEvents: [],
      log: [{ day: 1, text: 'Studio founded. Welcome aboard.' }],
      daysSinceLastEvent: 0,
      pendingReview: null,
      pendingOffers: null,
      eventPopover: null,
      toast: null,
      selectedAgentId: starter.id,
      rosterOpen: false,
      detailAgent: null,
      saveCount: 1,
    };
  };

  const [s, setS] = React.useState(makeInitial);

  React.useEffect(() => {
    const unlock = () => { getAudio(); document.removeEventListener('pointerdown', unlock); };
    document.addEventListener('pointerdown', unlock);
    return () => document.removeEventListener('pointerdown', unlock);
  }, []);

  // load
  React.useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.agents && parsed.project) {
          parsed.agents = parsed.agents.map(a => ({
            ...a,
            sprite: a.sprite || spriteSeed(a.name, a.rarity),
            mood: a.mood || 'idle',
            stamina: a.stamina == null ? 100 : a.stamina,
          }));
          if (!parsed.project.hype) parsed.project.hype = irand(10, 30);
          setS(prev => ({ ...prev, ...parsed, toast: null, eventPopover: null }));
        }
      }
    } catch (_) {}
  }, []);

  // save
  React.useEffect(() => {
    try {
      const snapshot = {
        money: s.money, reputation: s.reputation, day: s.day,
        agents: s.agents, project: s.project, infra: s.infra,
        hireOffers: s.hireOffers, hireOffersDay: s.hireOffersDay,
        activeEvents: s.activeEvents, log: s.log,
        daysSinceLastEvent: s.daysSinceLastEvent,
        selectedAgentId: s.selectedAgentId,
        saveCount: (s.saveCount || 0) + 1,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
    } catch (_) {}
  }, [s.money, s.reputation, s.day, s.agents, s.project, s.infra, s.hireOffers, s.activeEvents, s.log]);

  const pushToast = (text) => {
    setS(prev => ({ ...prev, toast: text }));
    setTimeout(() => setS(prev => (prev.toast === text ? { ...prev, toast: null } : prev)), 2400);
  };

  const deskCount = React.useMemo(() => {
    let base = 3;
    for (const i of s.infra) if (i.owned && i.deskBonus) base += i.deskBonus;
    return Math.min(base, 5);
  }, [s.infra]);

  // next week
  const onNextDay = () => {
    if (s.pendingReview || s.pendingOffers || s.eventPopover) return;
    sfx.dayChime();

    const targetDay = s.day + 1;
    setDayTransition({ active: true, newDay: targetDay });
    setTimeout(() => setDayTransition(null), 650);

    setS(prev => {
      let { money, reputation, day, agents, project, infra, activeEvents, log, daysSinceLastEvent, hireOffers, hireOffersDay, selectedAgentId } = prev;

      let globalMul = 1;
      for (const e of activeEvents) if (e.mul) globalMul *= e.mul;
      for (const i of infra) if (i.owned) globalMul *= i.mul;

      const newAgents = agents.map(a => ({ ...a, stats: { ...a.stats }, xp: { ...a.xp } }));
      const newTasks = project.tasks.map(t => ({ ...t }));

      const xpGains = {};

      for (const t of newTasks) {
        if (t.progress >= t.need) continue;
        const agentId = project.assignments[t.key];
        if (!agentId) continue;
        const agent = newAgents.find(a => a.id === agentId);
        if (!agent) continue;
        const statKey = TASK_STAT[t.key];
        let delta = agent.stats[statKey] * 1.0 + agent.stats.speed * 0.3;

        if (agent.trait === 'Speedy')        delta *= 1.15;
        if (agent.trait === 'Perfectionist' && t.progress < t.need * 0.5) delta *= 0.9;
        if (agent.trait === 'Perfectionist' && t.progress >= t.need * 0.5) delta *= 1.2;
        if (agent.trait === 'Chaotic')       delta *= (0.7 + Math.random() * 0.6);
        if (agent.trait === 'Designer'       && t.key === 'Design') delta *= 1.25;
        if (agent.trait === 'Designer-leaning' && t.key === 'Design') delta *= 1.15;
        if (agent.trait === 'Thorough'       && t.key === 'Brief')  delta *= 1.25;
        if (agent.trait === 'Creative'       && t.key === 'Brief')  delta *= 1.1;
        if (agent.trait === 'Pragmatic'      && t.key === 'Build')  delta *= 1.15;
        if (agent.trait === 'Calm')          delta *= 1.05;
        if (agent.trait === 'Team-Player' && (project.assignments.Brief && project.assignments.Design && project.assignments.Build)) delta *= 1.2;
        if (agent.trait === 'Visionary')     delta *= 1.25;

        delta *= globalMul;

        for (const tw of project.twists) {
          if (tw.mul) {
            if (tw.mul.progress) delta *= tw.mul.progress;
            if (tw.mul.design && t.key === 'Design') delta /= tw.mul.design;
            if (tw.mul.coding && t.key === 'Build')  delta /= tw.mul.coding;
          }
        }

        t.progress = Math.min(t.need, t.progress + delta);
        agent.xp[statKey] = (agent.xp[statKey] || 0) + delta * 0.35;
        agent.xp.speed    = (agent.xp.speed    || 0) + delta * 0.1;
        xpGains[agent.id] = (xpGains[agent.id] || 0) + delta;

        agent.stamina = Math.max(0, (agent.stamina || 100) - 12);
      }

      for (const a of newAgents) {
        const working = Object.values(project.assignments).includes(a.id);
        if (!working) a.stamina = Math.min(100, (a.stamina || 100) + 18);
      }

      const leveled = [];
      for (const a of newAgents) {
        for (const stat of STAT_ORDER) {
          const threshold = 40 + a.stats[stat] * 2;
          if ((a.xp[stat] || 0) >= threshold) {
            a.xp[stat] -= threshold;
            a.stats[stat] = Math.min(100, a.stats[stat] + irand(1, 3));
            leveled.push(`${a.name} +${stat}`);
          }
        }
        const totalStats = STAT_ORDER.reduce((acc, k) => acc + a.stats[k], 0);
        const newLevel = 1 + Math.floor((totalStats - 110) / 30);
        if (newLevel > a.level) { a.level = newLevel; leveled.push(`${a.name} → Lvl ${newLevel}`); }
      }

      // hype drift
      const newHype = Math.max(0, Math.min(100, (project.hype || 20) + irand(-2, 4)));

      const newProject = { ...project, tasks: newTasks, daysSpent: project.daysSpent + 1, hype: newHype };

      const tickedEvents = activeEvents
        .map(e => ({ ...e, daysLeft: e.daysLeft - 1 }))
        .filter(e => e.daysLeft > 0);

      let newLog = log.slice();
      if (leveled.length > 0) newLog.push({ day: day + 1, text: 'Progress: ' + leveled.slice(0, 2).join(', ') });

      let newOffers = hireOffers;
      let newOffersDay = hireOffersDay;
      if (hireOffersDay !== day + 1) {
        newOffers = rollHireOffers(reputation);
        newOffersDay = day + 1;
      }

      let newEventPop = null;
      let newDaysSinceEvent = daysSinceLastEvent + 1;
      const shouldFire = newDaysSinceEvent >= 3 && (newDaysSinceEvent >= 5 || Math.random() < 0.35);
      if (shouldFire) {
        const tpl = pick(EVENT_POOL);
        const instance = { ...tpl, id: nextId('evt'), daysLeft: tpl.days };
        tickedEvents.push(instance);
        newLog.push({ day: day + 1, text: `Event: ${tpl.title}` });
        newDaysSinceEvent = 0;
        newEventPop = instance;

        if (tpl.repBonus) reputation += tpl.repBonus;
      }

      setTimeout(() => {
        for (const [aid, dx] of Object.entries(xpGains)) {
          if (dx > 0 && projectPanelRef.current) {
            const r = projectPanelRef.current.getBoundingClientRect();
            const x = r.left + rand(r.width * 0.15, r.width * 0.85);
            const y = r.top + rand(10, 40);
            spawnPopup(`+${Math.round(dx)}xp`, '#fff', x, y, { size: 9, dur: 900 });
          }
        }
      }, 50);

      if (newEventPop) {
        setTimeout(() => {
          setEventReacting(true);
          sfx.event();
          setTimeout(() => setEventReacting(false), 800);
        }, 400);
      }

      let toast = leveled.length > 0 ? leveled[0] : null;

      return {
        ...prev,
        day: day + 1,
        agents: newAgents,
        project: newProject,
        activeEvents: tickedEvents,
        log: newLog.slice(-30),
        daysSinceLastEvent: newDaysSinceEvent,
        hireOffers: newOffers,
        hireOffersDay: newOffersDay,
        reputation,
        eventPopover: newEventPop,
        toast,
      };
    });

    setTimeout(() => setS(prev => prev.toast && !prev.eventPopover ? { ...prev, toast: null } : prev), 2000);
  };

  // assign
  const onAssignTask = (taskKey) => {
    if (!s.selectedAgentId) { pushToast('Select an agent first.'); return; }
    setS(prev => {
      const proj = prev.project;
      const newAssign = { ...proj.assignments };
      for (const k of Object.keys(newAssign)) {
        if (newAssign[k] === prev.selectedAgentId) newAssign[k] = null;
      }
      newAssign[taskKey] = prev.selectedAgentId;
      return { ...prev, project: { ...proj, assignments: newAssign } };
    });
  };

  // ship
  const onShip = () => {
    setShippingCheer(true);
    setShipFanfare(true);
    setTimeout(() => setShippingCheer(false), 1400);
    setTimeout(() => setShipFanfare(false), 3000);

    setS(prev => {
      const p = prev.project;
      let qualitySum = 0;
      let qualityN = 0;
      for (const t of p.tasks) {
        const aid = p.assignments[t.key];
        const agent = aid ? prev.agents.find(x => x.id === aid) : null;
        if (agent) {
          qualitySum += agent.stats[TASK_STAT[t.key]];
          qualityN++;
        }
      }
      const qualityAvg = qualityN > 0 ? qualitySum / qualityN : 10;
      let score = Math.round((qualityAvg / 100) * 35 + irand(0, 5));
      const expectedDays = p.scope === 'small' ? 8 : p.scope === 'medium' ? 14 : 22;
      if (p.daysSpent < expectedDays) score += 1;
      if (p.daysSpent > expectedDays * 1.5) score -= 2;
      // hype bonus
      if (p.hype && p.hype > 70) score += 1;
      let payMul = 1, repMul = 1;
      for (const tw of p.twists) {
        if (tw.scoreDelta) score += tw.scoreDelta;
        if (tw.mul && tw.mul.pay) payMul *= tw.mul.pay;
        if (tw.repMul && score >= 30) repMul *= tw.repMul;
      }
      for (const e of prev.activeEvents) if (e.payBonus) payMul *= (1 + e.payBonus);

      score = Math.max(1, Math.min(40, score));
      const moneyGained = Math.round(p.pay * (0.4 + score / 40) * payMul);
      const repGained   = Math.max(0, Math.round(p.repBase * (score / 30) * repMul));

      const blurb =
        score >= 36 ? 'A rare masterpiece. The press is foaming.' :
        score >= 30 ? 'Seriously good. Word is spreading.' :
        score >= 22 ? 'Solid. Players enjoyed it.' :
        score >= 14 ? 'Mixed reviews. Some nice ideas buried in jank.' :
                     'Rough. Back to the drawing board.';

      const agentAwards = [];
      const newAgents = prev.agents.map(a => {
        const worked = Object.values(p.assignments).includes(a.id);
        if (!worked) return a;
        const statKey = pick(STAT_ORDER);
        const bump = irand(1, 3);
        agentAwards.push(`${a.name} +${bump} ${statKey}`);
        return { ...a, stats: { ...a.stats, [statKey]: Math.min(100, a.stats[statKey] + bump) } };
      });

      const review = {
        title: p.title,
        score,
        money: moneyGained,
        rep: repGained,
        days: p.daysSpent,
        blurb,
        agentAwards,
      };
      return {
        ...prev,
        agents: newAgents,
        money: Math.min(999999000, prev.money + moneyGained),
        reputation: prev.reputation + repGained,
        pendingReview: review,
        project: { ...p, shipped: true },
        log: [...prev.log, { day: prev.day, text: `Shipped "${p.title}" · ${score}/40 · +${fmtMoney(moneyGained)}` }].slice(-30),
      };
    });
  };

  const onReviewContinue = () => {
    setS(prev => {
      const offers = rollProjectOffers(prev.reputation);
      return { ...prev, pendingReview: null, pendingOffers: offers };
    });
  };

  const onPickProject = (proj) => {
    setS(prev => ({
      ...prev,
      project: proj,
      pendingOffers: null,
      log: [...prev.log, { day: prev.day, text: `New project: ${proj.title}` }].slice(-30),
    }));
  };

  // shop
  const onHire = (template, idx) => {
    const cost = hireCost(template);
    setS(prev => {
      if (prev.money < cost) return prev;
      const newAgent = makeAgentFromTemplate(template);
      const newOffers = prev.hireOffers.slice();
      newOffers.splice(idx, 1);

      const slotIdx = Math.min(prev.agents.length, deskCount - 1);
      setTimeout(() => {
        setHireArrival({ agent: newAgent, slotIdx });
        sfx.hire();
        setTimeout(() => setHireArrival(null), 1500);
      }, 10);

      if (newAgent.rarity === 'legendary') {
        setTimeout(() => setLegendaryPull(newAgent), 100);
      }

      return {
        ...prev,
        money: prev.money - cost,
        agents: [...prev.agents, newAgent],
        hireOffers: newOffers,
        log: [...prev.log, { day: prev.day, text: `Hired ${newAgent.name}` }].slice(-30),
        toast: `Hired ${newAgent.name}!`,
      };
    });
    setTimeout(() => setS(prev => prev.toast && prev.toast.startsWith('Hired ') ? { ...prev, toast: null } : prev), 2000);
  };

  const onReroll = () => {
    setS(prev => {
      if (prev.money < 2000) return prev;
      return { ...prev, money: prev.money - 2000, hireOffers: rollHireOffers(prev.reputation) };
    });
  };

  const onBuyInfra = (key) => {
    setS(prev => {
      const i = prev.infra.find(x => x.key === key);
      if (!i || i.owned || prev.money < i.cost) return prev;
      return {
        ...prev,
        money: prev.money - i.cost,
        infra: prev.infra.map(x => x.key === key ? { ...x, owned: true } : x),
        log: [...prev.log, { day: prev.day, text: `Bought: ${i.name}` }].slice(-30),
        toast: `${i.name} online.`,
      };
    });
    setTimeout(() => setS(prev => prev.toast && prev.toast.endsWith('online.') ? { ...prev, toast: null } : prev), 2000);
  };

  const onTrain = (agentId, stat, baseCost) => {
    setS(prev => {
      const gpu = prev.infra.find(i => i.key === 'gpu' && i.owned);
      const cost = Math.round(baseCost * (gpu ? 0.7 : 1));
      if (prev.money < cost) return prev;
      const agents = prev.agents.map(a => a.id === agentId
        ? { ...a, stats: { ...a.stats, [stat]: Math.min(100, a.stats[stat] + 4) } }
        : a);
      return {
        ...prev,
        money: prev.money - cost,
        agents,
        log: [...prev.log, { day: prev.day, text: `Trained ${stat} for ${agents.find(a => a.id === agentId)?.name}` }].slice(-30),
        toast: `+4 ${stat} trained.`,
      };
    });
    setTimeout(() => setS(prev => prev.toast && prev.toast.endsWith('trained.') ? { ...prev, toast: null } : prev), 2000);
  };

  const onReset = () => {
    if (!confirm('Reset studio? All progress lost.')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
    setS(makeInitial());
  };

  const canNextDay = !s.pendingReview && !s.pendingOffers && !s.eventPopover && !s.project.shipped;
  const canReroll = s.money >= 2000 && !s.pendingReview && !s.pendingOffers;

  return (
    <div style={{
      width:'min(420px, 100vw)',
      minHeight:'100vh',
      background: BG,
      color: TEXT,
      display:'flex', flexDirection:'column',
      paddingBottom:'max(16px, env(safe-area-inset-bottom))',
      boxSizing:'border-box',
      position:'relative',
    }}>
      <div style={{
        padding:'14px 12px 6px', textAlign:'center',
        borderBottom:`1px solid ${BORDER_2}`, background: SURFACE,
      }}>
        <div className="ps2p" style={{ fontSize: 12, color: GOLD, letterSpacing: 3, textShadow:`0 0 8px rgba(251,191,36,0.5)` }}>AGENT DEV STORY</div>
        <div style={{ fontSize: 11, color: NEON, marginTop: 2, letterSpacing: 1 }}>
          v0.3 · isometric studio · neon nights
        </div>
      </div>

      <TopHud day={s.day} onNextDay={onNextDay} disabled={!canNextDay}/>

      <div style={{ padding: 10, flex: 1 }}>
        {/* ISO OFFICE */}
        <OfficeScene
          agents={s.agents}
          project={s.project}
          day={s.day}
          activeEvents={s.activeEvents}
          hiringArrival={hireArrival}
          dayTransition={dayTransition}
          eventReacting={eventReacting}
          shippingCheer={shippingCheer}
          deskCount={deskCount}
          mascotWaving={mascotWaving}
          shipFanfare={shipFanfare}
          onDeskTap={(slotIdx) => {
            const a = s.agents[slotIdx];
            if (a) {
              sfx.click();
              setS(prev => ({ ...prev, selectedAgentId: prev.selectedAgentId === a.id ? null : a.id, detailAgent: null }));
            }
          }}
        />

        {/* KAIRO HUD BELOW OFFICE */}
        <KairoHud
          saveCount={s.saveCount || 1}
          day={s.day}
          money={s.money}
          project={s.project}
          reputation={s.reputation}
          hype={s.project?.hype || 0}
          fame={s.reputation}
        />

        <ProjectPanel
          panelRef={projectPanelRef}
          project={s.project}
          agents={s.agents}
          selectedAgentId={s.selectedAgentId}
          onAssign={onAssignTask}
          onShip={onShip}
        />

        <RosterStrip
          agents={s.agents}
          selectedAgentId={s.selectedAgentId}
          onSelect={(id) => setS(prev => ({ ...prev, selectedAgentId: prev.selectedAgentId === id ? null : id }))}
          onShowRoster={() => setS(prev => ({ ...prev, rosterOpen: true }))}
          currentProject={s.project}
        />

        <ShopPanel
          shopRef={shopRef}
          money={s.money}
          hireOffers={s.hireOffers}
          onHire={onHire}
          infra={s.infra}
          onBuyInfra={onBuyInfra}
          agents={s.agents}
          onTrain={onTrain}
          onReroll={onReroll}
          canReroll={canReroll}
        />

        <EventTicker activeEvents={s.activeEvents} log={s.log}/>

        <div style={{ textAlign:'center', marginTop: 8 }}>
          <button onClick={onReset} style={dangerBtn}>RESET STUDIO</button>
        </div>

        <div style={{ textAlign:'center', fontSize: 11, color: MUTED, marginTop: 8, letterSpacing: 1 }}>
          prototype v0.3 · isometric studio · local save only
        </div>
      </div>

      {/* modals */}
      {s.rosterOpen && (
        <RosterModal
          agents={s.agents}
          onClose={() => setS(prev => ({ ...prev, rosterOpen: false }))}
          onDetail={(a) => setS(prev => ({ ...prev, detailAgent: a }))}
        />
      )}
      {s.detailAgent && (
        <AgentDetailModal
          agent={s.agents.find(x => x.id === s.detailAgent.id) || s.detailAgent}
          onClose={() => setS(prev => ({ ...prev, detailAgent: null }))}
        />
      )}
      {s.pendingReview && (
        <ReviewReveal
          review={s.pendingReview}
          onContinue={onReviewContinue}
          agents={s.agents}
          project={s.project}
          day={s.day}
          deskCount={deskCount}
        />
      )}
      {s.pendingOffers && (
        <ProjectPickerModal
          offers={s.pendingOffers}
          reputation={s.reputation}
          onPick={onPickProject}
        />
      )}
      {s.eventPopover && (
        <EventPopover
          event={s.eventPopover}
          onDismiss={() => setS(prev => ({ ...prev, eventPopover: null }))}
        />
      )}

      {dayTransition && <DayTransition newDay={dayTransition.newDay} />}
      {legendaryPull && (
        <LegendaryPull agent={legendaryPull} onDismiss={() => setLegendaryPull(null)}/>
      )}
      <NumberPopups popups={popups} />

      {s.toast && !s.eventPopover && (
        <div style={{
          position:'fixed', bottom: 24, left:'50%', transform:'translateX(-50%)',
          background: SURFACE, border:`1px solid ${ACCENT}`,
          color: TEXT, padding:'8px 14px', borderRadius: 4,
          fontSize: 14, letterSpacing: 0.3,
          boxShadow:'0 10px 24px rgba(0,0,0,0.5)',
          animation:'toastIn 240ms ease-out',
          zIndex: 20,
        }}>{s.toast}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
