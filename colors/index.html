<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hueday mini — playable prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#141414" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  html { background: #141414; }
  body {
    background: #141414;
    color: #ededed;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    min-height: 100%;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  button { -webkit-user-select: none; user-select: none; font-family: inherit; }

  @keyframes hueday-theme-fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0);   }
  }
  .theme-reveal {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; margin-bottom: 4px;
    animation: hueday-theme-fade-in 700ms ease both;
    animation-delay: 120ms;
  }
  .theme-label {
    font-size: 9.5px; color: #7a7a7a; letter-spacing: 2.5px;
    text-transform: uppercase; font-weight: 600;
  }
  .theme-name {
    font-size: 17px; color: #ededed; font-weight: 700;
    letter-spacing: 0.5px;
  }
  .theme-desc {
    font-size: 11px; color: #cfcfcf; font-style: italic;
    letter-spacing: 0.2px; text-align: center; max-width: 280px;
    line-height: 1.4;
  }

  @keyframes hueday-pill-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.35); }
    50%      { box-shadow: 0 0 0 6px rgba(250, 204, 21, 0.00); }
  }
  .practice-pill {
    animation: hueday-pill-pulse 1800ms ease-in-out infinite;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ═══════════════════════════════════════════════════════════════════
// Hueday mini — playable prototype (web; pre-Mac trial)
//
// Implements spec §2 (puzzle generator), §3 (feedback), §5 (state),
// §6 (input), §7 (visuals, feedback rendering), §8 (midnight rollover).
//
// v1.1 adds:
//   • Daily Themes (weekday-biased hue palettes + reveal screen)
//   • Practice Mode (unlimited re-attempts of today's puzzle)
//   • Copy Last Guess button
// ═══════════════════════════════════════════════════════════════════

const HD_BG      = '#141414';
const HD_SURFACE = '#1c1c1c';
const HD_BORDER  = '#2a2a2a';
const HD_TEXT    = '#ededed';
const HD_MUTED   = '#7a7a7a';
const HD_DASHED  = '#3a3a3a';
const HD_GREEN   = '#4ade80';
const HD_YELLOW  = '#facc15';
const HD_GREY    = '#6b7280';

const HD_FONT = '-apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif';

const STORAGE_KEY          = 'hueday-mini-state-v1';
const PRACTICE_BEST_KEY    = 'hueday-practice-best';

// ────────────────────────────────────────────────────────────────────
// Daily themes (Feature 1)
// One theme per weekday (Sun=0 … Sat=6).  Each theme contributes a
// set of hue arcs [startDeg, endDeg] (wrap-aware — end may be < start).
// ────────────────────────────────────────────────────────────────────
const THEMES = [
  { // Sunday — wraps 320° → 90°, total 130° arc
    name: 'Sunset',
    description: 'Magenta through red into orange-gold',
    hueRanges: [[320, 90]],
  },
  { // Monday — 135° → 265°, total 130°
    name: 'Oceanic',
    description: 'Aqua to deep blue to blue-violet',
    hueRanges: [[135, 265]],
  },
  { // Tuesday — wraps 350° → 120°, total 130°
    name: 'Harvest',
    description: 'Rose to amber to yellow-gold',
    hueRanges: [[350, 120]],
  },
  { // Wednesday — 55° → 185°, total 130°
    name: 'Woodland',
    description: 'Yellow-green through forest into teal',
    hueRanges: [[55, 185]],
  },
  { // Thursday — 220° → 350°, total 130°
    name: 'Twilight',
    description: 'Blue-violet to deep violet to magenta',
    hueRanges: [[220, 350]],
  },
  { // Friday — full wheel
    name: 'Neon Night',
    description: 'High-contrast saturated hues across the wheel',
    hueRanges: [[0, 360]],
  },
  { // Saturday — wraps 280° → 50°, total 130°
    name: 'Blossoms',
    description: 'Rose to pink to red-orange',
    hueRanges: [[280, 50]],
  },
];

function themeForDate(dateStr) {
  const weekday = new Date(dateStr + 'T12:00:00').getDay();
  return THEMES[weekday];
}

// Arc length of a single [start, end] range, wrap-aware.
// A full wheel [0, 360] → 360. [340, 60] → 80.
function arcLength(range) {
  const [a, b] = range;
  const span = ((b - a) % 360 + 360) % 360;
  return span === 0 ? 360 : span;
}
// Sample a hue that lies `u` fraction into a single arc.
function hueAtArcFraction(range, u) {
  const [a] = range;
  const len = arcLength(range);
  return ((a + u * len) % 360 + 360) % 360;
}
// Map u∈[0,1) proportionally across a list of arcs (by arc length).
function hueFromRanges(ranges, u) {
  const lens = ranges.map(arcLength);
  const total = lens.reduce((s, x) => s + x, 0);
  let target = u * total;
  for (let i = 0; i < ranges.length; i++) {
    if (target < lens[i]) return hueAtArcFraction(ranges[i], target / lens[i]);
    target -= lens[i];
  }
  return hueAtArcFraction(ranges[ranges.length - 1], 0.999);
}

// ────────────────────────────────────────────────────────────────────
// HSB → sRGB rendering (matches SwiftUI's Color(hue:sat:bright:))
// Spec §1.1: canonical color model is HSB. Browsers only expose HSL
// natively, so we convert explicitly.
// ────────────────────────────────────────────────────────────────────
function hsbToRgb(h, s, v) {
  const hh = ((h % 360) + 360) % 360;
  const c  = v * s;
  const hp = hh / 60;
  const x  = c * (1 - Math.abs((hp % 2) - 1));
  let r = 0, g = 0, b = 0;
  if      (hp < 1) { r = c; g = x; }
  else if (hp < 2) { r = x; g = c; }
  else if (hp < 3) { g = c; b = x; }
  else if (hp < 4) { g = x; b = c; }
  else if (hp < 5) { r = x; b = c; }
  else             { r = c; b = x; }
  const m = v - c;
  return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}
function hsbCss(h, s, v) { const [r, g, b] = hsbToRgb(h, s, v); return `rgb(${r}, ${g}, ${b})`; }

// ────────────────────────────────────────────────────────────────────
// Deterministic puzzle generator (spec §2)
// ────────────────────────────────────────────────────────────────────
const MASK64 = 0xFFFFFFFFFFFFFFFFn;

// FNV-1a 64-bit (spec §2.3)
function fnv1a64(str) {
  let h = 0xCBF29CE484222325n;
  const PRIME = 0x100000001B3n;
  for (let i = 0; i < str.length; i++) {
    h = h ^ BigInt(str.charCodeAt(i) & 0xFF);
    h = (h * PRIME) & MASK64;
  }
  return h;
}

// SplitMix64 next_uniform (spec §2.4)
function nextUniform(state) {
  let s = (state + 0x9E3779B97F4A7C15n) & MASK64;
  let z = s;
  z = ((z ^ (z >> 30n)) * 0xBF58476D1CE4E5B9n) & MASK64;
  z = ((z ^ (z >> 27n)) * 0x94D049BB133111EBn) & MASK64;
  z = z ^ (z >> 31n);
  const u = Number(z >> 11n) / 9007199254740992; // 2^53
  return [s, u];
}

// Local-date seed string "YYYY-MM-DD" (spec §2.2)
function localDateString(d = new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Wrap-aware minimum adjacent gap when hues are sorted on the circle.
function minAdjacentGap(hues) {
  const sorted = hues.slice().sort((a, b) => a - b);
  let minGap = Infinity;
  for (let i = 0; i < sorted.length; i++) {
    const a = sorted[i];
    const b = sorted[(i + 1) % sorted.length];
    const gap = i === sorted.length - 1 ? ((360 - a) + b) : (b - a);
    if (gap < minGap) minGap = gap;
  }
  return minGap;
}

// Original uniform generator, preserved as the guaranteed-safe fallback.
function uniformPuzzleHues(stateIn) {
  let state = stateIn;
  let u;
  [state, u] = nextUniform(state); const alpha = u * 60;
  const hues = [];
  for (let i = 0; i < 6; i++) {
    [state, u] = nextUniform(state);
    const j = u * 30 - 15;
    let h = alpha + 60 * i + j;
    h = ((h % 360) + 360) % 360;
    hues.push(h);
  }
  return { state, hues };
}

// Expand narrow theme arcs so 6 hues with ≥20° separation fit.
// 6 slots × 20° = 120° absolute minimum — we pad to 150° for breathing room.
// We widen each arc outward from its center proportionally to the shortage.
function widenRangesForSeparation(ranges, minTotalArc) {
  const total = ranges.reduce((s, r) => s + arcLength(r), 0);
  if (total >= minTotalArc) return ranges;
  const scale = minTotalArc / total;
  return ranges.map(([a, b]) => {
    const len = arcLength([a, b]);
    const center = ((a + len / 2) % 360 + 360) % 360;
    const newLen = len * scale;
    const newA = ((center - newLen / 2) % 360 + 360) % 360;
    const newB = ((center + newLen / 2) % 360 + 360) % 360;
    return [newA, newB];
  });
}

// puzzleForDate(date) → {S, B, hues: [6], theme} — spec §2 + theme bias
function puzzleForDate(dateStr) {
  const theme = themeForDate(dateStr);
  let state = fnv1a64(dateStr);
  let u;
  [state, u] = nextUniform(state); const S = 0.60 + u * 0.15;   // spec §2.5
  [state, u] = nextUniform(state); const B = 0.48 + u * 0.10;   // spec §2.5

  const MIN_GAP = 12;
  const JITTER  = 7; // ±7°

  // Theme arcs are now honest widths (≥130°) so widening should never
  // fire in practice. We keep widenRangesForSeparation as a safety net:
  // it only triggers if a theme's total arc is below the safe floor of
  // 6 × (MIN_GAP + 2·JITTER) = 6 × 26° = 156°. Since all defined themes
  // are ≥130° and we stratify + reroll up to 20 times with MIN_GAP=12°,
  // this floor comfortably fits. Arcs of 130° divided into 6 stratified
  // cells = ~21.7° each; worst-case adjacent gap with ±7° jitter = ~7.7°
  // which CAN dip below MIN_GAP=12° on an unlucky draw — hence the
  // 20-attempt reroll. The widener only fires if that genuinely fails.
  const MIN_TOTAL_ARC = 6 * (MIN_GAP + 2 * JITTER);
  const effectiveRanges = widenRangesForSeparation(theme.hueRanges, MIN_TOTAL_ARC);

  // We keep advancing the seed deterministically — each attempt burns
  // a fresh batch of uniforms so a retry looks like "the next draw",
  // not a re-draw of the same numbers.
  let hues = null;
  for (let attempt = 0; attempt < 20; attempt++) {
    const candidate = [];
    // Stratify u across [0,1) so the 6 slots spread through the
    // combined theme arcs evenly (plus jitter). This cheaply
    // preserves separation when the theme is wide.
    for (let i = 0; i < 6; i++) {
      let uh;
      [state, uh] = nextUniform(state);
      const strat = (i + uh) / 6; // stratified ∈ [i/6, (i+1)/6)
      let h = hueFromRanges(effectiveRanges, strat);

      let uj;
      [state, uj] = nextUniform(state);
      const jitter = (uj * 2 - 1) * JITTER;
      h = ((h + jitter) % 360 + 360) % 360;
      candidate.push(h);
    }
    if (minAdjacentGap(candidate) >= MIN_GAP) { hues = candidate; break; }
    // Perturb & retry — consume more state on next loop iteration.
  }

  if (!hues) {
    // Fallback: original uniform generator, which is guaranteed safe
    // by construction (α + 60·i ± 15 spacing ⇒ min gap ≥ 30°).
    const r = uniformPuzzleHues(state);
    state = r.state;
    hues = r.hues;
  }

  return { S, B, hues, theme };
}

// ────────────────────────────────────────────────────────────────────
// Feedback algorithm (spec §3)
// ────────────────────────────────────────────────────────────────────
function angularDistance(g, t) {
  const d = Math.abs(g - t) % 360;
  return Math.min(d, 360 - d);
}
// Wordle-style cross-slot feedback across a row of continuous hues.
// - GREEN  : guess is within 8° of the target AT THE SAME SLOT (exact hit)
// - YELLOW : guess is within 8° of an unclaimed target AT A DIFFERENT SLOT
//            (right color, wrong position — swap it to the right slot)
// - GREY   : no target available within 8° (not in today's puzzle)
// Each target can only be "claimed" by one slot. If you guess two reds
// but the puzzle has one red, only one slot earns yellow. Wordle rules.
function feedbackForRow(guesses, targets) {
  const EXACT = 8;
  const feedback = new Array(6).fill(null);
  const dist = new Array(6).fill(null);
  // matchedDist[t] = angular distance from target t to the guess slot
  // that claimed it (via same-slot green or cross-slot yellow). Null if
  // the target was never claimed.
  const matchedDist = new Array(6).fill(null);
  const claimed = new Array(6).fill(false);
  // Pass 1 — greens: same-slot exact match
  for (let i = 0; i < 6; i++) {
    const d = angularDistance(guesses[i], targets[i]);
    dist[i] = d;
    if (d <= EXACT) {
      feedback[i] = 'green';
      claimed[i] = true;
      matchedDist[i] = d;
    }
  }
  // Pass 2 — yellows: cross-slot exact (right color, wrong position).
  // Best (closest) unclaimed target wins per slot.
  for (let i = 0; i < 6; i++) {
    if (feedback[i]) continue;
    let bestJ = -1, bestD = Infinity;
    for (let j = 0; j < 6; j++) {
      if (claimed[j]) continue;
      const d = angularDistance(guesses[i], targets[j]);
      if (d <= EXACT && d < bestD) { bestD = d; bestJ = j; }
    }
    if (bestJ !== -1) {
      feedback[i] = 'yellow';
      claimed[bestJ] = true;
      matchedDist[bestJ] = bestD;
    }
  }
  // Pass 3 — everything else is grey
  for (let i = 0; i < 6; i++) if (!feedback[i]) feedback[i] = 'grey';
  return { feedback, dist, matchedDist };
}

// ────────────────────────────────────────────────────────────────────
// Web approximations of spec §7 / §9 hardware feedback
// ────────────────────────────────────────────────────────────────────
function haptic(intensity = 15) {
  if (navigator.vibrate) try { navigator.vibrate(intensity); } catch (_) {}
}
let audioCtx = null;
function chime() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.55);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.6);
  } catch (_) {}
}

// ────────────────────────────────────────────────────────────────────
// Local-storage persistence (spec §5.2)
// Practice best-solve stat is tracked separately so the daily save
// format stays compatible with prior versions.
// ────────────────────────────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (_) { return null; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (_) {}
}
function loadPracticeBest() {
  try {
    const raw = localStorage.getItem(PRACTICE_BEST_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (_) { return null; }
}
function savePracticeBest(dateStr, attempts) {
  try {
    const prev = loadPracticeBest();
    if (prev && prev.dateStr === dateStr && prev.attempts <= attempts) return prev;
    const next = { dateStr, attempts };
    localStorage.setItem(PRACTICE_BEST_KEY, JSON.stringify(next));
    return next;
  } catch (_) { return null; }
}

// ────────────────────────────────────────────────────────────────────
// Visual primitives
// ────────────────────────────────────────────────────────────────────
function TitleBar({ dateStr, practiceMode }) {
  const display = dateStr ? new Date(dateStr + 'T12:00:00').toLocaleDateString(undefined, {
    weekday: 'long', month: 'long', day: 'numeric',
  }) : '';
  return (
    <div style={{ paddingTop: 18, paddingBottom: 14, textAlign: 'center', position: 'relative' }}>
      <div style={{
        fontSize: 13, fontWeight: 600, letterSpacing: 3,
        color: HD_TEXT, textTransform: 'uppercase', cursor: 'default',
      }}>Hueday <span style={{ color: HD_MUTED, fontSize: 10 }}>mini</span></div>
      <div style={{
        fontSize: 11, color: HD_MUTED, marginTop: 3, letterSpacing: 0.2,
      }}>{display}</div>
      {practiceMode && (
        <div className="practice-pill" style={{
          position: 'absolute', top: 14, right: 14,
          background: 'rgba(250, 204, 21, 0.12)',
          color: HD_YELLOW,
          border: `1px solid ${HD_YELLOW}`,
          padding: '3px 8px', borderRadius: 999,
          fontSize: 9, letterSpacing: 1.6, fontWeight: 700,
          textTransform: 'uppercase',
        }}>Practice</div>
      )}
    </div>
  );
}

function Swatch({ hue, S, B, feedback, isActive, isEditable, size = 46, showDeg, distance, onClick, rowIdx, slotIdx, onDragStart }) {
  const outline =
      feedback === 'green'  ? HD_GREEN
    : feedback === 'yellow' ? HD_YELLOW
    : feedback === 'grey'   ? HD_GREY
    : null;

  const empty = hue == null;
  const bg = empty ? 'transparent' : hsbCss(hue, S, B);

  let border;
  if (empty) border = `1.5px dashed ${isActive ? '#fff' : HD_DASHED}`;
  else if (outline) border = `2px solid ${outline}`;
  else if (isActive) border = `2px solid #fff`;
  else border = `2px solid transparent`;

  const canDragFrom = !empty && onDragStart != null;

  return (
    <div
      data-drop-row={rowIdx != null ? rowIdx : undefined}
      data-drop-slot={slotIdx != null ? slotIdx : undefined}
      onPointerDown={canDragFrom ? (e) => onDragStart(e, hue, rowIdx, slotIdx) : undefined}
      onClick={isEditable ? onClick : undefined}
      style={{
        width: size, height: size, borderRadius: 10, background: bg, border,
        boxShadow: isActive && !empty ? '0 0 0 3px rgba(255,255,255,0.15)' : 'none',
        transition: 'background-color 80ms linear, border-color 120ms ease',
        flexShrink: 0, position: 'relative',
        cursor: canDragFrom ? 'grab' : isEditable ? 'pointer' : 'default',
        touchAction: canDragFrom ? 'none' : 'auto',
      }}
    >
      {feedback === 'yellow' && (
        <div style={{
          position: 'absolute', top: -5, right: -5,
          width: 16, height: 16, borderRadius: 8,
          background: HD_YELLOW, color: '#0a0a0a',
          fontSize: 9, fontWeight: 900,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 0 0 2px ' + HD_BG,
          lineHeight: 1, pointerEvents: 'none',
        }} title="Right color, wrong slot">↔</div>
      )}
      {showDeg && distance != null && (
        <div style={{
          position: 'absolute', bottom: -17, left: 0, right: 0, textAlign: 'center',
          fontSize: 9.5, color: HD_MUTED, letterSpacing: 0.3,
          fontVariantNumeric: 'tabular-nums', fontFamily: HD_FONT,
        }}>{Math.round(distance)}°</div>
      )}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────
// How-to-Play / legend — visible instructions + feedback legend.
// Expanded by default on first load; collapses to a header the user
// can re-open with the ▼ control.
// ────────────────────────────────────────────────────────────────────
function LegendRow({ color, label, text, arrow }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 11 }}>
      <div style={{
        width: 20, height: 20, borderRadius: 5,
        border: '2px solid ' + color,
        background: 'rgba(255,255,255,0.04)',
        position: 'relative', flexShrink: 0,
      }}>
        {arrow && <div style={{
          position: 'absolute', top: -5, right: -5,
          width: 12, height: 12, borderRadius: 6,
          background: color, color: '#0a0a0a',
          fontSize: 7, fontWeight: 900,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 0 0 2px ' + HD_BG,
          lineHeight: 1,
        }}>↔</div>}
      </div>
      <div style={{ fontWeight: 700, letterSpacing: 1, fontSize: 10, width: 60, color: color }}>{label}</div>
      <div style={{ color: HD_TEXT, flex: 1 }}>{text}</div>
    </div>
  );
}
function HowToPlay({ open, onToggle, onReset }) {
  return (
    <div style={{
      margin: '0 18px 10px',
      background: HD_SURFACE,
      border: '1px solid ' + HD_BORDER,
      borderRadius: 10,
      overflow: 'hidden',
    }}>
      <div onClick={onToggle} style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '10px 12px', cursor: 'pointer', userSelect: 'none',
      }}>
        <div style={{
          fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase',
          color: HD_TEXT,
        }}>How to play</div>
        <div style={{ fontSize: 11, color: HD_MUTED }}>{open ? '▲' : '▼'}</div>
      </div>
      {open && (
        <div style={{ padding: '0 12px 12px', color: '#cfcfcf', fontSize: 11, lineHeight: 1.55 }}>
          <p style={{ margin: '2px 0 8px' }}>
            <span style={{ color: HD_TEXT, fontWeight: 600 }}>Goal:</span>{' '}
            match today's <b>6 hidden colors</b> in 6 guesses. One puzzle a day.
          </p>
          <p style={{ margin: '0 0 10px' }}>
            <span style={{ color: HD_TEXT, fontWeight: 600 }}>How:</span>{' '}
            tap a slot, drag the color bar to pick its hue, repeat for all 6, then press <b>Submit</b>. Tap any filled slot before submit to re-edit.
          </p>
          <div style={{
            margin: '0 0 6px', color: HD_MUTED, fontSize: 9.5, letterSpacing: 2, textTransform: 'uppercase',
          }}>Feedback after each guess</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
            <LegendRow color={HD_GREEN}  label="GREEN"  text="exact color, right slot — lock it in" />
            <LegendRow color={HD_YELLOW} label="YELLOW" text="right color, wrong slot — move it somewhere else" arrow />
            <LegendRow color={HD_GREY}   label="GREY"   text="not in today's puzzle — try a different hue" />
          </div>
          <p style={{ margin: '10px 0 0', color: HD_MUTED, fontSize: 10, lineHeight: 1.45 }}>
            Hints are within <b>8°</b> on the color wheel. Get all six green in 6 tries to win.
          </p>
          <p style={{ margin: '8px 0 0', color: HD_MUTED, fontSize: 10, lineHeight: 1.45, fontStyle: 'italic' }}>
            Today's puzzle has a <b>theme</b> — revealed at the end.
          </p>
          <div style={{
            marginTop: 12, paddingTop: 10,
            borderTop: '1px solid ' + HD_BORDER,
            display: 'flex', justifyContent: 'center',
          }}>
            <button
              onClick={(e) => { e.stopPropagation(); onReset && onReset(); }}
              style={{
                background: 'transparent',
                border: '1px solid ' + HD_BORDER,
                color: HD_MUTED,
                fontSize: 10, fontWeight: 600, letterSpacing: 1.5,
                textTransform: 'uppercase',
                padding: '6px 14px', borderRadius: 8,
                cursor: 'pointer', fontFamily: HD_FONT,
              }}
            >Reset today's progress</button>
          </div>
        </div>
      )}
    </div>
  );
}

function GuessGrid({ rows, puzzle, currentRow, activeSlotIdx, onSlotTap, onDragStart, swatchSize, rowGap, colGap, showDeg }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: rowGap, alignItems: 'center' }}>
      {rows.map((row, rIdx) => (
        <div key={rIdx} style={{ display: 'flex', gap: colGap }}>
          {row.slots.map((slot, sIdx) => {
            const isActive = rIdx === currentRow && sIdx === activeSlotIdx && !row.submitted;
            const isEditable = rIdx === currentRow && !row.submitted;
            return (
              <Swatch
                key={sIdx}
                hue={slot.hue}
                S={puzzle.S}
                B={puzzle.B}
                feedback={row.submitted ? slot.feedback : null}
                isActive={isActive}
                isEditable={isEditable}
                rowIdx={rIdx}
                slotIdx={sIdx}
                onDragStart={onDragStart}
                size={swatchSize}
                showDeg={showDeg && row.submitted}
                distance={row.submitted ? slot.distance : null}
                onClick={() => onSlotTap && onSlotTap(rIdx, sIdx)}
              />
            );
          })}
        </div>
      ))}
    </div>
  );
}

function TargetRow({ puzzle, guesses, matchedDist, showDeg, fading }) {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
      opacity: fading ? 0 : 1,
      transform: fading ? 'translateY(-8px)' : 'translateY(0)',
      transition: 'opacity 1000ms ease, transform 1000ms ease',
    }}>
      <div style={{
        fontSize: 9.5, color: HD_MUTED, letterSpacing: 2.5, textTransform: 'uppercase',
      }}>Target</div>
      <div style={{ display: 'flex', gap: 8 }}>
        {puzzle.hues.map((h, i) => {
          // Prefer the Wordle-matched distance (distance from the guess
          // slot that claimed this target). Fall back to null for
          // unclaimed targets — display a dash so the column alignment
          // stays intact when showDeg is on.
          const dist = matchedDist ? matchedDist[i]
                       : (guesses ? angularDistance(guesses[i], h) : null);
          return (
            <div key={i} style={{ position: 'relative' }}>
              <div style={{
                width: 46, height: 46, borderRadius: 10,
                background: hsbCss(h, puzzle.S, puzzle.B),
                border: '2px solid rgba(255,255,255,0.18)',
              }}/>
              {showDeg && (
                <div style={{
                  position: 'absolute', bottom: -17, left: 0, right: 0, textAlign: 'center',
                  fontSize: 9.5, color: HD_MUTED, letterSpacing: 0.3,
                  fontVariantNumeric: 'tabular-nums',
                }}>{dist != null ? `${Math.round(dist)}°` : '—'}</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ThemeReveal({ theme }) {
  if (!theme) return null;
  return (
    <div className="theme-reveal">
      <div className="theme-label">Today's Theme</div>
      <div className="theme-name">{theme.name}</div>

function SubmitButton({ enabled, onClick }) {

// ────────────────────────────────────────────────────────────────────
// Full-wheel radial picker (spec §6.5 + §7 live-readout INSIDE center disc)
// Drop-in replacement for HorizontalPicker — same props contract:
//   { hueVal, puzzle, onChange, onCommit, disabled }
//
// Geometry:
//   • 240×240 square container
//   • Ring: outer radius 120, inner radius 84 (thickness 36)
//   • 0° at 12 o'clock, increasing clockwise
//   • Conic-gradient ring rendered in HSB via 24 RGB stops
//   • CSS radial-gradient mask punches out the center hole
// ────────────────────────────────────────────────────────────────────
function WheelPicker({ hueVal, puzzle, onChange, onCommit, disabled }) {
  const WHEEL       = 240;
  const OUTER_R     = 120;
  const INNER_R     = 84;
  const CENTER_R    = 70;             // 140 / 2
  const RING_MID    = (OUTER_R + INNER_R) / 2; // 102
  const THUMB_SIZE  = 44;

  const containerRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  // Build a 24-stop conic gradient rendered in HSB (matches swatch colors).
  const conicStops = React.useMemo(() => {
    const parts = [];
    for (let i = 0; i <= 24; i++) {
      const h = (i / 24) * 360;
      const pct = ((i / 24) * 100).toFixed(2);
      parts.push(`${hsbCss(h, puzzle.S, puzzle.B)} ${pct}%`);
    }
    // from 0deg at 12 o'clock (top). `from 0deg` = CSS default; rotate so 0° sits at top.
    return `conic-gradient(from 0deg at 50% 50%, ${parts.join(', ')})`;
  }, [puzzle.S, puzzle.B]);

  // CSS mask punches out a transparent center hole so only the ring shows.
  const ringMask =
    `radial-gradient(circle at center, transparent ${INNER_R}px, #000 ${INNER_R + 0.5}px)`;

  // Pointer → hue. 0° at 12 o'clock, clockwise positive.
  const hueFromPoint = (cx, cy) => {
    const el = containerRef.current;
    if (!el) return hueVal;
    const r = el.getBoundingClientRect();
    const x = cx - (r.left + r.width / 2);
    const y = cy - (r.top  + r.height / 2);
    let deg = Math.atan2(x, -y) * 180 / Math.PI;
    if (deg < 0) deg += 360;
    return deg;
  };

  const onDown = (e) => {
    if (disabled) return;
    e.preventDefault();
    setDragging(true);
    try { containerRef.current.setPointerCapture(e.pointerId); } catch (_) {}
    onChange(hueFromPoint(e.clientX, e.clientY));
  };
  const onMove = (e) => {
    if (!dragging) return;
    onChange(hueFromPoint(e.clientX, e.clientY));
  };
  const onUp = (e) => {
    if (dragging) { setDragging(false); haptic(10); onCommit && onCommit(); }
    try { containerRef.current.releasePointerCapture(e.pointerId); } catch (_) {}
  };

  // Thumb position on the ring centerline at current hue.
  const rad = (hueVal - 90) * Math.PI / 180;
  const thumbX = WHEEL / 2 + RING_MID * Math.cos(rad);
  const thumbY = WHEEL / 2 + RING_MID * Math.sin(rad);

  // Auto-contrast text color over the center hue fill.
  const h = ((hueVal % 360) + 360) % 360;
  const lightBg = (h >= 40 && h <= 180);
  const textColor = lightBg ? '#0a0a0a' : '#fff';
  const mutedTextColor = lightBg ? 'rgba(10,10,10,0.55)' : 'rgba(255,255,255,0.65)';

  const centerBg = hsbCss(hueVal, puzzle.S, puzzle.B);

  return (
    <div style={{
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      padding: '8px 0 6px',
      opacity: disabled ? 0.35 : 1,
      pointerEvents: disabled ? 'none' : 'auto',
    }}>
      <div
        ref={containerRef}
        role="slider"
        aria-valuenow={Math.round(hueVal)}
        aria-valuemin={0}
        aria-valuemax={360}
        onPointerDown={onDown}
        onPointerMove={onMove}
        onPointerUp={onUp}
        onPointerCancel={onUp}
        style={{
          position: 'relative',
          width: WHEEL, height: WHEEL,
          touchAction: 'none',
          cursor: disabled ? 'default' : 'pointer',
        }}
      >
        {/* Conic ring with center punched out via CSS mask */}
        <div style={{
          position: 'absolute', inset: 0,
          borderRadius: '50%',
          background: conicStops,
          WebkitMask: ringMask,
          mask: ringMask,
          boxShadow: '0 6px 22px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04)',
        }}/>

        {/* Subtle inner rim to separate ring from center disc */}
        <div style={{
          position: 'absolute',
          left: WHEEL / 2 - INNER_R, top: WHEEL / 2 - INNER_R,
          width: INNER_R * 2, height: INNER_R * 2,
          borderRadius: '50%',
          boxShadow: 'inset 0 0 0 1px rgba(0,0,0,0.35)',
          pointerEvents: 'none',
        }}/>

        {/* Center disc — live preview + HUE readout */}
        <div style={{
          position: 'absolute',
          left: WHEEL / 2 - CENTER_R, top: WHEEL / 2 - CENTER_R,
          width: CENTER_R * 2, height: CENTER_R * 2,
          borderRadius: '50%',
          background: centerBg,
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 4px 16px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.08)',
          pointerEvents: 'none',
          transition: 'background-color 80ms linear',
        }}>
          <div style={{
            fontSize: 10, letterSpacing: 2, fontWeight: 700,
            textTransform: 'uppercase',
            color: mutedTextColor,
            marginBottom: 2,
          }}>Hue</div>
          <div style={{
            fontSize: 18, fontWeight: 700, letterSpacing: 1,
            fontVariantNumeric: 'tabular-nums',
            color: textColor,
            whiteSpace: 'nowrap',
          }}>{Math.round(hueVal)}°</div>
        </div>

        {/* Thumb */}
        <div style={{
          position: 'absolute',
          left: thumbX - THUMB_SIZE / 2,
          top:  thumbY - THUMB_SIZE / 2,
          width: THUMB_SIZE, height: THUMB_SIZE,
          borderRadius: '50%',
          background: centerBg,
          border: '3px solid #fff',
          boxShadow: '0 0 0 2px rgba(0,0,0,0.55), 0 6px 14px rgba(0,0,0,0.55)',
          transform: `scale(${dragging ? 1.1 : 1})`,
          transition: 'transform 120ms ease',
          pointerEvents: 'none',
        }}/>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────
// Main app
// ────────────────────────────────────────────────────────────────────
function makeEmptyRows() {
  return Array.from({ length: 6 }, () => ({
    submitted: false,
    slots: Array.from({ length: 6 }, () => ({ hue: null, feedback: null })),
  }));
}

function App() {
  const [dateStr, setDateStr]       = React.useState(localDateString());
  const [puzzle, setPuzzle]         = React.useState(() => puzzleForDate(localDateString()));
  const [rows, setRows]             = React.useState(makeEmptyRows);
  const [currentRow, setCurrentRow] = React.useState(0);
  const [activeSlot, setActiveSlot] = React.useState(0);
  const [state, setState]           = React.useState('in-progress'); // 'in-progress' | 'solved' | 'failed'
  const [pickerHue, setPickerHue]   = React.useState(180);
  const [showDeg, setShowDeg]       = React.useState(false);
  const [fading, setFading]         = React.useState(false);
  const [toast, setToast]           = React.useState(null);
  const [howToOpen, setHowToOpen]   = React.useState(() => {
    try { return localStorage.getItem('hueday-how-to-seen') !== '1'; }
    catch (_) { return true; }
  });

  // ── Practice-mode state (not persisted) ──
  const [practiceMode, setPracticeMode] = React.useState(false);
  const [practiceRows, setPracticeRows] = React.useState(makeEmptyRows);
  const [practiceCurrentRow, setPracticeCurrentRow] = React.useState(0);
  const [practiceActiveSlot, setPracticeActiveSlot] = React.useState(0);
  const [practiceState, setPracticeState]           = React.useState('in-progress');
  const [practiceBest, setPracticeBest]             = React.useState(() => loadPracticeBest());

  const toggleHowTo = () => {
    setHowToOpen(v => {
      const next = !v;
      try { if (!next) localStorage.setItem('hueday-how-to-seen', '1'); } catch (_) {}
      return next;
    });
  };

  // ── Load persisted state on first mount ──
  React.useEffect(() => {
    const saved = loadState();
    const today = localDateString();
    if (saved && saved.dateStr === today) {
      setDateStr(saved.dateStr);
      setPuzzle(puzzleForDate(today));
      setRows(saved.rows || makeEmptyRows());
      setCurrentRow(saved.currentRow ?? 0);
      setActiveSlot(saved.activeSlot ?? 0);
      setState(saved.state ?? 'in-progress');
    } else {
      // fresh puzzle for today (also handles first-ever launch)
      setDateStr(today);
      setPuzzle(puzzleForDate(today));
      setRows(makeEmptyRows());
      setCurrentRow(0);
      setActiveSlot(0);
      setState('in-progress');
    }
  }, []);

  // ── Persist on change (practice state excluded by design) ──
  React.useEffect(() => {
    saveState({ dateStr, rows, currentRow, activeSlot, state });
  }, [dateStr, rows, currentRow, activeSlot, state]);

  // ── Midnight rollover via visibility-change (spec §8.1) ──
  React.useEffect(() => {
    const check = () => {
      const today = localDateString();
      if (today !== dateStr) {
        setDateStr(today);
        setPuzzle(puzzleForDate(today));
        setRows(makeEmptyRows());
        setCurrentRow(0);
        setActiveSlot(0);
        setState('in-progress');
        setPickerHue(180);
        setShowDeg(false);
        setFading(false);
        // Drop any stale practice session at rollover.
        setPracticeMode(false);
        setPracticeRows(makeEmptyRows());
        setPracticeCurrentRow(0);
        setPracticeActiveSlot(0);
        setPracticeState('in-progress');
        setPracticeBest(loadPracticeBest()); // rehydrate (may be for a different date now)
        setToast('New day — puzzle reset.');
        setTimeout(() => setToast(null), 2200);
      }
    };
    const onVis = () => { if (document.visibilityState === 'visible') check(); };
    document.addEventListener('visibilitychange', onVis);
    window.addEventListener('focus', check);
    const id = setInterval(check, 30000); // every 30s as a belt-and-suspenders
    return () => {
      document.removeEventListener('visibilitychange', onVis);
      window.removeEventListener('focus', check);
      clearInterval(id);
    };
  }, [dateStr]);

  // ── Picker hue tracks the active slot's hue (or default if empty) ──
  // In practice mode, we follow the practice grid instead.
  const activeRows     = practiceMode ? practiceRows        : rows;
  const activeRowIdx   = practiceMode ? practiceCurrentRow  : currentRow;
  const activeSlotIdx  = practiceMode ? practiceActiveSlot  : activeSlot;
  const activeState    = practiceMode ? practiceState       : state;

  React.useEffect(() => {
    if (activeState !== 'in-progress') return;
    const row = activeRows[activeRowIdx];
    if (!row) return;
    const slot = row.slots[activeSlotIdx];
    setPickerHue(slot.hue != null ? slot.hue : 180);
  }, [activeRowIdx, activeSlotIdx, activeState, activeRows]);

  // ── Handlers ──
  const onPickerChange = (h) => {
    if (activeState !== 'in-progress') return;
    setPickerHue(h);
    if (practiceMode) {
      setPracticeRows(prev => prev.map((r, i) => i === practiceCurrentRow ? {
        ...r,
        slots: r.slots.map((s, j) => j === practiceActiveSlot ? { ...s, hue: h } : s),
      } : r));
    } else {
      setRows(prev => prev.map((r, i) => i === currentRow ? {
        ...r,
        slots: r.slots.map((s, j) => j === activeSlot ? { ...s, hue: h } : s),
      } : r));
    }
  };

  const onSlotTap = (rIdx, sIdx) => {
    if (practiceMode) {
      if (rIdx !== practiceCurrentRow) return;
      if (practiceRows[rIdx].submitted) return;
      setPracticeActiveSlot(sIdx);
    } else {
      if (rIdx !== currentRow) return;
      if (rows[rIdx].submitted) return;
      setActiveSlot(sIdx);
    }
  };

  // ── Drag-to-move: pick up a filled slot, drop on a current-row slot ──
  const dragRef = React.useRef(null);
  const [dragVisual, setDragVisual] = React.useState(null); // { hue, x, y }

  const onSwatchDragStart = (e, hue, rowIdx, slotIdx) => {
    if (activeState !== 'in-progress' || hue == null) return;
    dragRef.current = {
      hue, startX: e.clientX, startY: e.clientY,
      fromRow: rowIdx, fromSlot: slotIdx, active: false,
    };
  };

  React.useEffect(() => {
    const onMove = (e) => {
      const d = dragRef.current;
      if (!d) return;
      if (!d.active) {
        const dist = Math.hypot(e.clientX - d.startX, e.clientY - d.startY);
        if (dist > 8) d.active = true;
      }
      if (d.active) {
        setDragVisual({ hue: d.hue, x: e.clientX, y: e.clientY });
      }
    };
    const onUp = (e) => {
      const d = dragRef.current;
      if (!d) return;
      if (d.active) {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const slotEl = el && el.closest && el.closest('[data-drop-slot]');
        if (slotEl) {
          const targetRow  = parseInt(slotEl.getAttribute('data-drop-row'),  10);
          const targetSlot = parseInt(slotEl.getAttribute('data-drop-slot'), 10);
          const targetRows = practiceMode ? practiceRows : rows;
          const targetCurr = practiceMode ? practiceCurrentRow : currentRow;
          if (targetRow === targetCurr && !targetRows[targetCurr].submitted) {
            // Don't drop onto its own source slot (no-op)
            if (!(d.fromRow === targetRow && d.fromSlot === targetSlot)) {
              const sameRow = d.fromRow === targetRow;
              // Same-row drag: SWAP (move). Cross-row (from submitted above): COPY.
              // In swap case, read what's currently at the target slot BEFORE the update.
              const targetHueBefore = targetRows[targetCurr].slots[targetSlot].hue;
              const setter = practiceMode ? setPracticeRows : setRows;
              setter(prev => prev.map((r, i) => {
                if (i !== targetCurr) return r;
                return {
                  ...r,
                  slots: r.slots.map((s, j) => {
                    if (j === targetSlot) {
                      return { ...s, hue: d.hue, feedback: null, distance: null };
                    }
                    if (sameRow && j === d.fromSlot) {
                      // Move: clear source if target was empty. Swap: target's old hue moves here.
                      return { ...s, hue: targetHueBefore, feedback: null, distance: null };
                    }
                    return s;
                  }),
                };
              }));
              if (practiceMode) setPracticeActiveSlot(targetSlot);
              else              setActiveSlot(targetSlot);
              setPickerHue(d.hue);
              haptic(15);
            }
          }
        }
      }
      dragRef.current = null;
      setDragVisual(null);
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);
    return () => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);
    };
  }, [rows, currentRow, practiceMode, practiceRows, practiceCurrentRow]);

  const currentRowFilled = activeRows[activeRowIdx]?.slots.every(s => s.hue != null) ?? false;
  const canSubmit = activeState === 'in-progress' && currentRowFilled;

  // Helper: score a row and return the updated row + allGreen flag.
  const scoreRow = (row) => {
    const guesses = row.slots.map(s => s.hue);
    const { feedback: rowFb, dist: rowDist } = feedbackForRow(guesses, puzzle.hues);
    const scored = row.slots.map((s, j) => ({
      ...s, feedback: rowFb[j], distance: rowDist[j],
    }));
    const allGreen = rowFb.every(f => f === 'green');
    return { row: { ...row, submitted: true, slots: scored }, allGreen };
  };

  const onSubmit = () => {
    if (!canSubmit) return;

    if (practiceMode) {
      haptic(20);
      const { row: scored, allGreen } = scoreRow(practiceRows[practiceCurrentRow]);
      const nextRows = practiceRows.map((r, i) => i === practiceCurrentRow ? scored : r);
      setPracticeRows(nextRows);
      if (allGreen) {
        setPracticeState('solved');
        chime();
        const attempts = practiceCurrentRow + 1;
        const saved = savePracticeBest(dateStr, attempts);
        if (saved) setPracticeBest(saved);
      } else if (practiceCurrentRow >= 5) {
        // Unlimited tries — auto-reset after a brief pause.
        setPracticeState('failed');
        setTimeout(() => {
          setPracticeRows(makeEmptyRows());
          setPracticeCurrentRow(0);
          setPracticeActiveSlot(0);
          setPracticeState('in-progress');
          setToast('Practice reset — 6 more tries.');
          setTimeout(() => setToast(null), 1800);
        }, 900);
      } else {
        setPracticeCurrentRow(practiceCurrentRow + 1);
        setPracticeActiveSlot(0);
      }
      return;
    }

    // Midnight-on-submit re-check (spec §8.2) — daily path only
    const today = localDateString();
    if (today !== dateStr) {
      setDateStr(today);
      setPuzzle(puzzleForDate(today));
      setRows(makeEmptyRows());
      setCurrentRow(0);
      setActiveSlot(0);
      setState('in-progress');
      setPickerHue(180);
      setToast('Midnight passed — new puzzle.');
      setTimeout(() => setToast(null), 2200);
      return;
    }

    haptic(20);
    const { row: scored, allGreen } = scoreRow(rows[currentRow]);
    setRows(prev => prev.map((r, i) => i === currentRow ? scored : r));

    if (allGreen) {
      setState('solved');
      chime();
    } else if (currentRow >= 5) {
      setState('failed');
      setFading(true);
      // 1-second fade-in on fail (spec §7)
      setTimeout(() => setFading(false), 50);
    } else {
      setCurrentRow(currentRow + 1);
      setActiveSlot(0);
    }
  };

  // ── Copy-last-guess (Feature 3) ──
  const onCopyLastGuess = () => {
    const cRow = activeRowIdx;
    if (cRow <= 0) return;
    const src = activeRows[cRow - 1];
    if (!src || !src.submitted) return;
    if (practiceMode) {
      setPracticeRows(prev => prev.map((r, i) => i === cRow ? {
        ...r,
        slots: r.slots.map((s, j) => ({ ...s, hue: src.slots[j].hue })),
      } : r));
      setPracticeActiveSlot(0);
    } else {
      setRows(prev => prev.map((r, i) => i === cRow ? {
        ...r,
        slots: r.slots.map((s, j) => ({ ...s, hue: src.slots[j].hue })),
      } : r));
      setActiveSlot(0);
    }
    haptic(8);
  };

  // Show copy button only when there's a submitted previous row in the
  // active track, the current row is editable, and the game is live.
  const canCopyLast =
    activeState === 'in-progress' &&
    activeRowIdx > 0 &&
    activeRows[activeRowIdx - 1]?.submitted &&
    !activeRows[activeRowIdx]?.submitted;

  // ── Practice-mode entry / exit (Feature 2) ──
  const enterPractice = () => {
    setPracticeRows(makeEmptyRows());
    setPracticeCurrentRow(0);
    setPracticeActiveSlot(0);
    setPracticeState('in-progress');
    setPracticeMode(true);
    setPickerHue(180);
  };
  const exitPractice = () => {
    setPracticeMode(false);
    setPracticeRows(makeEmptyRows());
    setPracticeCurrentRow(0);
    setPracticeActiveSlot(0);
    setPracticeState('in-progress');
  };
  const resetPractice = () => {
    setPracticeRows(makeEmptyRows());
    setPracticeCurrentRow(0);
    setPracticeActiveSlot(0);
    setPracticeState('in-progress');
  };

  const done = activeState !== 'in-progress';
  const solved = activeState === 'solved';
  const lastGuesses = done
    ? (solved
        ? activeRows[activeRowIdx].slots.map(s => s.hue)
        : activeRows[5].slots.map(s => s.hue))
    : null;

  // Option A: compute matchedDist at render time from the last submitted
  // row's guesses so the target row shows the Wordle-matched distances.
  // Unclaimed targets get null (TargetRow renders a dash for those).
  const lastMatchedDist = React.useMemo(() => {
    if (!lastGuesses) return null;
    const { matchedDist } = feedbackForRow(lastGuesses, puzzle.hues);
    return matchedDist;
  }, [lastGuesses, puzzle.hues]);

  const practiceBestForToday = practiceBest && practiceBest.dateStr === dateStr ? practiceBest : null;

  return (
    <div style={{
      width: 'min(420px, 100vw)',
      minHeight: '100vh',
      background: HD_BG,
      color: HD_TEXT,
      fontFamily: HD_FONT,
      display: 'flex', flexDirection: 'column',
      paddingTop: 'max(20px, env(safe-area-inset-top))',
      paddingBottom: 'max(16px, env(safe-area-inset-bottom))',
      boxSizing: 'border-box',
      position: 'relative',
    }}>
      <TitleBar dateStr={dateStr} practiceMode={practiceMode} />

      <HowToPlay open={howToOpen} onToggle={toggleHowTo} onReset={() => {
        if (!window.confirm("Reset today's puzzle? This wipes your attempts for today — the puzzle stays the same.")) return;
        try {
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(PRACTICE_BEST_KEY);
        } catch (_) {}
        window.location.reload();
      }} />

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '4px 18px 0', minHeight: 0 }}>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 14 }}>
          <GuessGrid
            rows={activeRows}
            puzzle={puzzle}
            currentRow={activeRowIdx}
            activeSlotIdx={activeSlotIdx}
            onSlotTap={onSlotTap}
            onDragStart={onSwatchDragStart}
            swatchSize={46}
            rowGap={showDeg ? 20 : 7}
            colGap={7}
            showDeg={showDeg}
          />

          {canCopyLast && (
            <CopyLastGuessButton onClick={onCopyLastGuess} />
          )}

          {done && (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, marginTop: 6 }}>
              <ThemeReveal theme={puzzle.theme} />
              <TargetRow puzzle={puzzle} guesses={lastGuesses} matchedDist={lastMatchedDist} showDeg={showDeg} fading={fading && !solved} />
              <div style={{ marginTop: showDeg ? 18 : 6, fontSize: 11, color: HD_TEXT, letterSpacing: 1, textTransform: 'uppercase', fontWeight: 600 }}>
                {practiceMode
                  ? (solved ? `Practice solved in ${practiceCurrentRow + 1}` : 'Practice round — resetting…')
                  : (solved ? `Solved in ${currentRow + 1}` : 'Out of guesses')}
              </div>

              {practiceBestForToday && (
                <div style={{ fontSize: 10, color: HD_MUTED, letterSpacing: 0.8, textTransform: 'uppercase' }}>
                  Best practice solve: {practiceBestForToday.attempts}
                </div>
              )}

              <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center' }}>
                <button
                  onClick={() => setShowDeg(v => !v)}
                  style={{
                    background: HD_SURFACE,
                    border: `1px solid ${HD_BORDER}`,
                    color: HD_TEXT,
                    fontSize: 11, letterSpacing: 1.2, fontWeight: 600,
                    textTransform: 'uppercase',
                    padding: '8px 14px', borderRadius: 10,
                    cursor: 'pointer',
                  }}
                >{showDeg ? 'Hide Degrees' : 'Show Degrees'}</button>

                {practiceMode ? (
                  <>
                    <button onClick={resetPractice} style={secondaryBtnStyle}>Play Again</button>
                    <button onClick={exitPractice} style={secondaryBtnStyle}>Exit Practice</button>
                  </>
                ) : (
                  <button onClick={enterPractice} style={secondaryBtnStyle}>Practice This Puzzle</button>
                )}
              </div>
            </div>
          )}

          {/* Non-done practice mode still offers an exit control */}
          {!done && practiceMode && (
            <button
              onClick={exitPractice}
              style={{ ...secondaryBtnStyle, marginTop: 4 }}
            >Exit Practice</button>
          )}
        </div>

        <WheelPicker
          hueVal={pickerHue}
          puzzle={puzzle}
          onChange={onPickerChange}
          onCommit={() => {}}
          disabled={done}
        />

        <div style={{ padding: '2px 0 8px' }}>
          <SubmitButton enabled={canSubmit} onClick={onSubmit} />
        </div>

        <div style={{ textAlign: 'center', fontSize: 10, color: HD_MUTED, letterSpacing: 0.6, padding: '6px 0 2px' }}>
          Prototype · spec-accurate · local state only · no server
        </div>
      </div>

      {toast && (
        <div style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: HD_SURFACE, border: `1px solid ${HD_BORDER}`,
          color: HD_TEXT, padding: '10px 16px', borderRadius: 12,
          fontSize: 12, letterSpacing: 0.3,
          boxShadow: '0 10px 24px rgba(0,0,0,0.5)',
        }}>{toast}</div>
      )}

      {dragVisual && (
        <div style={{
          position: 'fixed',
          left: dragVisual.x,
          top: dragVisual.y,
          transform: 'translate(-50%, -50%)',
          width: 56, height: 56,
          borderRadius: 14,
          background: hsbCss(dragVisual.hue, puzzle.S, puzzle.B),
          border: '3px solid #fff',
          boxShadow: '0 10px 24px rgba(0,0,0,0.65), 0 0 0 6px rgba(255,255,255,0.08)',
          pointerEvents: 'none',
          zIndex: 1000,
          transition: 'width 120ms ease, height 120ms ease',
        }}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
