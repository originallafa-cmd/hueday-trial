// ────────────────────────────────────────────────────────────────────
// Full-wheel radial picker (spec §6.5 + §7 live-readout INSIDE center disc)
// Drop-in replacement for HorizontalPicker — same props contract:
//   { hueVal, puzzle, onChange, onCommit, disabled }
//
// Geometry:
//   • 240×240 square container
//   • Ring: outer radius 120, inner radius 84 (thickness 36)
//   • 0° at 12 o'clock, increasing clockwise
//   • Conic-gradient ring rendered in HSB via 24 RGB stops
//   • CSS radial-gradient mask punches out the center hole
// ────────────────────────────────────────────────────────────────────
// Return `hue` if it's not inside any forbidden range. Otherwise return
// the nearest edge of the enclosing range. Wrap-aware. Ranges may wrap
// past 360°. This enforces the "you can't land on an eliminated hue" lock.
function snapOutOfForbidden(hue, ranges) {
  if (!ranges || !ranges.length) return hue;
  const norm = (x) => ((x % 360) + 360) % 360;
  let h = norm(hue);
  for (const r of ranges) {
    const start = norm(r.start);
    const end   = norm(r.end);
    // Check membership (wrap-aware).
    const inside = (start <= end)
      ? (h >= start && h <= end)
      : (h >= start || h <= end);
    if (inside) {
      // Nearest edge (shortest angular distance).
      const dStart = Math.min(Math.abs(h - start), 360 - Math.abs(h - start));
      const dEnd   = Math.min(Math.abs(h - end),   360 - Math.abs(h - end));
      // Bump slightly outside so rounding doesn't snap us right back in.
      return dStart < dEnd
        ? norm(start - 0.5)
        : norm(end   + 0.5);
    }
  }
  return h;
}

// Build a CSS conic-gradient that dims forbidden arcs on the wheel.
// Each forbidden range = ±8° around a grey-feedback guess hue — those
// ranges provably cannot contain any target.
function buildForbiddenConic(ranges) {
  if (!ranges || ranges.length === 0) return null;
  // Normalise; split wrap-arounds into two non-wrapping pieces.
  const normalized = [];
  for (const r of ranges) {
    let start = ((r.start % 360) + 360) % 360;
    let end   = ((r.end   % 360) + 360) % 360;
    if (start <= end) normalized.push({ start, end });
    else { normalized.push({ start: 0, end }); normalized.push({ start, end: 360 }); }
  }
  normalized.sort((a, b) => a.start - b.start);
  // Merge overlapping.
  const merged = [];
  for (const r of normalized) {
    if (merged.length && r.start <= merged[merged.length - 1].end) {
      merged[merged.length - 1].end = Math.max(merged[merged.length - 1].end, r.end);
    } else merged.push({ ...r });
  }
  const DIM = 'rgba(0,0,0,0.62)';
  const stops = [];
  let cursor = 0;
  const pct = (deg) => (deg / 360 * 100).toFixed(3) + '%';
  for (const r of merged) {
    if (r.start > cursor) {
      stops.push(`transparent ${pct(cursor)}`);
      stops.push(`transparent ${pct(r.start)}`);
    }
    stops.push(`${DIM} ${pct(r.start)}`);
    stops.push(`${DIM} ${pct(r.end)}`);
    cursor = r.end;
  }
  if (cursor < 360) {
    stops.push(`transparent ${pct(cursor)}`);
    stops.push('transparent 100%');
  }
  return `conic-gradient(from 0deg at 50% 50%, ${stops.join(', ')})`;
}

function WheelPicker({ hueVal, puzzle, onChange, onCommit, disabled, forbiddenRanges }) {
  const WHEEL       = 240;
  const OUTER_R     = 120;
  const INNER_R     = 84;
  const CENTER_R    = 70;             // 140 / 2
  const RING_MID    = (OUTER_R + INNER_R) / 2; // 102
  const THUMB_SIZE  = 44;

  const containerRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  // Build a 24-stop conic gradient rendered in HSB (matches swatch colors).
  const conicStops = React.useMemo(() => {
    const parts = [];
    for (let i = 0; i <= 24; i++) {
      const h = (i / 24) * 360;
      const pct = ((i / 24) * 100).toFixed(2);
      parts.push(`${hsbCss(h, puzzle.S, puzzle.B)} ${pct}%`);
    }
    // from 0deg at 12 o'clock (top). `from 0deg` = CSS default; rotate so 0° sits at top.
    return `conic-gradient(from 0deg at 50% 50%, ${parts.join(', ')})`;
  }, [puzzle.S, puzzle.B]);

  // CSS mask punches out a transparent center hole so only the ring shows.
  const ringMask =
    `radial-gradient(circle at center, transparent ${INNER_R}px, #000 ${INNER_R + 0.5}px)`;

  // Pointer → hue. 0° at 12 o'clock, clockwise positive.
  // Also hard-locks out of any forbidden arc so the thumb skips eliminated hues.
  const hueFromPoint = (cx, cy) => {
    const el = containerRef.current;
    if (!el) return hueVal;
    const r = el.getBoundingClientRect();
    const x = cx - (r.left + r.width / 2);
    const y = cy - (r.top  + r.height / 2);
    let deg = Math.atan2(x, -y) * 180 / Math.PI;
    if (deg < 0) deg += 360;
    return snapOutOfForbidden(deg, forbiddenRanges);
  };

  const onDown = (e) => {
    if (disabled) return;
    e.preventDefault();
    setDragging(true);
    try { containerRef.current.setPointerCapture(e.pointerId); } catch (_) {}
    onChange(hueFromPoint(e.clientX, e.clientY));
  };
  const onMove = (e) => {
    if (!dragging) return;
    onChange(hueFromPoint(e.clientX, e.clientY));
  };
  const onUp = (e) => {
    if (dragging) { setDragging(false); haptic(10); onCommit && onCommit(); }
    try { containerRef.current.releasePointerCapture(e.pointerId); } catch (_) {}
  };

  // Thumb position on the ring centerline at current hue.
  const rad = (hueVal - 90) * Math.PI / 180;
  const thumbX = WHEEL / 2 + RING_MID * Math.cos(rad);
  const thumbY = WHEEL / 2 + RING_MID * Math.sin(rad);

  // Auto-contrast text color over the center hue fill.
  const h = ((hueVal % 360) + 360) % 360;
  const lightBg = (h >= 40 && h <= 180);
  const textColor = lightBg ? '#0a0a0a' : '#fff';
  const mutedTextColor = lightBg ? 'rgba(10,10,10,0.55)' : 'rgba(255,255,255,0.65)';

  const centerBg = hsbCss(hueVal, puzzle.S, puzzle.B);

  return (
    <div style={{
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      padding: '8px 0 6px',
      opacity: disabled ? 0.35 : 1,
      pointerEvents: disabled ? 'none' : 'auto',
    }}>
      <div
        ref={containerRef}
        role="slider"
        aria-valuenow={Math.round(hueVal)}
        aria-valuemin={0}
        aria-valuemax={360}
        onPointerDown={onDown}
        onPointerMove={onMove}
        onPointerUp={onUp}
        onPointerCancel={onUp}
        style={{
          position: 'relative',
          width: WHEEL, height: WHEEL,
          touchAction: 'none',
          cursor: disabled ? 'default' : 'pointer',
        }}
      >
        {/* Conic ring with center punched out via CSS mask */}
        <div style={{
          position: 'absolute', inset: 0,
          borderRadius: '50%',
          background: conicStops,
          WebkitMask: ringMask,
          mask: ringMask,
          boxShadow: '0 6px 22px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04)',
        }}/>

        {/* Forbidden-arc overlay — dims hue ranges known not to contain any target */}
        {(() => {
          const overlay = buildForbiddenConic(forbiddenRanges);
          if (!overlay) return null;
          return (
            <div style={{
              position: 'absolute', inset: 0,
              borderRadius: '50%',
              background: overlay,
              WebkitMask: ringMask,
              mask: ringMask,
              pointerEvents: 'none',
              transition: 'opacity 220ms ease',
            }}/>
          );
        })()}

        {/* Subtle inner rim to separate ring from center disc */}
        <div style={{
          position: 'absolute',
          left: WHEEL / 2 - INNER_R, top: WHEEL / 2 - INNER_R,
          width: INNER_R * 2, height: INNER_R * 2,
          borderRadius: '50%',
          boxShadow: 'inset 0 0 0 1px rgba(0,0,0,0.35)',
          pointerEvents: 'none',
        }}/>

        {/* Center disc — live preview + HUE readout */}
        <div style={{
          position: 'absolute',
          left: WHEEL / 2 - CENTER_R, top: WHEEL / 2 - CENTER_R,
          width: CENTER_R * 2, height: CENTER_R * 2,
          borderRadius: '50%',
          background: centerBg,
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 4px 16px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.08)',
          pointerEvents: 'none',
          transition: 'background-color 80ms linear',
        }}>
          <div style={{
            fontSize: 10, letterSpacing: 2, fontWeight: 700,
            textTransform: 'uppercase',
            color: mutedTextColor,
            marginBottom: 2,
          }}>Hue</div>
          <div style={{
            fontSize: 18, fontWeight: 700, letterSpacing: 1,
            fontVariantNumeric: 'tabular-nums',
            color: textColor,
            whiteSpace: 'nowrap',
          }}>{Math.round(hueVal)}°</div>
        </div>

        {/* Thumb */}
        <div style={{
          position: 'absolute',
          left: thumbX - THUMB_SIZE / 2,
          top:  thumbY - THUMB_SIZE / 2,
          width: THUMB_SIZE, height: THUMB_SIZE,
          borderRadius: '50%',
          background: centerBg,
          border: '3px solid #fff',
          boxShadow: '0 0 0 2px rgba(0,0,0,0.55), 0 6px 14px rgba(0,0,0,0.55)',
          transform: `scale(${dragging ? 1.1 : 1})`,
          transition: 'transform 120ms ease',
          pointerEvents: 'none',
        }}/>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────
// Main app
// ────────────────────────────────────────────────────────────────────
function makeEmptyRows() {
  return Array.from({ length: 6 }, () => ({
    submitted: false,
    slots: Array.from({ length: 6 }, () => ({ hue: null, feedback: null })),
  }));
}

function addDaysToDateStr(dateStr, days) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const base = new Date(y, m - 1, d, 12, 0, 0);
  base.setDate(base.getDate() + days);
  return localDateString(base);
}

function App() {
  const [dateStr, setDateStr]       = React.useState(localDateString());
  const [puzzle, setPuzzle]         = React.useState(() => puzzleForDate(localDateString()));
  const [rows, setRows]             = React.useState(makeEmptyRows);
  const [currentRow, setCurrentRow] = React.useState(0);
  const [activeSlot, setActiveSlot] = React.useState(0);
  const [state, setState]           = React.useState('in-progress'); // 'in-progress' | 'solved' | 'failed'
  const [pickerHue, setPickerHue]   = React.useState(180);
  const [showDeg, setShowDeg]       = React.useState(false);
  const [hintsUsed, setHintsUsed]   = React.useState(false);
  const [fading, setFading]         = React.useState(false);
  const [toast, setToast]           = React.useState(null);
  const [howToOpen, setHowToOpen]   = React.useState(() => {
    try { return localStorage.getItem('hueday-how-to-seen') !== '1'; }
    catch (_) { return true; }
  });
  const [scoringOpen, setScoringOpen] = React.useState(false);
  const [faqOpen, setFaqOpen]         = React.useState(false);
  const [archiveOpen, setArchiveOpen] = React.useState(false);
  // Welcome modal — shows on first-ever visit. localStorage flag persists dismissal.
  const [welcomeOpen, setWelcomeOpen] = React.useState(() => {
    try { return localStorage.getItem('hueday-welcome-seen') !== '1'; }
    catch (_) { return true; }
  });
  const dismissWelcome = () => {
    setWelcomeOpen(false);
    try { localStorage.setItem('hueday-welcome-seen', '1'); } catch (_) {}
  };

  // ── FilmGuess bonus state (Change 3) ──
  // `filmGuessChoice` is the option the player picked (string) or 'skip'.
  // `filmGuessCorrect` is true iff they chose the correct film name.
  // Tracked per daily-date via keying on dateStr so it persists across
  // the reveal even if the player leaves/returns (in-memory only — we
  // don't persist past a refresh; it's a one-shot bonus).
  const [filmGuessChoice, setFilmGuessChoice]   = React.useState(null);
  const [filmGuessCorrect, setFilmGuessCorrect] = React.useState(false);

  // ── Virtual-date preview (session only, not persisted) ──
  const [virtualDateOffset, setVirtualDateOffset] = React.useState(0);

  // ── Practice-mode state (not persisted) ──
  const [practiceMode, setPracticeMode] = React.useState(false);
  const [strictMode, setStrictMode]     = React.useState(false);
  const [practiceRows, setPracticeRows] = React.useState(makeEmptyRows);
  const [practiceCurrentRow, setPracticeCurrentRow] = React.useState(0);
  const [practiceActiveSlot, setPracticeActiveSlot] = React.useState(0);
  const [practiceState, setPracticeState]           = React.useState('in-progress');
  const [practiceBest, setPracticeBest]             = React.useState(() => loadPracticeBest());

  const toggleHowTo = () => {
    setHowToOpen(v => {
      const next = !v;
      try { if (!next) localStorage.setItem('hueday-how-to-seen', '1'); } catch (_) {}
      return next;
    });
  };

  // ── Load persisted state on first mount ──
  React.useEffect(() => {
    const saved = loadState();
    const today = localDateString();
    if (saved && saved.dateStr === today && saved.genVersion === GEN_VERSION) {
      setDateStr(saved.dateStr);
      setPuzzle(puzzleForDate(today));
      setRows(saved.rows || makeEmptyRows());
      setCurrentRow(saved.currentRow ?? 0);
      setActiveSlot(saved.activeSlot ?? 0);
      setState(saved.state ?? 'in-progress');
      setHintsUsed(!!saved.hintsUsed);
    } else {
      // Either brand-new player, new day, OR puzzle algorithm was updated
      // since last save. In the latter case prior rows' feedback colors
      // were computed against stale targets, so we wipe and start fresh.
      if (saved && saved.dateStr === today && saved.genVersion !== GEN_VERSION) {
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
      }
      // fresh puzzle for today (also handles first-ever launch)
      setDateStr(today);
      setPuzzle(puzzleForDate(today));
      setRows(makeEmptyRows());
      setCurrentRow(0);
      setActiveSlot(0);
      setState('in-progress');
      setHintsUsed(false);
    }
  }, []);

  // ── Persist on change (practice / virtual-preview state excluded by design) ──
  React.useEffect(() => {
    // Don't persist while in virtual-date preview — that session is ephemeral.
    if (virtualDateOffset !== 0) return;
    saveState({ dateStr, rows, currentRow, activeSlot, state, hintsUsed, genVersion: GEN_VERSION });
  }, [dateStr, rows, currentRow, activeSlot, state, hintsUsed, virtualDateOffset]);

  // ── Midnight rollover via visibility-change (spec §8.1) ──
  React.useEffect(() => {
    const check = () => {
      // While in virtual-date preview, suppress real-day rollover — the
      // user is intentionally viewing a different date.
      if (virtualDateOffset !== 0) return;
      const today = localDateString();
      if (today !== dateStr) {
        setDateStr(today);
        setPuzzle(puzzleForDate(today));
        setRows(makeEmptyRows());
        setCurrentRow(0);
        setActiveSlot(0);
        setState('in-progress');
        setPickerHue(180);
        setShowDeg(false);
        setHintsUsed(false);
        setFading(false);
        setFilmGuessChoice(null);
        setFilmGuessCorrect(false);
        // Drop any stale practice session at rollover.
        setPracticeMode(false);
        setStrictMode(false);
        setPracticeRows(makeEmptyRows());
        setPracticeCurrentRow(0);
        setPracticeActiveSlot(0);
        setPracticeState('in-progress');
        setPracticeBest(loadPracticeBest()); // rehydrate (may be for a different date now)
        setToast('New day — puzzle reset.');
        setTimeout(() => setToast(null), 2200);
      }
    };
    const onVis = () => { if (document.visibilityState === 'visible') check(); };
    document.addEventListener('visibilitychange', onVis);
    window.addEventListener('focus', check);
    const id = setInterval(check, 30000); // every 30s as a belt-and-suspenders
    return () => {
      document.removeEventListener('visibilitychange', onVis);
      window.removeEventListener('focus', check);
      clearInterval(id);
    };
  }, [dateStr, virtualDateOffset]);

  // ── Picker hue tracks the active slot's hue (or default if empty) ──
  // In practice mode, we follow the practice grid instead.
  const activeRows     = practiceMode ? practiceRows        : rows;
  const activeRowIdx   = practiceMode ? practiceCurrentRow  : currentRow;
  const activeSlotIdx  = practiceMode ? practiceActiveSlot  : activeSlot;
  const activeState    = practiceMode ? practiceState       : state;

  React.useEffect(() => {
    if (activeState !== 'in-progress') return;
    const row = activeRows[activeRowIdx];
    if (!row) return;
    const slot = row.slots[activeSlotIdx];
    setPickerHue(slot.hue != null ? slot.hue : 180);
  }, [activeRowIdx, activeSlotIdx, activeState, activeRows]);

  // ── Handlers ──
  const onPickerChange = (h) => {
    if (activeState !== 'in-progress') return;
    setPickerHue(h);
    if (practiceMode) {
      setPracticeRows(prev => prev.map((r, i) => i === practiceCurrentRow ? {
        ...r,
        slots: r.slots.map((s, j) => j === practiceActiveSlot ? { ...s, hue: h } : s),
      } : r));
    } else {
      setRows(prev => prev.map((r, i) => i === currentRow ? {
        ...r,
        slots: r.slots.map((s, j) => j === activeSlot ? { ...s, hue: h } : s),
      } : r));
    }
  };

  const onSlotTap = (rIdx, sIdx) => {
    if (practiceMode) {
      if (rIdx !== practiceCurrentRow) return;
      if (practiceRows[rIdx].submitted) return;
      setPracticeActiveSlot(sIdx);
    } else {
      if (rIdx !== currentRow) return;
      if (rows[rIdx].submitted) return;
      setActiveSlot(sIdx);
    }
  };

  // ── Drag-to-move: pick up a filled slot, drop on a current-row slot ──
  const dragRef = React.useRef(null);
  const [dragVisual, setDragVisual] = React.useState(null); // { hue, x, y }

  const onSwatchDragStart = (e, hue, rowIdx, slotIdx) => {
    if (activeState !== 'in-progress' || hue == null) return;
    dragRef.current = {
      hue, startX: e.clientX, startY: e.clientY,
      fromRow: rowIdx, fromSlot: slotIdx, active: false,
    };
  };

  React.useEffect(() => {
    const onMove = (e) => {
      const d = dragRef.current;
      if (!d) return;
      if (!d.active) {
        const dist = Math.hypot(e.clientX - d.startX, e.clientY - d.startY);
        if (dist > 8) d.active = true;
      }
      if (d.active) {
        setDragVisual({ hue: d.hue, x: e.clientX, y: e.clientY });
      }
    };
    const onUp = (e) => {
      const d = dragRef.current;
      if (!d) return;
      if (d.active) {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const slotEl = el && el.closest && el.closest('[data-drop-slot]');
        if (slotEl) {
          const targetRow  = parseInt(slotEl.getAttribute('data-drop-row'),  10);
          const targetSlot = parseInt(slotEl.getAttribute('data-drop-slot'), 10);
          const targetRows = practiceMode ? practiceRows : rows;
          const targetCurr = practiceMode ? practiceCurrentRow : currentRow;
          if (targetRow === targetCurr && !targetRows[targetCurr].submitted) {
            // Don't drop onto its own source slot (no-op)
            if (!(d.fromRow === targetRow && d.fromSlot === targetSlot)) {
              const sameRow = d.fromRow === targetRow;
              // Same-row drag: SWAP (move). Cross-row (from submitted above): COPY.
              // In swap case, read what's currently at the target slot BEFORE the update.
              const targetHueBefore = targetRows[targetCurr].slots[targetSlot].hue;
              const setter = practiceMode ? setPracticeRows : setRows;
              setter(prev => prev.map((r, i) => {
                if (i !== targetCurr) return r;
                return {
                  ...r,
                  slots: r.slots.map((s, j) => {
                    if (j === targetSlot) {
                      return { ...s, hue: d.hue, feedback: null, distance: null };
                    }
                    if (sameRow && j === d.fromSlot) {
                      // Move: clear source if target was empty. Swap: target's old hue moves here.
                      return { ...s, hue: targetHueBefore, feedback: null, distance: null };
                    }
                    return s;
                  }),
                };
              }));
              if (practiceMode) setPracticeActiveSlot(targetSlot);
              else              setActiveSlot(targetSlot);
              setPickerHue(d.hue);
              haptic(15);
            }
          }
        }
      }
      dragRef.current = null;
      setDragVisual(null);
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);
    return () => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);
    };
  }, [rows, currentRow, practiceMode, practiceRows, practiceCurrentRow]);

  const currentRowFilled = activeRows[activeRowIdx]?.slots.every(s => s.hue != null) ?? false;
  const canSubmit = activeState === 'in-progress' && currentRowFilled;

  // Helper: score a row and return the updated row + allGreen flag.
  // In strict practice, a green requires d === 0 (exact integer match).
  // submittedAt is a monotonic timestamp used as a React key by GuessGrid
  // to ensure each row's per-slot feedback animation plays exactly once.
  const scoreRow = (row, strict = false) => {
    const guesses = row.slots.map(s => s.hue);
    const { feedback: rowFb, dist: rowDist } = feedbackForRow(guesses, puzzle.hues, strict);
    const scored = row.slots.map((s, j) => ({
      ...s, feedback: rowFb[j], distance: rowDist[j],
    }));
    const allGreen = rowFb.every(f => f === 'green');
    return { row: { ...row, submitted: true, submittedAt: Date.now(), slots: scored }, allGreen };
  };

  // Wrapped showDeg toggle — flips hintsUsed to true the first time the
  // player reveals degrees while the active game is still in progress.
  const onToggleShowDeg = () => {
    setShowDeg(prev => {
      const next = !prev;
      if (next && activeState === 'in-progress') {
        // Daily hintsUsed is only meaningful for the daily track.
        // Practice plays don't contribute to score, so no persistence needed.
        if (!practiceMode) setHintsUsed(true);
      }
      return next;
    });
  };

  const onSubmit = () => {
    if (!canSubmit) return;

    if (practiceMode) {
      haptic(20);
      const { row: scored, allGreen } = scoreRow(practiceRows[practiceCurrentRow], strictMode);
      const nextRows = practiceRows.map((r, i) => i === practiceCurrentRow ? scored : r);
      setPracticeRows(nextRows);
      if (allGreen) {
        setPracticeState('solved');
        chime();
        const attempts = practiceCurrentRow + 1;
        // Strict practice doesn't count toward best-attempts (different rules).
        if (!strictMode) {
          const saved = savePracticeBest(dateStr, attempts);
          if (saved) setPracticeBest(saved);
        }
      } else if (practiceCurrentRow >= 5) {
        // Unlimited tries — auto-reset after a brief pause.
        setPracticeState('failed');
        setTimeout(() => {
          setPracticeRows(makeEmptyRows());
          setPracticeCurrentRow(0);
          setPracticeActiveSlot(0);
          setPracticeState('in-progress');
          setToast('Practice reset — 6 more tries.');
          setTimeout(() => setToast(null), 1800);
        }, 900);
      } else {
        setPracticeCurrentRow(practiceCurrentRow + 1);
        setPracticeActiveSlot(0);
      }
      return;
    }

    // Midnight-on-submit re-check (spec §8.2) — daily path only.
    // Skip when viewing a virtual-date preview; the "today" check is moot.
    if (virtualDateOffset === 0) {
      const today = localDateString();
      if (today !== dateStr) {
        setDateStr(today);
        setPuzzle(puzzleForDate(today));
        setRows(makeEmptyRows());
        setCurrentRow(0);
        setActiveSlot(0);
        setState('in-progress');
        setPickerHue(180);
        setHintsUsed(false);
        setToast('Midnight passed — new puzzle.');
        setTimeout(() => setToast(null), 2200);
        return;
      }
    }

    haptic(20);
    const { row: scored, allGreen } = scoreRow(rows[currentRow]);
    setRows(prev => prev.map((r, i) => i === currentRow ? scored : r));

    if (allGreen) {
      setState('solved');
      chime();
      // Persist score for real-today plays only — previews are ephemeral.
      // Note: filmGuessBonus is applied separately once the player answers
      // the bonus challenge; the initial save reflects the pre-bonus score
      // and is overwritten (if better) when the bonus resolves.
      if (virtualDateOffset === 0) {
        const attempts = currentRow + 1;
        const exactAllInteger = scored.slots.every(s => s.distance === 0);
        const score = computeScore(attempts, true, hintsUsed, exactAllInteger, false);
        saveScoreForDate(dateStr, {
          score, attempts, solved: true, hintsUsed, exactBonus: exactAllInteger && !hintsUsed,
          filmBonus: false,
          themeName: puzzle.theme ? puzzle.theme.name : null,
        });
      }
    } else if (currentRow >= 5) {
      setState('failed');
      setFading(true);
      // 1-second fade-in on fail (spec §7)
      setTimeout(() => setFading(false), 50);
      if (virtualDateOffset === 0) {
        saveScoreForDate(dateStr, {
          score: 0, attempts: 6, solved: false, hintsUsed, exactBonus: false,
          filmBonus: false,
          themeName: puzzle.theme ? puzzle.theme.name : null,
        });
      }
    } else {
      setCurrentRow(currentRow + 1);
      setActiveSlot(0);
    }
  };

  // ── Copy-last-guess (Feature 3) ──
  const onCopyLastGuess = () => {
    const cRow = activeRowIdx;
    if (cRow <= 0) return;
    const src = activeRows[cRow - 1];
    if (!src || !src.submitted) return;
    if (practiceMode) {
      setPracticeRows(prev => prev.map((r, i) => i === cRow ? {
        ...r,
        slots: r.slots.map((s, j) => ({ ...s, hue: src.slots[j].hue })),
      } : r));
      setPracticeActiveSlot(0);
    } else {
      setRows(prev => prev.map((r, i) => i === cRow ? {
        ...r,
        slots: r.slots.map((s, j) => ({ ...s, hue: src.slots[j].hue })),
      } : r));
      setActiveSlot(0);
    }
    haptic(8);
  };

  // Tap-to-copy (row-level): tapping any submitted row pastes its hues
  // into the current editable row. QoL helper — does NOT set hintsUsed.
  // Guarded in GuessGrid via `gameDone` so it's a no-op on finished games.
  const onCopyRow = (srcRowIdx) => {
    if (activeState !== 'in-progress') return;
    const cRow = activeRowIdx;
    const src = activeRows[srcRowIdx];
    if (!src || !src.submitted) return;
    if (srcRowIdx === cRow) return; // can't copy the active row into itself
    if (activeRows[cRow]?.submitted) return;
    if (practiceMode) {
      setPracticeRows(prev => prev.map((r, i) => i === cRow ? {
        ...r,
        slots: r.slots.map((s, j) => ({ ...s, hue: src.slots[j].hue })),
      } : r));
      setPracticeActiveSlot(0);
    } else {
      setRows(prev => prev.map((r, i) => i === cRow ? {
        ...r,
        slots: r.slots.map((s, j) => ({ ...s, hue: src.slots[j].hue })),
      } : r));
      setActiveSlot(0);
    }
    haptic(8);
  };

  // Show copy button only when there's a submitted previous row in the
  // active track, the current row is editable, and the game is live.
  const canCopyLast =
    activeState === 'in-progress' &&
    activeRowIdx > 0 &&
    activeRows[activeRowIdx - 1]?.submitted &&
    !activeRows[activeRowIdx]?.submitted;

  // ── Practice-mode entry / exit (Feature 2) ──
  const enterPractice = () => {
    setPracticeRows(makeEmptyRows());
    setPracticeCurrentRow(0);
    setPracticeActiveSlot(0);
    setPracticeState('in-progress');
    setPracticeMode(true);
    setStrictMode(false);
    setPickerHue(180);
  };
  const enterStrictPractice = () => {
    setPracticeRows(makeEmptyRows());
    setPracticeCurrentRow(0);
    setPracticeActiveSlot(0);
    setPracticeState('in-progress');
    setPracticeMode(true);
    setStrictMode(true);
    setPickerHue(180);
    if (hintsUsed && virtualDateOffset === 0) {
      setToast("Strict practice (won't count — hints used).");
      setTimeout(() => setToast(null), 2600);
    }
  };
  const exitPractice = () => {
    setPracticeMode(false);
    setStrictMode(false);
    setPracticeRows(makeEmptyRows());
    setPracticeCurrentRow(0);
    setPracticeActiveSlot(0);
    setPracticeState('in-progress');
  };
  const resetPractice = () => {
    setPracticeRows(makeEmptyRows());
    setPracticeCurrentRow(0);
    setPracticeActiveSlot(0);
    setPracticeState('in-progress');
  };

  // ── Virtual-date preview (Feature 5) ──
  const loadPuzzleForOffset = (offset) => {
    const realToday = localDateString();
    const target = offset === 0 ? realToday : addDaysToDateStr(realToday, offset);
    setDateStr(target);
    setPuzzle(puzzleForDate(target));
    setPracticeMode(false);
    setStrictMode(false);
    setPracticeRows(makeEmptyRows());
    setPracticeCurrentRow(0);
    setPracticeActiveSlot(0);
    setPracticeState('in-progress');
    if (offset === 0) {
      // Return to today — rehydrate persisted state for today.
      const saved = loadState();
      if (saved && saved.dateStr === realToday && saved.genVersion === GEN_VERSION) {
        setRows(saved.rows || makeEmptyRows());
        setCurrentRow(saved.currentRow ?? 0);
        setActiveSlot(saved.activeSlot ?? 0);
        setState(saved.state ?? 'in-progress');
        setHintsUsed(!!saved.hintsUsed);
      } else {
        setRows(makeEmptyRows());
        setCurrentRow(0);
        setActiveSlot(0);
        setState('in-progress');
        setHintsUsed(false);
      }
    } else {
      // Fresh ephemeral session for the preview day.
      setRows(makeEmptyRows());
      setCurrentRow(0);
      setActiveSlot(0);
      setState('in-progress');
      setHintsUsed(false);
    }
    setPickerHue(180);
    setShowDeg(false);
    setFading(false);
    setFilmGuessChoice(null);
    setFilmGuessCorrect(false);
  };
  const onNextDay = () => {
    const next = virtualDateOffset + 1;
    setVirtualDateOffset(next);
    loadPuzzleForOffset(next);
  };
  const onBackToToday = () => {
    setVirtualDateOffset(0);
    loadPuzzleForOffset(0);
  };
  // Archive entry tapped → jump to a past date (negative offset).
  // Session-only; does not persist (loadPuzzleForOffset with offset !== 0
  // resets to a fresh ephemeral session).
  const onSelectArchiveDate = (archiveDateStr) => {
    const realToday = localDateString();
    const a = new Date(archiveDateStr + 'T12:00:00');
    const t = new Date(realToday      + 'T12:00:00');
    const diffDays = Math.round((a - t) / (1000 * 60 * 60 * 24));
    if (diffDays >= 0) return; // safety: only past days via archive
    setVirtualDateOffset(diffDays);
    loadPuzzleForOffset(diffDays);
    setArchiveOpen(false);
    try {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (_) {
      window.scrollTo(0, 0);
    }
  };

  const done = activeState !== 'in-progress';
  const solved = activeState === 'solved';

  // Wordle-style elimination: ±8° around each grey-feedback submitted
  // guess is provably empty of any target. Dim those arcs on the wheel.
  const forbiddenRanges = React.useMemo(() => {
    const out = [];
    for (const row of activeRows) {
      if (!row.submitted) continue;
      for (const slot of row.slots) {
        if (slot.feedback === 'grey' && slot.hue != null) {
          out.push({ start: slot.hue - 8, end: slot.hue + 8 });
        }
      }
    }
    return out;
  }, [activeRows]);

  const lastGuesses = done
    ? (solved
        ? activeRows[activeRowIdx].slots.map(s => s.hue)
        : activeRows[5].slots.map(s => s.hue))
    : null;

  // Option A: compute matchedDist at render time from the last submitted
  // row's guesses so the target row shows the Wordle-matched distances.
  // Unclaimed targets get null (TargetRow renders a dash for those).
  const lastMatchedDist = React.useMemo(() => {
    if (!lastGuesses) return null;
    const { matchedDist } = feedbackForRow(lastGuesses, puzzle.hues);
    return matchedDist;
  }, [lastGuesses, puzzle.hues]);

  const practiceBestForToday = practiceBest && practiceBest.dateStr === dateStr ? practiceBest : null;

  // ── Persist the film-guess bonus back to score history when it resolves ──
  // Only for real-today (not preview, not practice). The score entry is
  // only overwritten when the new score is strictly higher, so this is a
  // safe re-save.
  React.useEffect(() => {
    if (practiceMode) return;
    if (virtualDateOffset !== 0) return;
    if (state === 'in-progress') return;
    if (!filmGuessCorrect) return;
    const solvedNow = state === 'solved';
    const attempts = solvedNow ? (currentRow + 1) : 6;
    let exactAllInteger = false;
    if (solvedNow) {
      const winRow = rows[currentRow];
      if (winRow && winRow.submitted) {
        exactAllInteger = winRow.slots.every(s => s.distance === 0);
      }
    }
    const score = computeScore(attempts, solvedNow, hintsUsed, exactAllInteger, true);
    saveScoreForDate(dateStr, {
      score, attempts, solved: solvedNow, hintsUsed,
      exactBonus: solvedNow && exactAllInteger && !hintsUsed,
      filmBonus: true,
      themeName: puzzle.theme ? puzzle.theme.name : null,
    });
  }, [filmGuessCorrect, state, practiceMode, virtualDateOffset, dateStr, currentRow, rows, hintsUsed, puzzle]);

  // ── Derived score for the daily track (shown on game end, not in practice) ──
  const dailyScoreInfo = React.useMemo(() => {
    if (practiceMode) return null;
    if (state === 'in-progress') return null;
    const solvedNow = state === 'solved';
    const attempts = solvedNow ? (currentRow + 1) : 6;
    // Exact bonus: every slot on the winning row matched integer-exact.
    let exactAllInteger = false;
    if (solvedNow) {
      const winRow = rows[currentRow];
      if (winRow && winRow.submitted) {
        exactAllInteger = winRow.slots.every(s => s.distance === 0);
      }
    }
    const score = computeScore(attempts, solvedNow, hintsUsed, exactAllInteger, filmGuessCorrect);
    return {
      score, attempts, solved: solvedNow, hintsUsed,
      exactBonus: solvedNow && exactAllInteger && !hintsUsed,
      filmBonus: filmGuessCorrect,
    };
  }, [practiceMode, state, currentRow, rows, hintsUsed, filmGuessCorrect]);

  const inPreview = virtualDateOffset !== 0;
  const virtualDateStr = inPreview ? dateStr : null;

  // ── Mid-game mood hint (Feature A) ──
  // Shown only on the daily track (including preview mode for consistency)
  // once the player has submitted ≥3 rows AND the game is still live.
  // Not tied to hintsUsed — universal free nudge, not a penalty.
  const submittedCount = rows.filter(r => r.submitted).length;
  const midHint = (!practiceMode && state === 'in-progress' && submittedCount >= 3)
    ? midHintFor(puzzle.theme)
    : null;

  return (
    <div style={{
      width: 'min(420px, 100vw)',
      minHeight: '100vh',
      background: HD_BG,
      color: HD_TEXT,
      fontFamily: HD_FONT,
      display: 'flex', flexDirection: 'column',
      paddingTop: 'max(20px, env(safe-area-inset-top))',
      paddingBottom: 'max(16px, env(safe-area-inset-bottom))',
      boxSizing: 'border-box',
      position: 'relative',
    }}>
      <TitleBar dateStr={dateStr} practiceMode={practiceMode} strictMode={strictMode} category={(puzzle && puzzle.theme && puzzle.theme.category) || 'Movies'} />

      {inPreview && (
        <PreviewBanner
          virtualDateStr={virtualDateStr}
          offset={virtualDateOffset}
          onBack={onBackToToday}
        />
      )}

      {midHint && (
        <div
          key={`midhint-${puzzle.theme ? puzzle.theme.name : 'none'}`}
          className="hueday-midhint"
          style={{
            margin: '0 18px 8px',
            textAlign: 'center',
            fontSize: 11,
            color: HD_MUTED,
            fontStyle: 'italic',
            letterSpacing: 0.4,
            lineHeight: 1.4,
          }}
        >
          <span style={{
            fontStyle: 'normal', fontWeight: 700, letterSpacing: 2,
            textTransform: 'uppercase', fontSize: 9.5, color: HD_MUTED, marginRight: 6,
          }}>Hint</span>
          <span style={{ color: '#9a9a9a' }}>·</span>
          <span style={{ marginLeft: 6 }}>a sense of: </span>
          <span style={{ color: HD_TEXT }}>&ldquo;{midHint}&rdquo;</span>
        </div>
      )}

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '4px 18px 0', minHeight: 0 }}>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 14 }}>
          <GuessGrid
            rows={activeRows}
            puzzle={puzzle}
            currentRow={activeRowIdx}
            activeSlotIdx={activeSlotIdx}
            onSlotTap={onSlotTap}
            onDragStart={onSwatchDragStart}
            swatchSize={46}
            rowGap={showDeg ? 20 : 7}
            colGap={7}
            showDeg={showDeg}
            onCopyRow={onCopyRow}
            gameDone={done}
          />

          {canCopyLast && (
            <CopyLastGuessButton onClick={onCopyLastGuess} />
          )}

          {done && (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, marginTop: 6 }}>
              <ThemeReveal theme={puzzle.theme} />
              <TargetRow puzzle={puzzle} guesses={lastGuesses} matchedDist={lastMatchedDist} showDeg={showDeg} fading={fading && !solved} />

              {/* Daily score card — shown after solve/fail on the daily track.
                  Placed between the target row and the status line so the
                  summary sits inside the reveal card visually. */}
              {!practiceMode && dailyScoreInfo && !inPreview && (
                <div style={{ marginTop: showDeg ? 14 : 6 }}>
                  <ScoreCard
                    score={dailyScoreInfo.score}
                    attempts={dailyScoreInfo.attempts}
                    solved={dailyScoreInfo.solved}
                    hintsUsed={dailyScoreInfo.hintsUsed}
                    exactBonus={dailyScoreInfo.exactBonus}
                    filmBonus={dailyScoreInfo.filmBonus}
                  />
                </div>
              )}

              {/* FilmGuess bonus challenge — shown on daily track BEFORE the
                  reveal; once answered or skipped, the reveal renders below. */}
              {!practiceMode && puzzle.theme && FILM_DISTRACTORS[puzzle.theme.name] && filmGuessChoice == null && (
                <FilmGuess
                  options={filmGuessOptionsFor(puzzle.theme.name, dateStr)}
                  correctName={puzzle.theme.name}
                  chosen={null}
                  feedback={null}
                  onChoose={(opt) => {
                    setFilmGuessChoice(opt);
                    const correct = opt === puzzle.theme.name;
                    setFilmGuessCorrect(correct);
                    haptic(correct ? 20 : 10);
                  }}
                  onSkip={() => {
                    setFilmGuessChoice('skip');
                    setFilmGuessCorrect(false);
                  }}
                />
              )}

              {/* After the player has resolved the bonus (answered or skipped),
                  show the reveal card. Palette reveal card + Google Images link-out. */}
              {(practiceMode || filmGuessChoice != null || !(puzzle.theme && FILM_DISTRACTORS[puzzle.theme.name])) && (
                <>
                  {!practiceMode && filmGuessChoice && filmGuessChoice !== 'skip' && (
                    <FilmGuess
                      options={filmGuessOptionsFor(puzzle.theme.name, dateStr)}
                      correctName={puzzle.theme.name}
                      chosen={filmGuessChoice}
                      feedback={filmGuessCorrect ? 'correct' : 'wrong'}
                      onChoose={() => {}}
                      onSkip={() => {}}
                    />
                  )}
                  <MoviePosterReveal theme={puzzle.theme} puzzle={puzzle} />
                </>
              )}

              <div style={{ marginTop: (!practiceMode && dailyScoreInfo && !inPreview) ? 2 : (showDeg ? 18 : 6), fontSize: 11, color: HD_TEXT, letterSpacing: 1, textTransform: 'uppercase', fontWeight: 600 }}>
                {practiceMode
                  ? (solved ? `${strictMode ? 'Strict ' : ''}Practice solved in ${practiceCurrentRow + 1}` : 'Practice round — resetting…')
                  : (solved ? `Solved in ${currentRow + 1}` : 'Out of guesses')}
              </div>

              {practiceBestForToday && (
                <div style={{ fontSize: 10, color: HD_MUTED, letterSpacing: 0.8, textTransform: 'uppercase' }}>
                  Best practice solve: {practiceBestForToday.attempts}
                </div>
              )}

              <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center' }}>
                <button
                  onClick={onToggleShowDeg}
                  style={{
                    background: HD_SURFACE,
                    border: `1px solid ${HD_BORDER}`,
                    color: HD_TEXT,
                    fontSize: 11, letterSpacing: 1.2, fontWeight: 600,
                    textTransform: 'uppercase',
                    padding: '8px 14px', borderRadius: 10,
                    cursor: 'pointer',
                  }}
                >{showDeg ? 'Hide Degrees' : 'Show Degrees'}</button>

                {practiceMode ? (
                  <>
                    <button onClick={resetPractice} style={secondaryBtnStyle}>Play Again</button>
                    <button onClick={exitPractice} style={secondaryBtnStyle}>Exit Practice</button>
                  </>
                ) : (
                  <>
                    <button onClick={enterPractice} style={secondaryBtnStyle}>Practice This Puzzle</button>
                    <button onClick={enterStrictPractice} style={secondaryBtnStyle}>Try for Perfect</button>
                    <button onClick={onNextDay} style={secondaryBtnStyle}>Next Day →</button>
                  </>
                )}
              </div>
            </div>
          )}

          {/* Non-done practice mode still offers an exit control */}
          {!done && practiceMode && (
            <button
              onClick={exitPractice}
              style={{ ...secondaryBtnStyle, marginTop: 4 }}
            >Exit Practice</button>
          )}
        </div>

        <WheelPicker
          hueVal={pickerHue}
          puzzle={puzzle}
          onChange={onPickerChange}
          onCommit={() => {}}
          disabled={done}
          forbiddenRanges={forbiddenRanges}
        />

        <div style={{ padding: '2px 0 8px', display: 'flex', gap: 8, alignItems: 'stretch' }}>
          <InlineHintButton
            showDeg={showDeg}
            onToggle={onToggleShowDeg}
            disabled={done || inPreview}
          />
          <div style={{ flex: 1 }}>
            <SubmitButton enabled={canSubmit} onClick={onSubmit} />
          </div>
        </div>

        <div style={{ textAlign: 'center', fontSize: 10, color: HD_MUTED, letterSpacing: 0.6, padding: '6px 0 2px' }}>
          Prototype · spec-accurate · local state only · no server
        </div>
      </div>

      {/* Info panels moved to the bottom (Themely-style) — game stays above the fold. */}
      <div style={{ padding: '12px 0 20px' }}>
        <HowToPlay
          open={howToOpen}
          onToggle={toggleHowTo}
          showDeg={showDeg}
          onToggleShowDeg={onToggleShowDeg}
          onReset={() => {
            if (!window.confirm("Reset today's puzzle? This wipes your attempts for today — the puzzle stays the same.")) return;
            try {
              localStorage.removeItem(STORAGE_KEY);
              localStorage.removeItem(PRACTICE_BEST_KEY);
            } catch (_) {}
            window.location.reload();
          }}
        />
        <ScoringPanel open={scoringOpen} onToggle={() => setScoringOpen(v => !v)} />
        <FAQPanel open={faqOpen} onToggle={() => setFaqOpen(v => !v)} />
        <ArchivePanel
          open={archiveOpen}
          onToggle={() => setArchiveOpen(v => !v)}
          todayStr={localDateString()}
          onSelectDate={onSelectArchiveDate}
        />
      </div>

      {toast && (
        <div style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: HD_SURFACE, border: `1px solid ${HD_BORDER}`,
          color: HD_TEXT, padding: '10px 16px', borderRadius: 12,
          fontSize: 12, letterSpacing: 0.3,
          boxShadow: '0 10px 24px rgba(0,0,0,0.5)',
        }}>{toast}</div>
      )}

      {welcomeOpen && (
        <WelcomeModal onDismiss={dismissWelcome} />
      )}

      {dragVisual && (
        <div style={{
          position: 'fixed',
          left: dragVisual.x,
          top: dragVisual.y,
          transform: 'translate(-50%, -50%)',
          width: 56, height: 56,
          borderRadius: 14,
          background: hsbCss(dragVisual.hue, puzzle.S, puzzle.B),
          border: '3px solid #fff',
          boxShadow: '0 10px 24px rgba(0,0,0,0.65), 0 0 0 6px rgba(255,255,255,0.08)',
          pointerEvents: 'none',
          zIndex: 1000,
          transition: 'width 120ms ease, height 120ms ease',
        }}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
