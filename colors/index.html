<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  html { background: #141414; }
  body {
    background: #141414;
    color: #ededed;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
    min-height: 100%;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* iOS URL bar collapses; 100dvh follows it, 100vh doesn't — Submit button
     sliding under the home indicator was the old symptom. */
  #root { min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center; }
  button { -webkit-user-select: none; user-select: none; font-family: inherit; }

  /* Respect the OS reduced-motion preference. We kill the keyframe animations
     (shake, pulse, lock-in, fade-in, stagger) but keep short transitions —
     transitions are the only drag/tap affordance the game has, and zeroing
     them out makes the wheel thumb feel dead. */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }

  @keyframes hueday-theme-fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0);   }
  }
  .theme-reveal {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; margin-bottom: 4px;
    animation: hueday-theme-fade-in 700ms ease both;
    animation-delay: 120ms;
  }
  .theme-label {
    font-size: 9.5px; color: #7a7a7a; letter-spacing: 2.5px;
    text-transform: uppercase; font-weight: 600;
  }
  .theme-name {
    font-size: 17px; color: #ededed; font-weight: 700;
    letter-spacing: 0.5px;
  }
  .theme-desc {
    font-size: 11px; color: #cfcfcf; font-style: italic;
    letter-spacing: 0.2px; text-align: center; max-width: 280px;
    line-height: 1.4;
  }

  @keyframes hueday-pill-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.35); }
    50%      { box-shadow: 0 0 0 6px rgba(250, 204, 21, 0.00); }
  }
  .practice-pill {
    animation: hueday-pill-pulse 1800ms ease-in-out infinite;
  }

  /* First-empty-slot attention pulse (onboarding affordance). */
  @keyframes hueday-first-slot-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.45); }
    50%      { box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.00); }
  }
  .hueday-slot-pulse {
    animation: hueday-first-slot-pulse 1400ms ease-in-out infinite;
  }

  /* Welcome-modal fade-in */
  @keyframes hueday-welcome-fade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hueday-welcome-backdrop {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0, 0, 0, 0.78);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: hueday-welcome-fade 280ms ease both;
  }
  .hueday-welcome-card {
    max-width: 360px; width: 100%;
    background: #1c1c1c;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 22px 22px 18px;
    color: #ededed;
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
  }

  /* Drag-hint beneath the wheel on first load */
  @keyframes hueday-hint-bob {
    0%, 100% { transform: translateY(0); opacity: 0.7; }
    50%      { transform: translateY(-3px); opacity: 1; }
  }
  .hueday-wheel-hint {
    animation: hueday-hint-bob 1800ms ease-in-out infinite;
  }

  /* Mid-game hint line — fades in once when it first appears. */
  @keyframes hueday-midhint-fade-in {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0);   }
  }
  .hueday-midhint {
    animation: hueday-midhint-fade-in 500ms ease both;
  }

  /* Per-slot feedback animations after a row submits. Staggered in JS
     via animation-delay (100ms per slot, left→right). */
  @keyframes hueday-green-lock {
    0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.00); }
    30%  { transform: scale(1.14); box-shadow: 0 0 0 6px rgba(74, 222, 128, 0.55); }
    60%  { transform: scale(0.97); box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.18); }
    100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.00); }
  }
  @keyframes hueday-yellow-shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-4px); }
    40%  { transform: translateX(4px); }
    60%  { transform: translateX(-3px); }
    80%  { transform: translateX(3px); }
    100% { transform: translateX(0); }
  }
  @keyframes hueday-grey-settle {
    0%   { transform: scale(1.04); opacity: 0.5; }
    100% { transform: scale(1);    opacity: 1;   }
  }
  .hueday-fb-green  { animation: hueday-green-lock 420ms ease both; }
  .hueday-fb-yellow { animation: hueday-yellow-shake 350ms ease both; }
  .hueday-fb-grey   { animation: hueday-grey-settle 300ms ease both; }

  /* Tap-to-copy affordance on submitted rows */
  .hueday-row-copyable { cursor: pointer; transition: transform 120ms ease, filter 160ms ease; }
  .hueday-row-copyable:hover { filter: brightness(1.08); }
  .hueday-row-copyable:active { transform: scale(0.985); filter: brightness(0.95); }

  /* Archive panel row — tappable past-day entry */
  .hueday-archive-row { transition: background-color 120ms ease, transform 80ms ease; }
  .hueday-archive-row:hover { background-color: rgba(255,255,255,0.03) !important; }
  .hueday-archive-row:active { transform: scale(0.98); background-color: rgba(255,255,255,0.05) !important; }

// ────────────────────────────────────────────────────────────────────
// HSB → sRGB rendering (matches SwiftUI's Color(hue:sat:bright:))
// Spec §1.1: canonical color model is HSB. Browsers only expose HSL
// natively, so we convert explicitly.
// ────────────────────────────────────────────────────────────────────
function hsbToRgb(h, s, v) {
  const hh = ((h % 360) + 360) % 360;
  const c  = v * s;
  const hp = hh / 60;
  const x  = c * (1 - Math.abs((hp % 2) - 1));
  let r = 0, g = 0, b = 0;
  if      (hp < 1) { r = c; g = x; }
  else if (hp < 2) { r = x; g = c; }
  else if (hp < 3) { g = c; b = x; }
  else if (hp < 4) { g = x; b = c; }
  else if (hp < 5) { r = x; b = c; }
  else             { r = c; b = x; }
  const m = v - c;
  return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}
function hsbCss(h, s, v) { const [r, g, b] = hsbToRgb(h, s, v); return `rgb(${r}, ${g}, ${b})`; }

// ────────────────────────────────────────────────────────────────────
// Deterministic puzzle generator (spec §2)
// ────────────────────────────────────────────────────────────────────
const MASK64 = 0xFFFFFFFFFFFFFFFFn;

// FNV-1a 64-bit (spec §2.3)
function fnv1a64(str) {
  let h = 0xCBF29CE484222325n;
  const PRIME = 0x100000001B3n;
  for (let i = 0; i < str.length; i++) {
    h = h ^ BigInt(str.charCodeAt(i) & 0xFF);
    h = (h * PRIME) & MASK64;
  }
  return h;
}

// SplitMix64 next_uniform (spec §2.4)
function nextUniform(state) {
  let s = (state + 0x9E3779B97F4A7C15n) & MASK64;
  let z = s;
  z = ((z ^ (z >> 30n)) * 0xBF58476D1CE4E5B9n) & MASK64;
  z = ((z ^ (z >> 27n)) * 0x94D049BB133111EBn) & MASK64;
  z = z ^ (z >> 31n);
  const u = Number(z >> 11n) / 9007199254740992; // 2^53
  return [s, u];
}

// Local-date seed string "YYYY-MM-DD" (spec §2.2)
function localDateString(d = new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Wrap-aware minimum adjacent gap when hues are sorted on the circle.
function minAdjacentGap(hues) {
  const sorted = hues.slice().sort((a, b) => a - b);
  let minGap = Infinity;
  for (let i = 0; i < sorted.length; i++) {
    const a = sorted[i];
    const b = sorted[(i + 1) % sorted.length];
    const gap = i === sorted.length - 1 ? ((360 - a) + b) : (b - a);
    if (gap < minGap) minGap = gap;
  }
  return minGap;
}

// ────────────────────────────────────────────────────────────────────
// Monthly shuffled rotation
//
// Given a dateStr "YYYY-MM-DD", returns an index into CINEMA_PALETTES.
// The month key ("YYYY-MM") seeds a Fisher-Yates shuffle of the palette
// indices, then day-of-month picks one. Same date worldwide = same
// palette. A new month rerolls the order.
// ────────────────────────────────────────────────────────────────────
// Weekday → category rotation. Each weekday draws from a fixed category
// pool, shuffled monthly within that category. Gives daily variety
// instead of one flat shuffle across all palettes.
//   Mon  Tue  Wed  Thu    Fri      Sat  Sun
// [Movies, TV, Movies, Anime, Cartoon, Movies, TV]
// JS Date.getDay(): 0=Sun..6=Sat. We remap to 0=Mon..6=Sun.
const CATEGORY_SCHEDULE = ['Movies', 'TV', 'Movies', 'Anime', 'Cartoon', 'Movies', 'TV'];

function categoryForDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const jsDay = new Date(y, m - 1, d).getDay();
  return CATEGORY_SCHEDULE[(jsDay + 6) % 7];
}

// Cache themeForDate across an archive render — called up to 365× in
// allPastDaysSinceLaunch; each call does an O(d) weekday-count loop.
const __themeCache = new Map();
function themeForDate(dateStr) {
  const cached = __themeCache.get(dateStr);
  if (cached) return cached;

  const override = FEATURED_OVERRIDES[dateStr];
  if (override) { __themeCache.set(dateStr, override); return override; }

  const category = categoryForDate(dateStr);
  const pool = [];
  for (let i = 0; i < CINEMA_PALETTES.length; i++) {
    if (CINEMA_PALETTES[i].category === category) pool.push(i);
  }
  if (pool.length === 0) { __themeCache.set(dateStr, CINEMA_PALETTES[0]); return CINEMA_PALETTES[0]; }

  // Monthly Fisher-Yates over this category's pool, seeded by YYYY-MM + category.
  const [y, m, d] = dateStr.split('-').map(Number);
  const monthKey = `${y}-${String(m).padStart(2, '0')}`;
  let state = fnv1a64(monthKey + '|' + category);
  const shuffled = pool.slice();
  for (let i = shuffled.length - 1; i > 0; i--) {
    let u;
    [state, u] = nextUniform(state);
    const j = Math.floor(u * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  // Count how many days of this category have fallen in this month,
  // from day 1 through d (inclusive). Count-1 picks the slot.
  let categoryDayCount = 0;
  for (let day = 1; day <= d; day++) {
    const dDay = new Date(y, m - 1, day).getDay();
    if (CATEGORY_SCHEDULE[(dDay + 6) % 7] === category) categoryDayCount++;
  }
  // Positive-modulo so a degenerate (categoryDayCount === 0) case still lands
  // on a valid index instead of returning CINEMA_PALETTES[shuffled[-1]] = undefined.
  const pickIdx = ((categoryDayCount - 1) % shuffled.length + shuffled.length) % shuffled.length;
  const result = CINEMA_PALETTES[shuffled[pickIdx]];
  __themeCache.set(dateStr, result);
  return result;
}

// ────────────────────────────────────────────────────────────────────
// Puzzle numbering (Change 5)
// Days-since-launch → "Puzzle #N", shown in TitleBar.
// ────────────────────────────────────────────────────────────────────
const LAUNCH_DATE = '2026-04-01'; // First day Hueday went live. Counts from this.

function puzzleNumberFor(dateStr) {
  const launch = new Date(LAUNCH_DATE + 'T12:00:00');
  const today  = new Date(dateStr + 'T12:00:00');
  const diffMs = today - launch;
  return Math.floor(diffMs / (1000 * 60 * 60 * 24)) + 1;
}

// ────────────────────────────────────────────────────────────────────
// FilmGuess helpers (Change 3)
// Build 3 options (correct + 2 distractors) with a date-seeded stable
// order so every player gets the same shuffle for the same puzzle.
// ────────────────────────────────────────────────────────────────────
function filmGuessOptionsFor(themeName, dateStr) {
  const distractors = FILM_DISTRACTORS[themeName] || [];
  const pool = [themeName, ...distractors].slice(0, 3);
  // Fisher-Yates seeded by dateStr + themeName so the order is stable
  // for everyone on a given day.
  let state = fnv1a64(dateStr + '|' + themeName);
  const arr = pool.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    let u;
    [state, u] = nextUniform(state);
    const j = Math.floor(u * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ────────────────────────────────────────────────────────────────────
// puzzleForDate(date) → {S, B, hues: [6], theme}
//
// Every palette defines 6 target anchors. We jitter each anchor by
// ±jitterMax°, round, and return. No stratification, no widening —
// the targets ARE the targets. If the jittered hues dip below
// MIN_GAP=12° (rare, only on tightly-spaced palettes), fall back to
// the exact un-jittered anchors for that day.
// ────────────────────────────────────────────────────────────────────
function puzzleForDate(dateStr) {
  const theme = themeForDate(dateStr);
  let state = fnv1a64(dateStr);
  let u;
  [state, u] = nextUniform(state); const S = 0.60 + u * 0.15;   // spec §2.5
  [state, u] = nextUniform(state); const B = 0.48 + u * 0.10;   // spec §2.5

  const jitterMax = typeof theme.jitterMax === 'number' ? theme.jitterMax : 3;
  const jittered = theme.targetHues.map((anchor) => {
    let uj;
    [state, uj] = nextUniform(state);
    const j = (uj * 2 - 1) * jitterMax; // ±jitterMax°
    let h = Math.round(((anchor + j) % 360 + 360) % 360);
    if (h === 360) h = 0;
    return h;
  });
  const hues = minAdjacentGap(jittered) >= 12
    ? jittered
    : theme.targetHues.map(h => {
        let v = Math.round(((h % 360) + 360) % 360);
        if (v === 360) v = 0;
        return v;
      });
  return { S, B, hues, theme };
}

// ────────────────────────────────────────────────────────────────────
// Feedback algorithm (spec §3)
// ────────────────────────────────────────────────────────────────────
function angularDistance(g, t) {
  const d = Math.abs(g - t) % 360;
  return Math.min(d, 360 - d);
}
// Wordle-style cross-slot feedback across a row of continuous hues.
// - GREEN  : guess is within 8° of the target AT THE SAME SLOT (exact hit)
// - YELLOW : guess is within 8° of an unclaimed target AT A DIFFERENT SLOT
//            (right color, wrong position — swap it to the right slot)
// - GREY   : no target available within 8° (not in today's puzzle)
// Each target can only be "claimed" by one slot. If you guess two reds
// but the puzzle has one red, only one slot earns yellow. Wordle rules.
function feedbackForRow(guesses, targets, strictMode = false) {
  const EXACT = 8;
  // In strict mode, a GREEN requires an exact integer match (d === 0).
  // Yellow cross-slot threshold stays at 8° in both modes.
  const GREEN_THRESHOLD = strictMode ? 0 : EXACT;
  const feedback = new Array(6).fill(null);
  const dist = new Array(6).fill(null);
  // matchedDist[t] = angular distance from target t to the guess slot
  // that claimed it (via same-slot green or cross-slot yellow). Null if
  // the target was never claimed.
  const matchedDist = new Array(6).fill(null);
  const claimed = new Array(6).fill(false);
  // Pass 1 — greens: same-slot exact match
  for (let i = 0; i < 6; i++) {
    const d = angularDistance(guesses[i], targets[i]);
    dist[i] = d;
    if (d <= GREEN_THRESHOLD) {
      feedback[i] = 'green';
      claimed[i] = true;
      matchedDist[i] = d;
    }
  }
  // Pass 2 — yellows: cross-slot exact (right color, wrong position).
  // Best (closest) unclaimed target wins per slot.
  for (let i = 0; i < 6; i++) {
    if (feedback[i]) continue;
    let bestJ = -1, bestD = Infinity;
    for (let j = 0; j < 6; j++) {
      if (claimed[j]) continue;
      const d = angularDistance(guesses[i], targets[j]);
      if (d <= EXACT && d < bestD) { bestD = d; bestJ = j; }
    }
    if (bestJ !== -1) {
      feedback[i] = 'yellow';
      claimed[bestJ] = true;
      matchedDist[bestJ] = bestD;
    }
  }
  // Pass 3 — everything else is grey
  for (let i = 0; i < 6; i++) if (!feedback[i]) feedback[i] = 'grey';
  return { feedback, dist, matchedDist };
}

// ────────────────────────────────────────────────────────────────────
// Web approximations of spec §7 / §9 hardware feedback
// ────────────────────────────────────────────────────────────────────
function haptic(intensity = 15) {
  if (navigator.vibrate) try { navigator.vibrate(intensity); } catch (_) {}
}
let audioCtx = null;
function chime() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.55);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.6);
  } catch (_) {}
}

// ────────────────────────────────────────────────────────────────────
// Local-storage persistence (spec §5.2)
// Practice best-solve stat is tracked separately so the daily save
// format stays compatible with prior versions.
// ────────────────────────────────────────────────────────────────────

// ────────────────────────────────────────────────────────────────────
// Scoring (v6 — adds FilmGuess bonus)
//
// Score is based on attempts (fewer = better), halved if hints were
// used, with a +25 "EXACT" bonus when every slot landed on the exact
// integer target hue with no hints. A separate +10 FilmGuess bonus is
// applied for correctly identifying the inspiring film — that's a
// distinct skill (film knowledge vs color skill), so hintsUsed does
// NOT apply to it (no double-penalty).
// Max total: 100 (base) + 25 (exact) + 10 (film) = 135.
// ────────────────────────────────────────────────────────────────────
function computeScore(attempts, solved, hintsUsed, exactAllIntegerMatch, filmGuessCorrect) {
  let base = solved ? Math.max(0, 100 - (attempts - 1) * 15) : 0;
  // attempts=1 → 100, 2→85, 3→70, 4→55, 5→40, 6→25, fail→0
  if (hintsUsed) base = Math.floor(base / 2);
  const exactBonus = (solved && exactAllIntegerMatch && !hintsUsed) ? 25 : 0;
  const filmBonus  = filmGuessCorrect ? 10 : 0;
  return Math.max(0, base + exactBonus + filmBonus); // 0..135
}

function scoreGrade(score) {
  if (score >= 100) return { stars: 5, label: 'S' };
  if (score >=  80) return { stars: 4, label: 'A' };
  if (score >=  60) return { stars: 3, label: 'B' };
  if (score >=  40) return { stars: 2, label: 'C' };
  if (score >=  20) return { stars: 1, label: 'D' };
  return { stars: 0, label: 'F' };
}

// Derive play stats from history. Streak = consecutive calendar days ending
// at today (or yesterday, if today isn't solved yet) with a solved entry.
// Best streak scans the full history. Win rate = solved / played.
function computeStats(history, todayStr) {
  const wasSolvedOf = (h) => typeof h.solved === 'boolean' ? h.solved : (typeof h.score === 'number' && h.score > 0);
  const ymdStr = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  const dates = Object.keys(history).sort();
  let played = 0, solved = 0;
  dates.forEach(d => { played++; if (wasSolvedOf(history[d])) solved++; });

  // Current streak: walk back from today. If today isn't played yet, start from yesterday.
  let currentStreak = 0;
  const start = new Date(todayStr + 'T12:00:00');
  const todayH = history[todayStr];
  if (!todayH || !wasSolvedOf(todayH)) start.setDate(start.getDate() - 1);
  const cursor = new Date(start);
  while (true) {
    const ds = ymdStr(cursor);
    const h = history[ds];
    if (!h || !wasSolvedOf(h)) break;
    currentStreak++;
    cursor.setDate(cursor.getDate() - 1);
  }

  // Best streak: iterate sorted dates, reset on a gap or unsolved day.
  let bestStreak = 0, run = 0, prevDateObj = null;
  for (const d of dates) {
    const isWin = wasSolvedOf(history[d]);
    const cur = new Date(d + 'T12:00:00');
    const gap = prevDateObj ? Math.round((cur - prevDateObj) / 86400000) : null;
    run = (isWin && (gap === null || gap === 1)) ? run + 1 : (isWin ? 1 : 0);
    if (run > bestStreak) bestStreak = run;
    prevDateObj = cur;
  }

  const winRate = played > 0 ? Math.round(100 * solved / played) : 0;
  return { currentStreak, bestStreak, winRate, played, solved };
}

// Build a Wordle-style shareable emoji grid from the played rows.
// ⬛ for dark-theme grey, 🟩 green, 🟨 yellow. Header line includes puzzle
// number, category, and score shorthand. URL at bottom.
function buildShareText({ puzzleNum, category, solved, attempts, rows, grade }) {
  const header = `Hueday #${puzzleNum} · ${category} — ${solved ? attempts : 'X'}/6  ${grade ? grade : ''}`.trim();
  const used = rows.filter(r => r && r.submitted);
  const grid = used.map(r =>
    r.slots.map(s => s.feedback === 'green' ? '🟩' : s.feedback === 'yellow' ? '🟨' : '⬛').join('')
  ).join('\n');
  return `${header}\n\n${grid}\n\nhttps://originallafa-cmd.github.io/hueday-trial/colors/`;
}

function Swatch({ hue, S, B, feedback, isActive, isEditable, size = 46, showDeg, distance, onClick, rowIdx, slotIdx, onDragStart, animate, animDelayMs }) {
  const outline =
      feedback === 'green'  ? HD_GREEN
    : feedback === 'yellow' ? HD_YELLOW
    : feedback === 'grey'   ? HD_GREY

  const empty = hue == null;
  const bg = empty ? 'transparent' : hsbCss(hue, S, B);

  let border;
  if (empty) border = `1.5px dashed ${isActive ? '#fff' : HD_DASHED}`;
  else if (outline) border = `2px solid ${outline}`;
  else if (isActive) border = `2px solid #fff`;
  else border = `2px solid transparent`;

  const canDragFrom = !empty && onDragStart != null;

  // Per-slot feedback animation. Only applied when `animate` is true AND
  // we have feedback. The parent (GuessGrid) only passes `animate` on the
  // very first render after a row's submittedAt timestamp changes — the
  // row wrapper uses `key={row.submittedAt}` so this component remounts
  // fresh on each submit, guaranteeing a single play per submission.
  const animClass = (animate && feedback)
    ? (feedback === 'green'  ? 'hueday-fb-green'
      : feedback === 'yellow' ? 'hueday-fb-yellow'
      : feedback === 'grey'   ? 'hueday-fb-grey'
      : '')
    : '';

  return (
    <div
      className={animClass}
      data-drop-row={rowIdx != null ? rowIdx : undefined}
      data-drop-slot={slotIdx != null ? slotIdx : undefined}
      onPointerDown={canDragFrom ? (e) => onDragStart(e, hue, rowIdx, slotIdx) : undefined}

        // moved my finger, and the whole row copied."
        if (canDragFrom) e.stopPropagation();
        if (isEditable && onClick) onClick();

        width: size, height: size, borderRadius: 10, background: bg, border,
        boxShadow: isActive && !empty ? '0 0 0 3px rgba(255,255,255,0.15)' : 'none',
        transition: 'background-color 80ms linear, border-color 120ms ease',
        flexShrink: 0, position: 'relative',

      }}

          width: 16, height: 16, borderRadius: 8,

}

// ────────────────────────────────────────────────────────────────────
// Archive helper — returns reverse-chronological list of past days
// from LAUNCH_DATE through yesterday (not including today).
// Each entry pre-computes the puzzle for tiny-swatch preview.
// ────────────────────────────────────────────────────────────────────
function allPastDaysSinceLaunch(todayStr) {
  const out = [];
  const today = new Date(todayStr + 'T12:00:00');
  const launch = new Date(LAUNCH_DATE + 'T12:00:00');
  // Yesterday is today - 1 day.
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  if (yesterday < launch) return out;
  // Iterate newest-first from yesterday back to LAUNCH_DATE.
  const cursor = new Date(yesterday);
  while (cursor >= launch) {
    const ds = localDateString(cursor);
    const p  = puzzleForDate(ds);
    out.push({
      dateStr: ds,
      dayN: puzzleNumberFor(ds),
      themeName: p.theme ? p.theme.name : '',
      category: (p.theme && p.theme.category) || 'Movies',
      targetHues: p.hues,
      S: p.S,
      B: p.B,
    });
    cursor.setDate(cursor.getDate() - 1);
  }
  return out;
}

// ────────────────────────────────────────────────────────────────────
// ArchivePanel — collapsible list of past puzzles (launch → yesterday),
// newest-first. Tapping an entry sets a negative virtualDateOffset and
// closes the panel. Does NOT save any state (session-only time-travel).
// ────────────────────────────────────────────────────────────────────
// iOS-Calendar-style archive: month labels inline, continuous 7-col grid,
// tight rows separated by thin horizontal rules (no per-cell borders).
// Today = solid filled circle around the day number. Puzzle #N under each
// day. Past played = green dot pip. Future/pre-launch = dimmed, inactive.
// All months from LAUNCH_DATE → todayStr render stacked and scrollable.
function CalendarArchive({ entries, scoreHistory, todayStr, onSelectDate, onRandomJump }) {
  const wasSolvedOf = (h) => typeof h.solved === 'boolean' ? h.solved : (typeof h.score === 'number' && h.score > 0);
  const ymd = (y, m, d) => y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
  const dowHeaders = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

  // ──────────────────────────────────────────────────────────────────
  // PROTOTYPE MODE — testing only. Unlocks future days for tap-through,
  // tints each cell by its scheduled category, and labels it. Makes it
  // easy to see at a glance which day is Movies / TV / Anime / Cartoon.
  // Revert for production by setting PROTOTYPE_CAL = false.
  // ──────────────────────────────────────────────────────────────────
  const PROTOTYPE_CAL = true;
  const CAT_PALETTE = {
    Movies:  { bg: 'rgba(59,130,246,0.14)',  ink: '#60a5fa', short: 'Movie' },
    TV:      { bg: 'rgba(245,158,66,0.14)',  ink: '#f59e42', short: 'TV' },
    Anime:   { bg: 'rgba(236,72,153,0.14)',  ink: '#f472b6', short: 'Anime' },
    Cartoon: { bg: 'rgba(34,197,94,0.14)',   ink: '#34d399', short: 'Cartoon' },
  };

  // Compute months to render. In prototype mode, show 6 months starting
  // at launch so the weekday rotation is visible across future days.
  const months = React.useMemo(() => {
    const out = [];
    const [ly, lm] = LAUNCH_DATE.split('-').map(Number);
    const [ty, tm] = todayStr.split('-').map(Number);
    let y = ly, m = lm;
    // End month: 3 months past today in prototype mode, else today's month.
    let endY = ty, endM = tm;
    if (PROTOTYPE_CAL) {
      endM = tm + 3;
      while (endM > 12) { endM -= 12; endY++; }
    }
    while (y < endY || (y === endY && m <= endM)) {
      out.push({ y, m });
      m++;
      if (m > 12) { m = 1; y++; }
    }
    return out;
  }, [todayStr]);

  // One row of 7 day-cells. Extracted to keep the render readable.
  const Row = ({ cells }) => (
    <div style={{
      display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)',
      borderTop: '1px solid ' + HD_BORDER,
    }}>
      {cells.map(({ ds, dayNum, isBlank }, ci) => {
        if (isBlank) {
          return <div key={'b' + ci} style={{ aspectRatio: '1 / 1.25' }} />;
        }
        const isToday = ds === todayStr;
        const isFuture = ds > todayStr;
        const isPreLaunch = ds < LAUNCH_DATE;
        // Prototype mode: every non-blank cell is clickable (even future).
        const interactive = PROTOTYPE_CAL ? !isToday && !isPreLaunch : (!isToday && !isFuture && !isPreLaunch);
        const hist = scoreHistory[ds] || null;
        const wasSolved = hist ? wasSolvedOf(hist) : false;
        const pNum = puzzleNumberFor(ds);
        const markerColor = wasSolved ? '#22c55e' : null;
        const bonusPip = hist && hist.filmBonus === true;
        const cat = categoryForDate(ds); // Movies | TV | Anime | Cartoon
        const catStyle = CAT_PALETTE[cat] || CAT_PALETTE.Movies;
        return (
          <button
            key={ds}
            onClick={interactive ? () => onSelectDate(ds) : undefined}
            disabled={!interactive}
            aria-label={isToday ? 'Today (current puzzle)' : (interactive ? 'Open puzzle for ' + ds + (hist ? ' (' + cat + (wasSolved ? ', solved' : ', played') + ')' : '') : 'Unavailable')}
            style={{
              aspectRatio: '1 / 1.25',
              background: PROTOTYPE_CAL ? catStyle.bg : 'transparent',
              border: 'none',
              display: 'flex', flexDirection: 'column',
              alignItems: 'stretch', justifyContent: 'flex-start',
              padding: '6px 2px 4px',
              color: isPreLaunch ? HD_DASHED : HD_TEXT,
              fontFamily: HD_FONT,
              cursor: interactive ? 'pointer' : 'default',
              opacity: isPreLaunch ? 0.28 : 1,
              position: 'relative',
            }}
          >
            {/* Day number — today gets a solid filled circle around it */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{
                width: 28, height: 28, borderRadius: '50%',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: isToday ? '#22c55e' : 'transparent',
                color: isToday ? '#0e0e0e' : 'inherit',

  );

  return (
    <div style={{ padding: '6px 4px 10px' }}>
      {/* Day-of-week header row — shown once at top, iOS-style */}
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)',
        padding: '2px 0 6px',

          <div key={i} style={{

            color: HD_MUTED, textAlign: 'center',
            textTransform: 'uppercase',

        ))}

      {/* Continuous month blocks — each month's label rides inline with
          its first-day cell, and days flow into a single 7-column grid. */}
      {months.map(({ y, m }, mi) => {
        const firstDow = new Date(y, m - 1, 1).getDay();
        const firstMonIdx = (firstDow + 6) % 7;
        const daysInMonth = new Date(y, m, 0).getDate();
        const monthShort = new Date(y, m - 1, 1).toLocaleDateString(undefined, { month: 'short' });

        // Build rows of 7 cells. First row gets its leading blanks (Monday-start).
        const rows = [];
        let cur = new Array(firstMonIdx).fill(null).map(() => ({ isBlank: true }));
        for (let d = 1; d <= daysInMonth; d++) {
          cur.push({ ds: ymd(y, m, d), dayNum: d, isBlank: false });
          if (cur.length === 7) { rows.push(cur); cur = []; }
        }
        if (cur.length > 0) {
          while (cur.length < 7) cur.push({ isBlank: true });
          rows.push(cur);
        }

        return (
          <div key={'mo-' + y + '-' + m}>
            {/* Month label — only shown from second month onward inline as a
                chapter header; the first month leads off the calendar so no
                redundant label is needed. */}

        padding: '8px 8px 2px', gap: 8,

        marginTop: PROTOTYPE_CAL ? 0 : 4,
      }}>
        <div style={{
          display: 'flex', gap: 10, alignItems: 'center',

            }}>Prototype · future unlocked</span>

        <button

function ArchivePanel({ open, onToggle, todayStr, onSelectDate }) {
  const entries = React.useMemo(
    () => allPastDaysSinceLaunch(todayStr),
    [todayStr]
  );
  // Load score history once per open for solved/filmBonus markers.
  // Re-read whenever the panel opens so freshly-played days show up.
  const scoreHistory = React.useMemo(
    () => (open ? loadScoreHistory() : {}),
    [open, todayStr]
  );
  const scrollable = entries.length > 30;
  const containerRef = React.useRef(null);

  // Month-key helper — YYYY-MM of the entry's localized date.
  const monthKeyOf = (dateStr) => dateStr.slice(0, 7); // "2026-04"
  const monthLabelOf = (dateStr) => {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
  };

  // Determine which entries should be preceded by a chapter header.
  // A header is inserted when an entry's month differs from the previous entry's month
  // (the first entry never gets a header, since all entries may share one month).
  const headerBeforeIdx = React.useMemo(() => {
    const set = new Set();
    for (let i = 1; i < entries.length; i++) {
      if (monthKeyOf(entries[i].dateStr) !== monthKeyOf(entries[i - 1].dateStr)) {
        set.add(i);
      }
    }
    return set;
  }, [entries]);

  const onRandomJump = () => {
    if (!entries.length) return;
    // Smooth-scroll the archive list back to top, then fire the handler.
    if (containerRef.current) {
      try { containerRef.current.scrollTo({ top: 0, behavior: 'smooth' }); } catch (_) {}
    }
    const idx = Math.floor(Math.random() * entries.length);
    const pick = entries[idx];
    onSelectDate(pick.dateStr);
  };

  return (
    <div style={{
      margin: '0 18px 10px',
      background: HD_SURFACE,
      border: '1px solid ' + HD_BORDER,
      borderRadius: 10,
      overflow: 'hidden',
    }}>
      <div
        onClick={onToggle}
        role="button"
        tabIndex={0}
        aria-expanded={!!open}
        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onToggle(); } }}
        style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '10px 12px', cursor: 'pointer', userSelect: 'none',
      }}>
        <div style={{
          fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase',
          color: HD_TEXT,
        }}>Archive</div>
        <div style={{ fontSize: 11, color: HD_MUTED }}>{open ? '▲' : '▼'}</div>
      </div>
      {open && (
        <div ref={containerRef} style={{
          maxHeight: scrollable ? '50vh' : 'none',
          overflowY: scrollable ? 'auto' : 'visible',
          WebkitOverflowScrolling: 'touch',
        }}>
          {entries.length === 0 ? (
            <div style={{
              padding: '14px 12px',
              color: HD_MUTED, fontSize: 11, lineHeight: 1.5,
              fontStyle: 'italic', textAlign: 'center',
            }}>
              No past puzzles yet — check back tomorrow.
            </div>
          ) : (
            <CalendarArchive
              entries={entries}
              scoreHistory={scoreHistory}
              todayStr={todayStr}
              onSelectDate={onSelectDate}
              onRandomJump={onRandomJump}
            />
          )}
        </div>
      )}
    </div>
  );
}

// Synthesized color-palette poster — the canonical reveal card.
// Renders 6 horizontal color bars in the palette with the theme name.
// Generative SVG palette poster (Ines Blanchard proposal).
// Seed: theme name → integer. Lays out the 6 hues as a radial burst behind
// a center title block. Each hue is a transparent wedge; arrangement rotates
// per-palette so posters feel distinct across the roster.
function PalettePoster({ theme, puzzle }) {
  const W = 140, H = 200;
  const cx = W / 2, cy = H * 0.42;
  // Deterministic per-theme rotation offset so each film gets its own "look".
  let seed = 0;
  for (let i = 0; i < theme.name.length; i++) seed = (seed * 31 + theme.name.charCodeAt(i)) | 0;
  const rot0 = ((seed % 360) + 360) % 360;
  const hues = puzzle.hues;
  const wedgeCount = hues.length;
  const wedge = 360 / wedgeCount;
  const R = 130; // radius large enough to bleed past the edges
  // SVG arc path builder: sector from cx/cy, arc from angle a0→a1, radius R.
  const arc = (a0, a1) => {
    const toXY = (a) => [cx + R * Math.cos(a * Math.PI / 180), cy + R * Math.sin(a * Math.PI / 180)];
    const [x0, y0] = toXY(a0);
    const [x1, y1] = toXY(a1);
    const large = (a1 - a0) > 180 ? 1 : 0;
    return `M ${cx} ${cy} L ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1} Z`;
  };
  return (
    <div style={{
      width: W, height: H, borderRadius: 10, overflow: 'hidden',
      position: 'relative', background: HD_BG,
      boxShadow: '0 6px 14px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06)',
    }}>
      <svg viewBox={`0 0 ${W} ${H}`} width={W} height={H}
           style={{ position: 'absolute', inset: 0 }}>
        {hues.map((h, i) => {
          const a0 = rot0 + i * wedge - 90;
          const a1 = a0 + wedge;
          return <path key={i} d={arc(a0, a1)} fill={hsbCss(h, puzzle.S, puzzle.B)} />;
        })}
        {/* Inner dark disc — makes the title pop, and keeps the hues as a ring */}
        <circle cx={cx} cy={cy} r={30} fill="rgba(0,0,0,0.82)" />
        {/* Six hue pips orbiting the disc — adds a graphic signature */}
        {hues.map((h, i) => {
          const a = rot0 + (i + 0.5) * wedge - 90;
          const r = 40;
          const x = cx + r * Math.cos(a * Math.PI / 180);
          const y = cy + r * Math.sin(a * Math.PI / 180);
          return <circle key={'p' + i} cx={x} cy={y} r={3.5} fill={hsbCss(h, 0.9, 0.95)} />;
        })}
      </svg>
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0,
        padding: '8px 10px', background: 'rgba(0,0,0,0.85)',
        color: HD_TEXT, fontSize: 10, fontWeight: 700,
        letterSpacing: 0.6, textAlign: 'center',
        textTransform: 'uppercase', lineHeight: 1.2,
        minHeight: 38, display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>{theme.name}</div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────
// FilmGuess — multiple-choice bonus challenge (Change 3)
// Shown after game end (solve or fail), BEFORE the reveal card.
// Collapses once the user answers or skips; tracked via parent state.
// ────────────────────────────────────────────────────────────────────
function FilmGuess({ options, correctName, chosen, onChoose, onSkip, feedback }) {
  // feedback: null | 'correct' | 'wrong'
  const locked = chosen != null;
  return (
    <div style={{
      width: '100%', maxWidth: 320,
      background: HD_SURFACE,
      border: '1px solid ' + HD_BORDER,
      borderRadius: 12,
      padding: '12px 14px',
      display: 'flex', flexDirection: 'column', gap: 10,
    }}>
      <div style={{
        fontSize: 10, color: HD_MUTED, letterSpacing: 2.5,
        textTransform: 'uppercase', fontWeight: 700, textAlign: 'center',
      }}>Which film inspired this palette?</div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
        {options.map((opt) => {
          const isChosen  = chosen === opt;
          const isCorrect = opt === correctName;
          let bg    = 'transparent';
          let bd    = HD_BORDER;
          let color = HD_TEXT;
          let anim  = '';
          if (locked) {
            if (isChosen && isCorrect) {
              bg = 'rgba(74, 222, 128, 0.14)';
              bd = HD_GREEN;
              color = '#bbf7d0';
              anim = 'hueday-fb-green';
            } else if (isChosen && !isCorrect) {
              bg = 'rgba(239, 68, 68, 0.14)';
              bd = '#f87171';
              color = '#fecaca';
              anim = 'hueday-fb-yellow';
            } else if (!isChosen && isCorrect) {
              // Reveal the correct answer after a wrong pick.
              bg = 'rgba(74, 222, 128, 0.08)';
              bd = HD_GREEN;
              color = '#86efac';
            }
          }
          return (
            <button
              key={opt}
              className={anim}
              onClick={locked ? undefined : () => onChoose(opt)}
              disabled={locked}
              style={{
                background: bg,
                border: '1px solid ' + bd,
                color,
                fontFamily: HD_FONT,
                fontSize: 12, fontWeight: 600,
                padding: '10px 12px',
                borderRadius: 10,
                textAlign: 'left',
                cursor: locked ? 'default' : 'pointer',
                letterSpacing: 0.2,
                lineHeight: 1.3,
                transition: 'background-color 180ms ease, border-color 180ms ease, color 180ms ease',
              }}
            >{opt}</button>
          );
        })}
      </div>

      {!locked && (
        <button
          onClick={onSkip}
          style={{
            background: 'transparent',
            border: '1px solid ' + HD_BORDER,
            color: HD_MUTED,
            fontSize: 10, fontWeight: 600, letterSpacing: 1.4,
            textTransform: 'uppercase',
            padding: '6px 10px', borderRadius: 8,
            cursor: 'pointer', fontFamily: HD_FONT,
            alignSelf: 'center',
          }}
        >Skip, just show me</button>
      )}

      {feedback === 'correct' && (
        <div style={{
          alignSelf: 'center',
          fontSize: 10, fontWeight: 800, letterSpacing: 1.5,
          textTransform: 'uppercase',
          color: '#bbf7d0',
          background: 'rgba(74, 222, 128, 0.14)',
          border: '1px solid ' + HD_GREEN,
          padding: '3px 10px', borderRadius: 999,
        }}>+10 Bonus</div>
      )}
      {feedback === 'wrong' && (
        <div style={{
          alignSelf: 'center',
          fontSize: 10, fontWeight: 800, letterSpacing: 1.5,
          textTransform: 'uppercase',
          color: '#fecaca',
        }}>Close · see the answer above</div>
      )}
    </div>
  );
}

// Wordle-style share button. Copies emoji grid + URL to clipboard. On older
// browsers falls back to a `prompt()` showing the text so the player can
// copy manually. No network, no account.
function ShareGridButton({ shareText }) {
  const [state, setState] = React.useState('idle'); // 'idle' | 'copied' | 'fallback'
  const onClick = async () => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(shareText);
        setState('copied');
        haptic(18);
        setTimeout(() => setState('idle'), 1800);
        return;
      }
    } catch (_) { /* fall through to prompt */ }
    try { window.prompt('Copy your Hueday result:', shareText); setState('fallback'); }
    catch (_) {}
    setTimeout(() => setState('idle'), 1800);
  };
  return (
    <button
      onClick={onClick}
      style={{
        width: '100%', maxWidth: 260, minHeight: 42,
        marginTop: 6,
        background: state === 'copied' ? 'rgba(34,197,94,0.18)' : '#fafafa',
        color: state === 'copied' ? '#22c55e' : '#0e0e0e',
        border: state === 'copied' ? '1px solid #22c55e' : 'none',
        borderRadius: 12,
        fontSize: 12, fontWeight: 700, letterSpacing: 1.5,
        textTransform: 'uppercase', cursor: 'pointer',
        fontFamily: HD_FONT,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        gap: 8,
      }}
    >
      <span>{state === 'copied' ? '✓ Copied' : '↗ Share result'}</span>
    </button>
  );
}

function GuessGrid({ rows, puzzle, currentRow, activeSlotIdx, onSlotTap, onDragStart, swatchSize, rowGap, colGap, showDeg, onCopyRow, gameDone }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: rowGap, alignItems: 'center' }}>
      {rows.map((row, rIdx) => {
        // Submitted rows become tap-to-copy sources (only while game live).
        const canCopyFromRow = row.submitted && !gameDone && onCopyRow;
        // Keying the row wrapper on submittedAt forces a remount when the
        // row transitions from in-progress → submitted, which causes each
        // Swatch inside to mount fresh and play its feedback animation
        // exactly once per submission. Re-renders from unrelated state
        // (pickerHue, activeSlot, etc.) leave submittedAt untouched, so
        // the animations don't re-play.
        const rowKey = row.submitted
          ? `r${rIdx}-s-${row.submittedAt || 'sub'}`
          : `r${rIdx}-live`;
        const rowClick = canCopyFromRow ? () => onCopyRow(rIdx) : undefined;
        return (
          <div
            key={rowKey}
            className={canCopyFromRow ? 'hueday-row-copyable' : undefined}
            onClick={rowClick}
            style={{ display: 'flex', gap: colGap }}
            title={canCopyFromRow ? 'Tap to copy this row into your current guess' : undefined}
          >
            {row.slots.map((slot, sIdx) => {
              const isActive = rIdx === currentRow && sIdx === activeSlotIdx && !row.submitted;
              const isEditable = rIdx === currentRow && !row.submitted;
              return (
                <Swatch
                  key={sIdx}
                  hue={slot.hue}
                  S={puzzle.S}
                  B={puzzle.B}
                  feedback={row.submitted ? slot.feedback : null}
                  isActive={isActive}
                  isEditable={isEditable}
                  rowIdx={rIdx}
                  slotIdx={sIdx}
                  onDragStart={onDragStart}
                  size={swatchSize}
                  showDeg={showDeg && row.submitted}
                  distance={row.submitted ? slot.distance : null}
                  onClick={() => onSlotTap && onSlotTap(rIdx, sIdx)}
                  animate={row.submitted}
                  animDelayMs={row.submitted ? sIdx * 100 : 0}
                />
              );
            })}
          </div>
        );
      })}
    </div>
  );
}
